}

// ====== Drawer: Edit Profile ======
function DrawerEditProfile({ onBack }) {
  const { user, refresh } = useContext(UserCtx);
  const [config, setConfig] = useState(null);
  const [nickname, setNickname] = useState(user.nickname || '');
  const [gender, setGender] = useState(user.gender || '');
  const [job, setJob] = useState(user.job || '');
  const [country, setCountry] = useState(user.country || '台灣');
  const [region, setRegion] = useState(user.region || '');
  const [customRegion, setCustomRegion] = useState(user.customRegion || '');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => {
    gasPost({ action: 'userGetConfig' }).then(r => {
      if (r.ok) setConfig(r.config);
    });
  }, []);

  const submit = async (e) => {
    e?.preventDefault?.();
    if (!nickname.trim()) { setMsg({ type: 'error', text: '請填寫稱呼' }); return; }
    if (country === '台灣' && region === '其他' && !customRegion.trim()) {
      setMsg({ type: 'error', text: '請填寫您的區域' }); return;
    }
    setBusy(true); setMsg(null);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({
        action: 'userUpdateProfile',
        token,
        patch: {
          nickname, gender, job, country,
          region: country === '台灣' ? region : '',
          customRegion: (country === '台灣' && region === '其他') ? customRegion : ''
        }
      });
      if (r.ok) {
        setMsg({ type: 'success', text: '已更新 ✓' });
        await refresh();
        setTimeout(() => onBack(), 700);
      } else {
        setMsg({ type: 'error', text: '更新失敗: ' + (r.error || '') });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗' });
    }
    setBusy(false);
  };

  return (
    <form onSubmit={submit} className="drawer-form">
      <button type="button" className="drawer-link" onClick={onBack}>← 返回會員中心</button>
      {msg && <div className={`drawer-msg drawer-msg-${msg.type}`}>{msg.text}</div>}

      <label className="drawer-label">稱呼</label>
      <input type="text" value={nickname} onChange={(e) => setNickname(e.target.value)} required />

      <label className="drawer-label">性別</label>
      <div className="drawer-radio-row">
        <label className={`drawer-radio ${gender === '乾道' ? 'checked' : ''}`}>
          <input type="radio" value="乾道" checked={gender === '乾道'} onChange={(e) => setGender(e.target.value)} />
          <span>乾道(男)</span>
        </label>
        <label className={`drawer-radio ${gender === '坤道' ? 'checked' : ''}`}>
          <input type="radio" value="坤道" checked={gender === '坤道'} onChange={(e) => setGender(e.target.value)} />
          <span>坤道(女)</span>
        </label>
      </div>

      <label className="drawer-label">天職</label>
      <select value={job} onChange={(e) => setJob(e.target.value)}>
        {(config?.jobs || ['點傳師', '講師', '壇主', '辦事人員', '清口人員', '道親']).map(j => <option key={j} value={j}>{j}</option>)}
      </select>

      <label className="drawer-label">所在國家</label>
      <select value={country} onChange={(e) => { setCountry(e.target.value); if (e.target.value !== '台灣') { setRegion(''); setCustomRegion(''); } }}>
        {(config?.countries || ['台灣', '其他']).map(c => <option key={c} value={c}>{c}</option>)}
      </select>

      {country === '台灣' && (
        <>
          <label className="drawer-label">區域</label>
          <select value={region} onChange={(e) => setRegion(e.target.value)}>
            <option value="">請選擇⋯</option>
            {(config?.twRegions || []).map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          {region === '其他' && (
            <>
              <label className="drawer-label">請填寫您的區域</label>
              <input type="text" value={customRegion} onChange={(e) => setCustomRegion(e.target.value)} required />
            </>
          )}
        </>
      )}

      <p className="drawer-help-text">📧 信箱與密碼無法在此修改。請使用「修改密碼」功能變更密碼。</p>

      <button type="submit" className="drawer-btn-primary" disabled={busy}>{busy ? '更新中⋯' : '儲存變更'}</button>
    </form>
  );
}

// ====== Drawer: Change Password ======
function DrawerChangePassword({ onBack }) {
  const { logout } = useContext(UserCtx);
  const [oldPw, setOldPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  const submit = async (e) => {
    e?.preventDefault?.();
    if (newPw !== confirmPw) { setMsg({ type: 'error', text: '兩次新密碼不一致' }); return; }
    if (newPw.length < 6) { setMsg({ type: 'error', text: '密碼至少 6 碼' }); return; }
    setBusy(true); setMsg(null);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({
        action: 'userUpdatePassword',
        token, oldPassword: oldPw, newPassword: newPw
      });
      if (r.ok) {
        setMsg({ type: 'success', text: '密碼已更新 ✓ 其他裝置已自動登出' });
        setOldPw(''); setNewPw(''); setConfirmPw('');
        setTimeout(() => onBack(), 1500);
      } else {
        const errors = {
          wrong_old_password: '原密碼錯誤',
          password_too_short: '新密碼至少 6 碼',
          missing_passwords: '請填寫所有欄位',
          invalid_session: '登入已過期,請重新登入'
        };
        setMsg({ type: 'error', text: errors[r.error] || ('更新失敗: ' + r.error) });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗' });
    }
    setBusy(false);
  };

  return (
    <form onSubmit={submit} className="drawer-form">
      <button type="button" className="drawer-link" onClick={onBack}>← 返回會員中心</button>
      {msg && <div className={`drawer-msg drawer-msg-${msg.type}`}>{msg.text}</div>}
      <label className="drawer-label">原密碼</label>
      <input type="password" value={oldPw} onChange={(e) => setOldPw(e.target.value)} required autoComplete="current-password" />
      <label className="drawer-label">新密碼(至少 6 碼)</label>
      <input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} required minLength={6} autoComplete="new-password" />
      <label className="drawer-label">再次輸入新密碼</label>
      <input type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} required minLength={6} autoComplete="new-password" />
      <button type="submit" className="drawer-btn-primary" disabled={busy}>{busy ? '更新中⋯' : '更新密碼'}</button>
    </form>
  );
}

// ====== Drawer: My Threads ======
function DrawerMyThreads({ onBack, onClose }) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    const token = localStorage.getItem('jc_user_token');
    gasPost({ action: 'userMyThreads', token }).then(r => {
      if (r.ok) setData({ threads: r.threads || [], categories: r.categories || [] });
      else setError(r.error || '載入失敗');
    }).catch(() => setError('連線失敗'));
  }, []);

  const catById = (id) => (data?.categories || []).find(c => c.id === id);

  return (
    <div>
      <button type="button" className="drawer-link" onClick={onBack}>← 返回會員中心</button>
      {error && <div className="drawer-msg drawer-msg-error">{error}</div>}
      {!data && !error && <div style={{ textAlign: 'center', padding: 24, color: 'var(--ink-mute)' }}>載入中⋯</div>}
      {data && data.threads.length === 0 && (
        <div style={{ textAlign: 'center', padding: 32, color: 'var(--ink-mute)', fontStyle: 'italic' }}>
          您還沒有發表過文章
        </div>
      )}
      {data && data.threads.length > 0 && (
        <div className="drawer-thread-list">
          <div style={{ fontSize: 13, color: 'var(--ink-mute)', marginBottom: 10 }}>
            共 {data.threads.length} 篇文章
          </div>
          {data.threads.map(t => {
            const cat = catById(t.categoryId);
            const updated = new Date(t.updatedAt || t.createdAt);
            return (
              <a key={t.id} className="drawer-thread-item" href={`#discussion?threadId=${t.id}`} onClick={onClose}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                  {cat && <span className="drawer-thread-cat" style={{ background: (cat.color || '#999') + '22', color: cat.color || '#999' }}>{cat.icon} {cat.name}</span>}
                  {t.pinned && <span className="drawer-thread-flag">📌 置頂</span>}
                  {t.locked && <span className="drawer-thread-flag">🔒 鎖定</span>}
                </div>
                <div className="drawer-thread-title">{t.title}</div>
                <div className="drawer-thread-meta">
                  💬 {t.replyCount} · ❤ {t.likeCount} · {updated.getMonth() + 1}/{updated.getDate()}
                </div>
              </a>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AuthSection({ data, anchorId }) {
  const { user, login, logout } = useContext(UserCtx);
  const [mode, setMode] = useState('login'); // login | register | forgot
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);
  const [config, setConfig] = useState(null);

  // Form state
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [nickname, setNickname] = useState('');
  const [country, setCountry] = useState('台灣');
  const [region, setRegion] = useState('');
  const [gender, setGender] = useState('');
  const [job, setJob] = useState('');
  const [successModal, setSuccessModal] = useState(null); // { type, title, message, email }

  useEffect(() => {
    gasPost({ action: 'userGetConfig' }).then(r => {
      if (r.ok) setConfig(r.config);
    });
  }, []);

  const reset = () => {
    setMsg(null); setEmail(''); setPassword(''); setConfirmPw('');
    setNickname(''); setRegion(''); setGender(''); setJob('');
    setFieldErrors({});
  };

  const submitLogin = async (e) => {
    e?.preventDefault?.();
    setBusy(true); setMsg(null);
    try {
      const r = await gasPost({ action: 'userLogin', email, password });
      if (r.ok) {
        login(r.user, r.token);
        setMsg({ type: 'success', text: `${r.user.nickname}${r.user.job ? ' ' + r.user.job : ''} 您好,登入成功 🪷` });
        reset();
      } else {
        const errors = {
          invalid_credentials: '帳號或密碼錯誤',
          missing_credentials: '請填寫信箱與密碼',
          blocked: '此帳號已被停用,請聯繫管理員',
          not_verified: '此信箱尚未完成驗證,請至信箱收信',
        };
        setMsg({ type: 'error', text: errors[r.error] || ('登入失敗: ' + r.error) });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗,請稍後再試' });
    }
    setBusy(false);
  };

  const [fieldErrors, setFieldErrors] = useState({});

  // Client-side validation before submitting register form
  const validateRegister = () => {
    const errs = {};
    if (!nickname.trim()) errs.nickname = '請填寫稱呼';
    if (!email.trim()) errs.email = '請填寫信箱';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) errs.email = '信箱格式錯誤(需含 @ 與網域)';
    if (!password) errs.password = '請設定密碼';
    else if (password.length < 6) errs.password = '密碼至少需 6 個字元';
    if (!confirmPw) errs.confirmPw = '請再次輸入密碼';
    else if (password !== confirmPw) errs.confirmPw = '兩次密碼不一致';
    if (!gender) errs.gender = '請選擇乾道或坤道';
    if (!job) errs.job = '請選擇天職';
    if (!country) errs.country = '請選擇國家';
    return errs;
  };

  const submitRegister = async (e) => {
    e?.preventDefault?.();
    setMsg(null);

    // Client-side validation
    const errs = validateRegister();
    if (Object.keys(errs).length > 0) {
      setFieldErrors(errs);
      // Scroll to first error
      const firstKey = Object.keys(errs)[0];
      setTimeout(() => {
        const el = document.querySelector(`[data-field="${firstKey}"]`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const input = el.querySelector('input, select');
          if (input) input.focus();
        }
      }, 50);
      setMsg({ type: 'error', text: '請修正下方標示的欄位' });
      return;
    }

    setBusy(true); setFieldErrors({});
    try {
      const r = await gasPost({
        action: 'userRegister',
        email: email.trim(), password, nickname: nickname.trim(),
        country, region, gender, job
      });
      if (r.ok) {
        const registeredEmail = email;
        const registeredNickname = nickname;
        const registeredJob = job;
        setSuccessModal({
          type: 'register',
          title: r.flow === 'verify' ? '註冊完成 🪷' : '歡迎加入 🪷',
          email: registeredEmail,
          nickname: registeredNickname,
          job: registeredJob,
          flow: r.flow || 'welcome',
          requireVerification: r.requireVerification
        });
        if (r.token) login(r.user, r.token);
        reset();
        setMode('login');
      } else {
        // Map server errors to field errors
        const fieldMap = {
          invalid_email: ['email', '信箱格式錯誤'],
          password_too_short: ['password', '密碼至少需 6 個字元'],
          email_exists: ['email', '此信箱已被註冊,請改用其他信箱或直接登入'],
          missing_nickname: ['nickname', '請填寫稱呼'],
          missing_country: ['country', '請選擇國家'],
          missing_gender: ['gender', '請選擇乾道或坤道'],
          missing_job: ['job', '請選擇天職'],
        };
        if (fieldMap[r.error]) {
          const [key, text] = fieldMap[r.error];
          setFieldErrors({ [key]: text });
          setMsg({ type: 'error', text });
          setTimeout(() => {
            const el = document.querySelector(`[data-field="${key}"]`);
            if (el) {
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
              const input = el.querySelector('input, select');
              if (input) input.focus();
            }
          }, 50);
        } else {
          setMsg({ type: 'error', text: '註冊失敗: ' + r.error });
        }
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗,請稍後再試' });
    }
    setBusy(false);
  };

  const submitForgot = async (e) => {
    e?.preventDefault?.();
    setBusy(true); setMsg(null);
    try {
      await gasPost({ action: 'userRequestPasswordReset', email });
      setSuccessModal({
        type: 'forgot',
        title: '重設信已寄出 ✉',
        email,
      });
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗' });
    }
    setBusy(false);
  };

  const resendVerify = async () => {
    setBusy(true);
    try {
      await gasPost({ action: 'userResendVerification', email });
      setMsg({ type: 'success', text: '驗證信已重新寄出,請至信箱查收' });
    } catch (e) {}
    setBusy(false);
  };

  // Logged-in state
  if (user) {
    return (
      <section id={anchorId} className="auth-section">
        <div className="max-w-md mx-auto px-6 lg:px-12 py-16">
          <div className="auth-card reveal">
            <div className="auth-eyebrow">已登入</div>
            <h3 className="auth-title">{user.nickname}{user.job ? ` ${user.job}` : ''}</h3>
            <div className="auth-user-meta">
              <div><span>信箱</span><span>{user.email}</span></div>
              {user.gender && <div><span>道號</span><span>{user.gender}</span></div>}
              {user.job && <div><span>天職</span><span>{user.job}</span></div>}
              {user.country && <div><span>國家</span><span>{user.country}{user.region ? ` · ${user.region}` : ''}</span></div>}
              <div><span>狀態</span><span style={{ color: user.verified ? 'var(--temple-red)' : 'var(--gold)' }}>{user.verified ? '已驗證 ✓' : '尚未驗證'}</span></div>
            </div>
            {!user.verified && (
              <button className="auth-btn-secondary" onClick={resendVerify} disabled={busy}>重新寄送驗證信</button>
            )}
            <button className="auth-btn" onClick={logout}>登出</button>
            {msg && <div className={`auth-msg auth-msg-${msg.type}`}>{msg.text}</div>}
          </div>
        </div>
      </section>
    );
  }

  return (
    <section id={anchorId} className="auth-section">
      <div className="max-w-md mx-auto px-6 lg:px-12 py-16">
        <div className="auth-card reveal">
          {data.eyebrow && <div className="auth-eyebrow">{data.eyebrow}</div>}
          {data.titleHtml
            ? <HtmlContent className="auth-title" html={data.titleHtml} />
            : <h3 className="auth-title">{mode === 'login' ? '會員登入' : mode === 'register' ? '會員註冊' : '忘記密碼'}</h3>}
          {data.description && mode === 'login' && (
            <p className="auth-desc">{data.description}</p>
          )}

          <div className="auth-tabs">
            <button className={mode === 'login' ? 'active' : ''} onClick={() => { setMode('login'); setMsg(null); setFieldErrors({}); }}>登入</button>
            <button className={mode === 'register' ? 'active' : ''} onClick={() => { setMode('register'); setMsg(null); setFieldErrors({}); }}>註冊</button>
          </div>

          {mode === 'login' && (
            <form onSubmit={submitLogin} className="auth-form">
              <label className="auth-label">電子信箱</label>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoComplete="email" />
              <label className="auth-label">密碼</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required autoComplete="current-password" />
              <button type="submit" className="auth-btn" disabled={busy}>{busy ? '登入中⋯' : '登入'}</button>
              <button type="button" className="auth-link" onClick={() => { setMode('forgot'); setMsg(null); setFieldErrors({}); }}>忘記密碼?</button>
            </form>
          )}

          {mode === 'register' && config && (
            <form onSubmit={submitRegister} className="auth-form">
              <div data-field="nickname" className={`auth-field ${fieldErrors.nickname ? 'has-error' : ''}`}>
                <label className="auth-label">稱呼 / 法名 <span className="auth-required">*</span></label>
                <input type="text" value={nickname}
                       onChange={(e) => { setNickname(e.target.value); if (fieldErrors.nickname) setFieldErrors({ ...fieldErrors, nickname: null }); }} />
                {fieldErrors.nickname && <div className="auth-field-err">{fieldErrors.nickname}</div>}
              </div>

              <div data-field="email" className={`auth-field ${fieldErrors.email ? 'has-error' : ''}`}>
                <label className="auth-label">電子信箱 <span className="auth-required">*</span></label>
                <input type="email" value={email}
                       onChange={(e) => { setEmail(e.target.value); if (fieldErrors.email) setFieldErrors({ ...fieldErrors, email: null }); }}
                       autoComplete="email" />
                {fieldErrors.email && <div className="auth-field-err">{fieldErrors.email}</div>}
              </div>

              <div data-field="password" className={`auth-field ${fieldErrors.password ? 'has-error' : ''}`}>
                <label className="auth-label">密碼(至少 6 字) <span className="auth-required">*</span></label>
                <input type="password" value={password}
                       onChange={(e) => { setPassword(e.target.value); if (fieldErrors.password) setFieldErrors({ ...fieldErrors, password: null }); }}
                       autoComplete="new-password" />
                {fieldErrors.password && <div className="auth-field-err">{fieldErrors.password}</div>}
              </div>

              <div data-field="confirmPw" className={`auth-field ${fieldErrors.confirmPw ? 'has-error' : ''}`}>
                <label className="auth-label">確認密碼 <span className="auth-required">*</span></label>
                <input type="password" value={confirmPw}
                       onChange={(e) => { setConfirmPw(e.target.value); if (fieldErrors.confirmPw) setFieldErrors({ ...fieldErrors, confirmPw: null }); }}
                       autoComplete="new-password" />
                {fieldErrors.confirmPw && <div className="auth-field-err">{fieldErrors.confirmPw}</div>}
              </div>

              <div data-field="gender" className={`auth-field ${fieldErrors.gender ? 'has-error' : ''}`}>
                <label className="auth-label">道號 <span className="auth-required">*</span></label>
                <div className="auth-radio-group">
                  <label><input type="radio" name="gender" value="乾道" checked={gender === '乾道'}
                          onChange={(e) => { setGender(e.target.value); if (fieldErrors.gender) setFieldErrors({ ...fieldErrors, gender: null }); }} /> 乾道</label>
                  <label><input type="radio" name="gender" value="坤道" checked={gender === '坤道'}

                </p>
                <div className="auth-success-mail-card">
                  <div className="auth-success-mail-label">驗證信已寄至</div>

                </div>
                <div className="auth-success-instructions">
                  <div className="auth-success-step">
                    <span className="auth-success-step-num">1</span>

                  <div className="auth-success-step">
                    <span className="auth-success-step-num">2</span>

// Reset password modal — appears when URL has #reset-password/{token}
function ResetPasswordModal() {
  const [token, setToken] = useState(null);
  const [pw, setPw] = useState('');
  const [pw2, setPw2] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => {
    const check = () => {
      const m = window.location.hash.match(/^#reset-password\/(.+)$/);
      setToken(m ? m[1] : null);
    };
    check();
    window.addEventListener('hashchange', check);
    return () => window.removeEventListener('hashchange', check);
  }, []);

  if (!token) return null;

  const submit = async (e) => {
    e.preventDefault();
    if (pw !== pw2) { setMsg({ type: 'error', text: '兩次密碼不一致' }); return; }
    setBusy(true); setMsg(null);
    try {
      const r = await gasPost({ action: 'userResetPassword', token, newPassword: pw });
      if (r.ok) {
        setMsg({ type: 'success', text: '密碼已重設,請使用新密碼登入。3 秒後返回首頁。' });
        setTimeout(() => { window.location.hash = '#/'; }, 3000);
      } else {
        const errs = { invalid_token: '連結無效', token_expired: '連結已過期(請重新申請)', password_too_short: '密碼至少 6 字' };
        setMsg({ type: 'error', text: errs[r.error] || r.error });
      }
    } catch (e) { setMsg({ type: 'error', text: '連線失敗' }); }
    setBusy(false);
  };

  return (
    <div className="reset-modal-overlay">
      <div className="auth-card" style={{ maxWidth: 420, width: '100%', margin: 24 }}>
        <div className="auth-eyebrow">重設密碼</div>
        <h3 className="auth-title">設定新密碼</h3>
        <form onSubmit={submit} className="auth-form">
          <label className="auth-label">新密碼(至少 6 字)</label>
          <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} required minLength={6} autoFocus />
          <label className="auth-label">確認新密碼</label>
          <input type="password" value={pw2} onChange={(e) => setPw2(e.target.value)} required minLength={6} />
          <button type="submit" className="auth-btn" disabled={busy}>{busy ? '處理中⋯' : '確認重設'}</button>
          <button type="button" className="auth-link" onClick={() => { window.location.hash = '#/'; }}>取消</button>
        </form>
        {msg && <div className={`auth-msg auth-msg-${msg.type}`}>{msg.text}</div>}
      </div>
    </div>
  );
}


// ErrorBoundary — catches any crash in child components and shows the error
class ForumErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error('[Forum ErrorBoundary]', error, errorInfo);
    this.setState({ errorInfo });
  }
  render() {
    if (this.state.hasError) {
      return (
        <section className="forum-section">
          <div className="max-w-5xl mx-auto px-6 py-16">
            <div style={{ background: '#fff5f5', border: '2px solid #c33', borderRadius: 8, padding: 24 }}>
              <h2 style={{ color: '#c33', marginBottom: 16, fontSize: 20 }}>⚠️ 討論區發生錯誤</h2>
              <div style={{ marginBottom: 12, fontWeight: 600 }}>請把以下訊息回報給 Claude:</div>
              <div style={{ background: '#fff', padding: 12, borderRadius: 4, fontFamily: 'monospace', fontSize: 13, color: '#c33', wordBreak: 'break-all', marginBottom: 12 }}>
                {String(this.state.error?.message || this.state.error || 'Unknown error')}
              </div>
              {this.state.error?.stack && (
                <details>
                  <summary style={{ cursor: 'pointer', fontSize: 13, color: '#666' }}>展開詳細 stack trace</summary>
                  <pre style={{ background: '#fff', padding: 12, borderRadius: 4, fontSize: 11, overflow: 'auto', maxHeight: 300, marginTop: 8 }}>
                    {this.state.error.stack}
                  </pre>
                </details>
              )}
              <button
                onClick={() => this.setState({ hasError: false, error: null, errorInfo: null })}
                style={{ marginTop: 16, padding: '8px 16px', background: '#8b2421', color: '#fff', border: 'none', borderRadius: 4, cursor: 'pointer' }}
              >
                ↻ 重試
              </button>
            </div>
          </div>
        </section>
      );
    }
    return this.props.children;
  }
}

function ForumSection({ data, anchorId }) {
  const { user } = useContext(UserCtx);
  const [forumData, setForumData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState({ type: 'list', categoryId: null }); // list | thread
  const [activeThread, setActiveThread] = useState(null);
  const [busy, setBusy] = useState(false);
  const [showCompose, setShowCompose] = useState(false);
  const [composeMode, setComposeMode] = useState({ kind: 'thread' });  // {kind:'thread'} | {kind:'reply', parentId}
  const [editingThread, setEditingThread] = useState(null);
  const [editingReplyId, setEditingReplyId] = useState(null);
  const [msg, setMsg] = useState(null);

  const loadForum = async () => {
    setLoading(true);
    setMsg(null);
    try {
      const r = await gasPost({ action: 'forumGetData' });
      console.log('[Forum] loadForum response:', r);
      if (r.ok && r.data) {
        setForumData(r.data);
      } else {
        setForumData({ categories: [], threads: [] });
        setMsg({ type: 'error', text: '討論區載入失敗:' + (r.error || '回應格式錯誤') });
      }
    } catch (e) {
      console.error('[Forum] loadForum error:', e);
      setForumData({ categories: [], threads: [] });
      setMsg({ type: 'error', text: '討論區載入失敗:' + (e.message || '網路錯誤') });
    }
    setLoading(false);
  };

  const loadThread = async (threadId) => {
    setBusy(true);
    try {
      const r = await gasPost({ action: 'forumGetThread', threadId });
      if (r.ok) setActiveThread(r.thread);
    } catch (e) {}
    setBusy(false);
  };

  useEffect(() => { loadForum(); }, []);

  const showToast = (text, type = 'success') => {
    setMsg({ type, text });
    setTimeout(() => setMsg(null), 3000);
  };

  const openThread = async (threadId) => {
    setView({ type: 'thread', threadId });
    await loadThread(threadId);
    window.scrollTo({ top: document.getElementById(anchorId)?.offsetTop || 0, behavior: 'smooth' });
  };

  const backToList = () => {
    setView({ type: 'list', categoryId: view.categoryId });
    setActiveThread(null);
    setShowCompose(false);
    setEditingThread(null);
    setEditingReplyId(null);
  };

  // === Actions ===
  const submitNewThread = async ({ categoryId, title, contentHtml, attachments }) => {
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumCreateThread', token, categoryId, title, contentHtml, attachments: attachments || [] });
      if (r.ok) {
        showToast('發文成功 🪷');
        setShowCompose(false);
        await loadForum();
        openThread(r.thread.id);
      } else {
        showToast(forumErrorMsg(r.error), 'error');
      }
    } catch (e) { showToast('連線失敗', 'error'); }
    setBusy(false);
  };

  const submitEditThread = async ({ title, contentHtml, attachments }) => {
    if (!editingThread) return;
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumUpdateThread', token, threadId: editingThread.id, patch: { title, contentHtml, attachments: attachments || [] } });
      if (r.ok) {
        showToast('已更新');
        setEditingThread(null);
        await loadForum();
        await loadThread(editingThread.id);
      } else { showToast(forumErrorMsg(r.error), 'error'); }
    } catch (e) { showToast('連線失敗', 'error'); }
    setBusy(false);
  };

  const submitDeleteThread = async () => {
    if (!activeThread) return;
    if (!confirm('確定刪除此文章?所有留言會一起消失,無法復原。')) return;
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumDeleteThread', token, threadId: activeThread.id });
      if (r.ok) {
        showToast('已刪除');
        backToList();
        await loadForum();
      } else { showToast(forumErrorMsg(r.error), 'error'); }
    } catch (e) {}
    setBusy(false);
  };

  const submitNewReply = async ({ contentHtml, parentId }) => {
    if (!activeThread) return;
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumCreateReply', token, threadId: activeThread.id, contentHtml, parentId });
      if (r.ok) {
        showToast('已留言');
        setComposeMode({ kind: 'thread' });
        await loadThread(activeThread.id);
        await loadForum();
      } else { showToast(forumErrorMsg(r.error), 'error'); }
    } catch (e) { showToast('連線失敗', 'error'); }
    setBusy(false);
  };

  const submitEditReply = async (replyId, contentHtml) => {
    if (!activeThread) return;
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumUpdateReply', token, threadId: activeThread.id, replyId, content: contentHtml });
      if (r.ok) {
        showToast('已更新');
        setEditingReplyId(null);
        await loadThread(activeThread.id);
      } else { showToast(forumErrorMsg(r.error), 'error'); }
    } catch (e) {}
    setBusy(false);
  };

  const submitDeleteReply = async (replyId) => {
    if (!confirm('確定刪除此留言?')) return;
    setBusy(true);
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumDeleteReply', token, threadId: activeThread.id, replyId });
      if (r.ok) { showToast('已刪除'); await loadThread(activeThread.id); await loadForum(); }
      else showToast(forumErrorMsg(r.error), 'error');
    } catch (e) {}
    setBusy(false);
  };

  const toggleLike = async (replyId) => {
    if (!user) { showToast('請先登入', 'error'); return; }
    if (!activeThread) return;
    try {
      const token = localStorage.getItem('jc_user_token');
      const r = await gasPost({ action: 'forumToggleLike', token, threadId: activeThread.id, replyId: replyId || null });
      if (r.ok) await loadThread(activeThread.id);
    } catch (e) {}
  };

  // Render
  if (loading) {
    return (
      <section id={anchorId} className="forum-section">
        <div className="max-w-5xl mx-auto px-6 lg:px-12 py-16 text-center" style={{ color: 'var(--ink-mute)' }}>
          載入討論區⋯
        </div>
      </section>
    );
  }

  if (!forumData) {
    return (
      <section id={anchorId} className="forum-section">
        <div className="max-w-5xl mx-auto px-6 lg:px-12 py-16 text-center">
          <div className="forum-empty" style={{ marginBottom: 16 }}>
            討論區資料未載入。可能原因:<br/>
            · GAS 後端尚未部署最新版本<br/>
            · 網路中斷<br/>
            · forumGetData API 失效
          </div>
          <button className="forum-btn-primary" onClick={loadForum}>↻ 重試</button>
        </div>
      </section>
    );
  }

  return (
    <section id={anchorId} className="forum-section">
      <div className="max-w-5xl mx-auto px-6 lg:px-12 py-16">
        {/* Header */}
        {view.type === 'list' && (
          <div className="text-center mb-10 reveal">
            {data.eyebrow && <div className="eyebrow mb-4" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
            {data.titleHtml && <HtmlContent className="font-serif-tc text-4xl lg:text-5xl font-light mb-4" html={data.titleHtml} />}
            {data.description && <p className="max-w-2xl mx-auto text-base" style={{ color: 'var(--ink-light)' }}>{data.description}</p>}
          </div>
        )}

        {msg && <div className={`forum-msg forum-msg-${msg.type}`}>{msg.text}</div>}

        {/* Category list view */}
        {view.type === 'list' && (
          <ForumListView
            data={forumData}
            user={user}
            categoryFilter={view.categoryId}
            onCategoryChange={(catId) => setView({ type: 'list', categoryId: catId })}
            onOpenThread={openThread}
            onNewPost={(catId) => { setComposeMode({ kind: 'thread', categoryId: catId }); setShowCompose(true); }}
          />
        )}

        {/* Single thread view */}
        {view.type === 'thread' && activeThread && (
          <ForumThreadView
            thread={activeThread}
            user={user}
            categories={forumData.categories}
            busy={busy}
            onBack={backToList}
            onLike={toggleLike}
            editingThread={editingThread}
            setEditingThread={setEditingThread}
            onSaveEdit={submitEditThread}
            onDeleteThread={submitDeleteThread}
            composeMode={composeMode}
            setComposeMode={setComposeMode}
            onSubmitReply={submitNewReply}
            editingReplyId={editingReplyId}
            setEditingReplyId={setEditingReplyId}
            onSaveReplyEdit={submitEditReply}
            onDeleteReply={submitDeleteReply}
          />
        )}

        {/* Compose modal for new thread */}
        {showCompose && (
          <ForumComposeModal
            categories={forumData.categories}
            initialCategoryId={composeMode.categoryId}
            onClose={() => setShowCompose(false)}
            onSubmit={submitNewThread}
            busy={busy}
          />
        )}
      </div>
    </section>
  );
}

function forumErrorMsg(err) {
  const map = {
    login_required: '請先登入會員',
    blocked: '您的帳號已被停用',
    no_permission: '沒有權限執行此操作',
    thread_not_found: '討論串不存在或已被刪除',
    reply_not_found: '留言不存在',
    thread_locked: '此討論串已被鎖定,無法回覆',
    missing_title: '請填寫標題',
    missing_content: '請填寫內容',
    missing_category: '請選擇分類',
    category_not_found: '分類不存在'
  };
  return map[err] || ('操作失敗: ' + err);
}

function ForumListView({ data, user, categoryFilter, onCategoryChange, onOpenThread, onNewPost }) {
  const cats = (data.categories || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
  const visibleCats = cats.filter(c => c.readPolicy === 'public' || user);

  // Build cat helpers
  const byId = {};
  cats.forEach(c => { byId[c.id] = c; });
  const childrenOf = (parentId) => visibleCats.filter(c => (c.parentId || null) === parentId);
  const getDescendantIds = (catId) => {
    const out = [catId];
    cats.filter(c => c.parentId === catId).forEach(child => {
      out.push(...getDescendantIds(child.id));
    });
    return out;
  };
  const getBreadcrumb = (catId) => {
    const trail = [];
    let cur = byId[catId];
    while (cur) {
      trail.unshift(cur);
      cur = cur.parentId ? byId[cur.parentId] : null;
    }
    return trail;
  };

  // Threads: if filtering, include the cat AND all descendants
  let threads = data.threads || [];
  if (categoryFilter) {
    const ids = new Set(getDescendantIds(categoryFilter));
    threads = threads.filter(t => ids.has(t.categoryId));
  } else {
    const visIds = new Set(visibleCats.map(c => c.id));
    threads = threads.filter(t => visIds.has(t.categoryId));
  }
  threads = threads.slice().sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    return new Date(b.lastReplyAt || b.createdAt) - new Date(a.lastReplyAt || a.createdAt);
  });

  const currentCat = categoryFilter ? byId[categoryFilter] : null;
  const breadcrumb = currentCat ? getBreadcrumb(categoryFilter) : [];
  const subCats = currentCat ? childrenOf(categoryFilter) : childrenOf(null);
  const showSubCats = subCats.length > 0;

  return (
    <div className="reveal visible">
      {/* Top-level category tabs (always shows root level) */}
      <div className="forum-cats">
        <button className={`forum-cat-tab ${!categoryFilter ? 'active' : ''}`} onClick={() => onCategoryChange(null)}>
          全部
        </button>
        {childrenOf(null).map(c => {
          const inTrail = breadcrumb.some(b => b.id === c.id);
          return (
            <button key={c.id} className={`forum-cat-tab ${inTrail ? 'active' : ''}`} onClick={() => onCategoryChange(c.id)}>
              <span style={{ marginRight: 6 }}>{c.icon}</span>{c.name}
            </button>
          );
        })}
      </div>

      {/* Breadcrumb */}
      {breadcrumb.length > 0 && (
        <div className="forum-breadcrumb">
          <button className="forum-crumb" onClick={() => onCategoryChange(null)}>討論區</button>
          {breadcrumb.map((c, i) => (
            <React.Fragment key={c.id}>
              <span className="forum-crumb-sep">›</span>
              {i === breadcrumb.length - 1 ? (
                <span className="forum-crumb current">{c.icon} {c.name}</span>
              ) : (
                <button className="forum-crumb" onClick={() => onCategoryChange(c.id)}>{c.icon} {c.name}</button>
              )}
            </React.Fragment>
          ))}
        </div>
      )}

      {/* Sub-categories */}
      {showSubCats && (
        <div className="forum-subcats">
          {subCats.map(sc => {
            const subIds = new Set(getDescendantIds(sc.id));
            const count = (data.threads || []).filter(t => subIds.has(t.categoryId)).length;
            return (
              <button key={sc.id} className="forum-subcat-card" onClick={() => onCategoryChange(sc.id)}>
                <div className="forum-subcat-icon">{sc.icon}</div>
                <div className="forum-subcat-info">
                  <div className="forum-subcat-name">{sc.name}</div>
                  {sc.description && <div className="forum-subcat-desc">{sc.description}</div>}
                </div>
                <div className="forum-subcat-count">{count}</div>
              </button>
            );
          })}
        </div>
      )}

      {/* Category description (when filtering) */}
      {currentCat && currentCat.description && (
        <div className="forum-cat-desc">{currentCat.description}</div>
      )}

      {/* New post button */}
      <div className="flex justify-end mb-4">
        {user ? (
          <button className="forum-btn-primary" onClick={() => onNewPost(currentCat?.id)}>
            ✎ 新發表
          </button>
        ) : (
          <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>登入後即可發表</div>
        )}
      </div>

      {/* Thread list */}
      {threads.length === 0 ? (
        <div className="forum-empty">
          {currentCat ? `「${currentCat.name}」目前沒有討論串` : '尚無任何討論串'}
        </div>
      ) : (
        <div className="forum-thread-list">
          {threads.map(t => {
            const cat = cats.find(c => c.id === t.categoryId);
            return (
              <button key={t.id} className="forum-thread-row" onClick={() => onOpenThread(t.id)}>
                <div className="forum-thread-icon">
                  {t.pinned && <span title="置頂">📌</span>}
                  {t.locked && <span title="已鎖定">🔒</span>}
                  {!t.pinned && !t.locked && <span style={{ opacity: 0.3 }}>{cat?.icon || '💬'}</span>}
                </div>
                <div className="forum-thread-main">
                  <div className="forum-thread-title">{t.title}</div>
                  {t.excerpt && <div className="forum-thread-excerpt">{t.excerpt}</div>}
                  <div className="forum-thread-meta">
                    {cat && <span className="forum-meta-chip">{cat.icon} {cat.name}</span>}
                    <span>{t.author?.nickname}{t.author?.job ? ` ${t.author.job}` : ''}</span>
                    <span>·</span>
                    <span>{forumRelativeTime(t.lastReplyAt || t.createdAt)}</span>
                  </div>
                </div>
                <div className="forum-thread-stats">
                  <div><span className="forum-stat-num">{t.replyCount}</span><div className="forum-stat-label">留言</div></div>
                  <div><span className="forum-stat-num">{t.likeCount}</span><div className="forum-stat-label">讚</div></div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ForumThreadView({ thread, user, categories, busy, onBack, onLike,
                          editingThread, setEditingThread, onSaveEdit, onDeleteThread,
                          composeMode, setComposeMode, onSubmitReply,
                          editingReplyId, setEditingReplyId, onSaveReplyEdit, onDeleteReply }) {
  const cat = categories.find(c => c.id === thread.categoryId);
  const isMyThread = user && thread.author && thread.author.id === user.id;
  const liked = user && (thread.likes || []).includes(user.id);

  // Build a tree from replies (parentId null = top-level, else nested)
  const repliesTree = useMemo(() => {
    const all = thread.replies || [];
    const byParent = {};
    all.forEach(r => {
      const pid = r.parentId || '_root';
      if (!byParent[pid]) byParent[pid] = [];
      byParent[pid].push(r);
    });
    Object.keys(byParent).forEach(k => byParent[k].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt)));
    return byParent;
  }, [thread.replies]);

  return (
    <div className="reveal visible">
      <button className="forum-back" onClick={onBack}>← 返回討論區</button>

      <article className="forum-thread-detail">
        {editingThread && editingThread.id === thread.id ? (
          <ForumThreadEditForm thread={thread} busy={busy}
            onCancel={() => setEditingThread(null)}
            onSave={onSaveEdit} />
        ) : (
          <>
            <div className="forum-thread-header">
              <div className="forum-thread-flags">
                {thread.pinned && <span className="forum-flag pinned">📌 置頂</span>}
                {thread.locked && <span className="forum-flag locked">🔒 已鎖定</span>}
                {cat && <span className="forum-meta-chip">{cat.icon} {cat.name}</span>}
              </div>
              <h1 className="forum-thread-title-big">{thread.title}</h1>
              <div className="forum-author-row">
                <span className="forum-author-name">{thread.author?.nickname}</span>
                {thread.author?.job && <span className="forum-author-job">{thread.author.job}</span>}
                <span className="forum-author-time">{forumFullTime(thread.createdAt)}</span>
                {thread.updatedAt && thread.updatedAt !== thread.createdAt &&
                  <span className="forum-author-time">(已編輯)</span>}
              </div>
            </div>

            <div className="forum-thread-body" dangerouslySetInnerHTML={{ __html: thread.contentHtml }} />

            <ForumAttachmentList attachments={thread.attachments} />

            <div className="forum-thread-actions">
              <button className={`forum-like-btn ${liked ? 'active' : ''}`} onClick={() => onLike(null)} disabled={!user}>
                {liked ? '❤️' : '🤍'} <span>{(thread.likes || []).length}</span>
              </button>
              {user && !thread.locked && (
                <button className="forum-btn-ghost" onClick={() => { setComposeMode({ kind: 'reply', parentId: null }); setTimeout(() => document.getElementById('forum-compose-anchor')?.scrollIntoView({ behavior: 'smooth' }), 50); }}>
                  ✎ 發表留言
                </button>
              )}
              {isMyThread && !thread.locked && (
                <>
                  <button className="forum-btn-ghost" onClick={() => setEditingThread(thread)}>編輯</button>
                  <button className="forum-btn-ghost" style={{ color: 'var(--temple-red)' }} onClick={onDeleteThread}>刪除</button>
                </>
              )}
            </div>
          </>
        )}
      </article>

      {/* Replies */}
      <div className="forum-replies-section">
        <div className="forum-replies-title">
          留言 <span className="forum-count">{(thread.replies || []).length}</span>
        </div>

        {(thread.replies || []).length === 0 ? (
          <div className="forum-empty" style={{ padding: 24 }}>還沒有留言</div>
        ) : (
          <ReplyTree
            repliesTree={repliesTree}
            parentId="_root"
            depth={0}
            user={user}
            thread={thread}
            onLike={onLike}
            editingReplyId={editingReplyId}
            setEditingReplyId={setEditingReplyId}
            onSaveEdit={onSaveReplyEdit}
            onDelete={onDeleteReply}
            onReply={(parentId) => { setComposeMode({ kind: 'reply', parentId }); setTimeout(() => document.getElementById('forum-compose-anchor')?.scrollIntoView({ behavior: 'smooth' }), 50); }}
            busy={busy}
          />
        )}

        {/* Compose reply */}
        <div id="forum-compose-anchor"></div>
        {user && !thread.locked && composeMode.kind === 'reply' && (
          <ForumReplyForm
            parentId={composeMode.parentId}
            replies={thread.replies}
            busy={busy}
            onCancel={() => setComposeMode({ kind: 'thread' })}
            onSubmit={onSubmitReply}
          />
        )}
        {user && !thread.locked && composeMode.kind !== 'reply' && (
          <div className="text-center mt-6">
            <button className="forum-btn-primary" onClick={() => setComposeMode({ kind: 'reply', parentId: null })}>✎ 發表留言</button>
          </div>
        )}
        {!user && (
          <div className="forum-empty" style={{ padding: 24 }}>登入會員後即可留言</div>
        )}
        {thread.locked && (
          <div className="forum-empty" style={{ padding: 24 }}>🔒 此討論串已鎖定,目前不能新增留言</div>
        )}
      </div>
    </div>
  );
}

function ReplyTree({ repliesTree, parentId, depth, user, thread, onLike, editingReplyId, setEditingReplyId, onSaveEdit, onDelete, onReply, busy }) {
  const list = repliesTree[parentId] || [];
  if (list.length === 0) return null;
  return (
    <div className={depth > 0 ? 'forum-reply-children' : ''}>
      {list.map(r => {
        const isMine = user && r.author && r.author.id === user.id;
        const liked = user && (r.likes || []).includes(user.id);
        const isEditing = editingReplyId === r.id;
        return (
          <div key={r.id} className="forum-reply">
            <div className="forum-reply-header">
              <span className="forum-author-name">{r.author?.nickname}</span>
              {r.author?.job && <span className="forum-author-job">{r.author.job}</span>}
              <span className="forum-author-time">{forumRelativeTime(r.createdAt)}</span>
              {r.updatedAt && r.updatedAt !== r.createdAt && <span className="forum-author-time">(已編輯)</span>}
            </div>
            {isEditing ? (
              <ForumInlineEdit
                initialContent={r.contentHtml}
                onCancel={() => setEditingReplyId(null)}
                onSave={(html) => onSaveEdit(r.id, html)}
                busy={busy}
              />
            ) : (
              <div className="forum-reply-body" dangerouslySetInnerHTML={{ __html: r.contentHtml }} />
            )}
            {!isEditing && (
              <div className="forum-reply-actions">
                <button className={`forum-like-mini ${liked ? 'active' : ''}`} onClick={() => onLike(r.id)} disabled={!user}>
                  {liked ? '❤️' : '🤍'} {(r.likes || []).length || ''}
                </button>
                {user && !thread.locked && depth < 3 && (
                  <button className="forum-link" onClick={() => onReply(r.id)}>回覆</button>
                )}
                {isMine && !thread.locked && (
                  <>
                    <button className="forum-link" onClick={() => setEditingReplyId(r.id)}>編輯</button>
                    <button className="forum-link" style={{ color: 'var(--temple-red)' }} onClick={() => onDelete(r.id)}>刪除</button>
                  </>
                )}
              </div>
            )}
            {/* Children */}
            <ReplyTree repliesTree={repliesTree} parentId={r.id} depth={depth + 1}
                       user={user} thread={thread} onLike={onLike}
                       editingReplyId={editingReplyId} setEditingReplyId={setEditingReplyId}
                       onSaveEdit={onSaveEdit} onDelete={onDelete} onReply={onReply} busy={busy} />
          </div>
        );
      })}
    </div>
  );
}

// Attachment uploader / display component
function ForumAttachmentsField({ value, onChange }) {
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const fileRef = useRef(null);
  const { logout } = useContext(UserCtx);

  const onFile = async (file) => {
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert(`檔案過大: ${file.name} (${forumFormatBytes(file.size)})。單檔上限 10 MB`);
      return;
    }
    setUploading(true);
    setProgress(0);
    try {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const base64 = e.target.result.split(',')[1];
          const token = localStorage.getItem('jc_user_token');
          if (!token) {
            alert('請先登入會員才能上傳附件');
            setUploading(false);
            setProgress(0);
            if (fileRef.current) fileRef.current.value = '';
            return;
          }
          const r = await gasPost({
            action: 'forumUploadAttachment',
            token,
            base64,
            filename: file.name,
            mimeType: file.type
          });
          if (r.ok && r.attachment) {
            onChange([...(value || []), r.attachment]);
          } else if (r.error === 'session_expired') {
            await logout();
            alert('登入狀態驗證失敗 — 已自動登出。\n\n請到上方「會員」區重新登入,再試一次上傳附件。');
          } else {
            const errMap = {
              file_too_large: '檔案超過 10 MB 上限',
              login_required: '請先登入會員',
              blocked: '此帳號已被停用,無法上傳',
              missing_data: '檔案資料不完整'
            };
            alert(errMap[r.error] || ('上傳失敗: ' + (r.error || '')));
          }
        } catch (err) {
          alert('上傳失敗: ' + err.message);
        }
        setUploading(false);
        setProgress(0);
        if (fileRef.current) fileRef.current.value = '';
      };
      reader.onprogress = (e) => {
        if (e.lengthComputable) setProgress(Math.round((e.loaded / e.total) * 100));
      };
      reader.readAsDataURL(file);
    } catch (err) {
      setUploading(false);
      alert('檔案讀取失敗');
    }
  };

  const removeAt = (i) => onChange((value || []).filter((_, idx) => idx !== i));

  const list = value || [];

  return (
    <div className="forum-att-field">
      {list.length > 0 && (
        <div className="forum-att-list">
          {list.map((att, i) => (
            <div key={att.id} className="forum-att-card">
              <div className="forum-att-icon">{forumAttIcon(att.mimeType, att.filename)}</div>
              <div className="forum-att-info">
                <div className="forum-att-name">{att.filename}</div>
                <div className="forum-att-meta">{forumFormatBytes(att.size)}</div>
              </div>
              <button type="button" className="forum-att-remove" onClick={() => removeAt(i)} title="移除">✕</button>
            </div>
          ))}
        </div>
      )}
      <button type="button" className="forum-att-upload-btn" onClick={() => fileRef.current?.click()} disabled={uploading}>
        {uploading ? `上傳中⋯ ${progress > 0 ? progress + '%' : ''}` : '+ 加入附件'}
      </button>
      <input
        ref={fileRef}
        type="file"
        style={{ display: 'none' }}
        onChange={(e) => onFile(e.target.files[0])}
      />
    </div>
  );
}

function ForumAttachmentList({ attachments }) {
  if (!attachments || attachments.length === 0) return null;
  return (
    <div className="forum-att-display">
      <div className="forum-att-display-title">📎 附件 ({attachments.length})</div>
      <div className="forum-att-display-list">
        {attachments.map(att => (
          <a key={att.id} href={att.downloadUrl} target="_blank" rel="noreferrer" className="forum-att-card forum-att-card-clickable" title="點擊下載">
            <div className="forum-att-icon">{forumAttIcon(att.mimeType, att.filename)}</div>
            <div className="forum-att-info">
              <div className="forum-att-name">{att.filename}</div>
              <div className="forum-att-meta">{forumFormatBytes(att.size)} · 下載 ↓</div>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
}

function forumFormatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

function forumAttIcon(mime, filename) {
  const lower = (filename || '').toLowerCase();
  const m = (mime || '').toLowerCase();
  if (m.startsWith('image/')) return '🖼';
  if (m === 'application/pdf' || lower.endsWith('.pdf')) return '📄';
  if (lower.match(/\.(docx?|odt|rtf)$/) || m.includes('word')) return '📝';
  if (lower.match(/\.(xlsx?|csv|ods)$/) || m.includes('sheet') || m.includes('excel')) return '📊';
  if (lower.match(/\.(pptx?|odp)$/) || m.includes('presentation')) return '📽';
  if (lower.match(/\.(zip|rar|7z|tar|gz)$/) || m.includes('zip') || m.includes('compressed')) return '🗜';
  if (lower.match(/\.(mp4|mov|avi|mkv|webm)$/) || m.startsWith('video/')) return '🎬';
  if (lower.match(/\.(mp3|wav|m4a|flac|ogg)$/) || m.startsWith('audio/')) return '🎵';
  if (lower.match(/\.(txt|md|log)$/) || m.startsWith('text/')) return '📃';
  return '📎';
}

// Lightweight contentEditable rich-text editor with image upload
function ForumRichEditor({ editorRef, initialContent, placeholder, compact }) {
  const fileRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const { logout } = useContext(UserCtx);

  useEffect(() => {
    if (editorRef.current && initialContent !== undefined) {
      editorRef.current.innerHTML = initialContent || '';
    }
  }, []);

  const exec = (cmd, val) => {
    document.execCommand(cmd, false, val);
    editorRef.current?.focus();
  };

  const handleImage = async (file) => {
    if (!file) return;
    const token = localStorage.getItem('jc_user_token');
    if (!token) {
      alert('請先登入會員才能上傳圖片');
      return;
    }
    setUploading(true);
    try {
      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const r = await gasPost({ action: 'forumUploadImage', token, base64, filename: file.name, mimeType: file.type });
        if (r.ok) {
          const img = `<p><img src="${r.url}" alt="${r.filename || ''}" style="max-width: 100%; height: auto; border-radius: 4px;" /></p>`;
          document.execCommand('insertHTML', false, img);
        } else {
          if (r.error === 'session_expired') {
            // Token in localStorage but server doesn't recognize it — likely expired or wiped
            // Force-logout to sync UI state, but don't reload page (preserve user's draft)
            await logout();
            alert('登入狀態驗證失敗 — 已自動登出。\n\n您剛才打的內容仍會保留在編輯器中,請複製起來,然後到上方「會員」區重新登入,再貼回去重試上傳圖片。');
          } else if (r.error === 'login_required') {
            alert('請先登入會員才能上傳圖片');
          } else if (r.error === 'blocked') {
            alert('此帳號已被停用,無法上傳');
          } else {
            alert('圖片上傳失敗: ' + (r.error || '未知錯誤'));
          }
        }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = '';
      };
      reader.readAsDataURL(file);
    } catch (err) {
      setUploading(false);
      alert('上傳失敗');
    }
  };

  return (
    <div className="forum-editor">
      <div className="forum-editor-toolbar">
        <button type="button" onClick={() => exec('bold')} title="粗體"><strong>B</strong></button>
        <button type="button" onClick={() => exec('italic')} title="斜體"><em>I</em></button>
        <button type="button" onClick={() => exec('underline')} title="底線" style={{ textDecoration: 'underline' }}>U</button>
        <span className="forum-editor-divider"></span>
        <button type="button" onClick={() => exec('insertUnorderedList')} title="項目符號">• 列表</button>
        <button type="button" onClick={() => {
          const url = prompt('輸入連結網址 (https://...)');
          if (url) exec('createLink', url);
        }} title="連結">🔗</button>
        <span className="forum-editor-divider"></span>
        <button type="button" onClick={() => fileRef.current?.click()} disabled={uploading}>
          {uploading ? '上傳中⋯' : '🖼 圖片'}
        </button>
        <input type="file" ref={fileRef} accept="image/*" style={{ display: 'none' }}
               onChange={(e) => handleImage(e.target.files[0])} />
      </div>
      <div
        ref={editorRef}
        className={`forum-editor-area ${compact ? 'compact' : ''}`}
        contentEditable
        suppressContentEditableWarning
        data-placeholder={placeholder || '請輸入內容...'}
      />
    </div>
  );
}

function forumRelativeTime(iso) {
  if (!iso) return '';
  const t = new Date(iso); const now = new Date();
  const diff = (now - t) / 1000;
  if (diff < 60) return '剛剛';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + ' 天前';
  return t.toLocaleDateString('zh-TW');
}

function forumFullTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('zh-TW', { dateStyle: 'medium', timeStyle: 'short' });
}

function stripHtml(s) { return String(s || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim(); }

function useCalendarData() {
  const [data, setData] = useState(null);
  useEffect(() => {
    gasPost({ action: 'calendarGetData' }).then(r => {
      if (r.ok && r.data) {
        // Normalize all event dates (some may be in "2026/5/16" format from old CSV imports)
        const normalized = {
          ...r.data,
          events: (r.data.events || []).map(e => ({
            ...e,
            startDate: canonicalDateStr(e.startDate),
            endDate: canonicalDateStr(e.endDate || e.startDate)
          }))
        };
        setData(normalized);
      }
    }).catch(() => {});
  }, []);
  return data;
}

function calCategoryById(cats, id) {
  return (cats || []).find(c => c.id === id) || { id: 'other', name: '其他', icon: '·', color: '#6b6359' };
}

function calFormatDateRange(start, end, lang) {
  if (!start) return '';
  if (!end || end === start) return start;
  return `${start} ~ ${end}`;
}

function calIsActive(ev, dateStr) {
  // Returns true if `dateStr` is between startDate and endDate (inclusive)
  if (!ev.startDate) return false;
  const end = ev.endDate || ev.startDate;
  return dateStr >= ev.startDate && dateStr <= end;
}

function calMonthDays(year, month) {
  // month is 0-indexed
  const days = [];
  const first = new Date(year, month, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  // Add leading blanks
  for (let i = 0; i < startWeekday; i++) days.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    days.push({ day: d, dateStr: dStr });
  }
  // Pad to multiple of 7
  while (days.length % 7) days.push(null);
  return days;
}

function CalendarMiniSection({ data, anchorId }) {
  const calData = useCalendarData();
  const layout = data.miniLayout || 'list';  // list | carousel | strip

  if (!calData) {
    return (
      <section id={anchorId} className="cal-mini-section">
        <div className="max-w-5xl mx-auto px-6 py-12 text-center" style={{ color: 'var(--ink-mute)' }}>
          載入中⋯
        </div>
      </section>
    );
  }

  const today = new Date();
  const todayStr = formatYmdLocal(today);
  const yearMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

  // Filter mode: "month" = this calendar month, "next" = next N upcoming (default)
  const mode = data.filterMode || 'next';
  const defaultLimit = layout === 'strip' ? 6 : 3;
  const limit = parseInt(data.limit, 10) || defaultLimit;

  const allUpcoming = (calData.events || [])
    .filter(e => (e.endDate || e.startDate) >= todayStr)
    .sort((a, b) => (a.startDate + (a.startTime || '')).localeCompare(b.startDate + (b.startTime || '')));

  const upcoming = (mode === 'month'
    ? allUpcoming.filter(e =>
        (e.startDate || '').startsWith(yearMonth) ||
        (e.endDate || '').startsWith(yearMonth) ||
        ((e.startDate || '') < `${yearMonth}-01` && (e.endDate || e.startDate) >= todayStr)
      )
    : allUpcoming
  ).slice(0, limit);

  const linkBase = data.fullCalendarUrl || '';

  return (
    <section id={anchorId} className={`cal-mini-section cal-mini-${layout}`}>
      <div className="max-w-5xl mx-auto px-6 lg:px-12 py-12">
        <div className="cal-mini-header reveal">
          <div>
            {data.eyebrow && <div className="eyebrow mb-2" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
            {data.titleHtml
              ? <HtmlContent className="font-serif-tc text-2xl font-light" html={data.titleHtml} />
              : <h2 className="font-serif-tc text-2xl font-light">{mode === 'month' ? '本月活動' : '近期活動'}</h2>}
            <div className="cal-mini-subtitle">
              {mode === 'month'
                ? `${today.getFullYear()} 年 ${today.getMonth() + 1} 月 · 共 ${upcoming.length} 場`
                : `${upcoming.length} 場即將到來的活動`}
            </div>
          </div>
          {linkBase && <a href={linkBase} className="cal-mini-more">查看完整行事曆 →</a>}
        </div>

        {upcoming.length === 0 ? (
          <div className="cal-mini-empty reveal">
            {mode === 'month' ? '本月暫無活動安排' : '目前無未來活動'}
          </div>
        ) : (
          <>
            {layout === 'list' && (
              <CalMiniList events={upcoming} cats={calData.categories} linkBase={linkBase} />
            )}
            {layout === 'carousel' && (
              <CalMiniCarousel events={upcoming} cats={calData.categories} linkBase={linkBase} interval={parseInt(data.carouselInterval, 10) || 6} />
            )}
            {layout === 'strip' && (
              <CalMiniStrip events={upcoming} cats={calData.categories} linkBase={linkBase} />
            )}
          </>
        )}
      </div>
    </section>
  );
}

// === Layout 1: Original vertical list ===
function CalMiniList({ events, cats, linkBase }) {
  return (
    <div className="cal-mini-list reveal">
      {events.map(ev => {
        const cat = calCategoryById(cats, ev.categoryId);
        const startDate = parseEventDate(ev.startDate);
        const endDate = parseEventDate(ev.endDate || ev.startDate);
        const isMultiDay = ev.endDate && ev.endDate !== ev.startDate;
        const inner = (
          <>
            <div className="cal-mini-date" style={{ borderColor: cat.color }}>
              <div className="cal-mini-day">{startDate.getDate()}</div>
              <div className="cal-mini-month">{startDate.getMonth() + 1} 月</div>
              {isMultiDay && <div className="cal-mini-multi">~{endDate.getMonth() + 1}/{endDate.getDate()}</div>}
            </div>
            <div className="cal-mini-info">
              <div className="cal-mini-cat-tag" style={{ background: cat.color + '20', color: cat.color }}>
                {cat.icon} {cat.name}
              </div>
              <div className="cal-mini-title">{ev.title}</div>
              <div className="cal-mini-meta">
                {ev.startTime && <span>🕐 {ev.startTime}{ev.endTime ? `–${ev.endTime}` : ''}</span>}
                {ev.location && <span>📍 {ev.location}</span>}
              </div>
            </div>
          </>
        );
        return linkBase
          ? <a key={ev.id} href={`${linkBase}?eventId=${ev.id}`} className="cal-mini-card cal-mini-clickable">{inner}</a>
          : <div key={ev.id} className="cal-mini-card">{inner}</div>;
      })}
    </div>
  );
}

// === Layout 2: Horizontal 3-card carousel (auto rotate background, but visible 3 at a time) ===
function CalMiniCarousel({ events, cats, linkBase, interval }) {
  // Show 3 events at a time, rotate to next 3 every `interval` seconds
  const [pageIdx, setPageIdx] = useState(0);
  const [paused, setPaused] = useState(false);
  // Each "page" = 3 events
  const pageSize = 3;
  const pages = [];
  for (let i = 0; i < events.length; i += pageSize) {
    pages.push(events.slice(i, i + pageSize));
  }

  useEffect(() => {
    if (paused || pages.length <= 1) return;
    const t = setInterval(() => setPageIdx(i => (i + 1) % pages.length), interval * 1000);
    return () => clearInterval(t);
  }, [pages.length, interval, paused]);

  const currentPage = pages[pageIdx] || pages[0] || [];

  return (
    <div className="cal-mini-carousel reveal" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <div className="cal-mini-carousel-grid" key={pageIdx}>
        {currentPage.map(ev => {
          const cat = calCategoryById(cats, ev.categoryId);
          const sd = parseEventDate(ev.startDate);
          const inner = (
            <>
              <div className="cal-mini-c-stripe" style={{ background: cat.color }}></div>
              <div className="cal-mini-c-body">
                <div className="cal-mini-c-date">
                  <span className="cal-mini-c-day">{sd.getDate()}</span>
                  <span className="cal-mini-c-mo">{sd.getMonth() + 1} 月</span>
                </div>
                <div className="cal-mini-c-cat" style={{ color: cat.color }}>{cat.icon} {cat.name}</div>
                <div className="cal-mini-c-title">{ev.title}</div>
                <div className="cal-mini-c-meta">
                  {ev.startTime && <span>{ev.startTime}{ev.endTime ? `–${ev.endTime}` : ''}</span>}
                  {ev.location && <span> · {ev.location}</span>}
                </div>
              </div>
            </>
          );
          return linkBase
            ? <a key={ev.id} href={`${linkBase}?eventId=${ev.id}`} className="cal-mini-c-card cal-mini-c-clickable">{inner}</a>
            : <div key={ev.id} className="cal-mini-c-card">{inner}</div>;
        })}
        {/* Fill empties so layout doesn't shift */}
        {currentPage.length < pageSize && Array.from({ length: pageSize - currentPage.length }).map((_, i) => (
          <div key={'empty-' + i} className="cal-mini-c-card cal-mini-c-empty"></div>
        ))}
      </div>
      {pages.length > 1 && (
        <div className="cal-mini-c-dots">
          {pages.map((_, i) => (
            <button key={i} className={`cal-mini-c-dot ${i === pageIdx ? 'active' : ''}`} onClick={() => setPageIdx(i)} aria-label={`第 ${i + 1} 頁`} />
          ))}
        </div>
      )}
    </div>
  );
}

function CalendarFeatureSection({ data, anchorId }) {
  const calData = useCalendarData();
  const layout = data.layout || 'hero-side';   // hero-side | carousel | triple | mini-month
  const limit = parseInt(data.limit, 10) || (layout === 'carousel' ? 8 : 3);
  const showFields = data.showFields || ['date', 'category', 'time', 'location'];
  const has = (f) => showFields.includes(f);
  const linkBase = data.fullCalendarUrl || '';

  if (!calData) {
    return (
      <section id={anchorId} className="cal-feat-section">
        <div className="max-w-6xl mx-auto px-6 lg:px-12 py-16 text-center" style={{ color: 'var(--ink-mute)' }}>載入中⋯</div>
      </section>
    );
  }

  const today = new Date();
  const todayStr = formatYmdLocal(today);
  const events = (calData.events || [])
    .filter(e => (e.endDate || e.startDate) >= todayStr)
    .sort((a, b) => (a.startDate + (a.startTime || '')).localeCompare(b.startDate + (b.startTime || '')))
    .slice(0, limit);

  if (events.length === 0) {
    return (
      <section id={anchorId} className="cal-feat-section">
        <div className="max-w-6xl mx-auto px-6 lg:px-12 py-20">
          <div className="cal-feat-header reveal">
            {data.eyebrow && <div className="eyebrow mb-3" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
            {data.titleHtml
              ? <HtmlContent className="font-serif-tc text-4xl lg:text-5xl font-light" html={data.titleHtml} />
              : <h2 className="font-serif-tc text-4xl lg:text-5xl font-light">近期活動</h2>}
          </div>
          <div className="cal-feat-empty reveal">目前無未來活動安排</div>
        </div>
      </section>
    );
  }

  const cats = calData.categories || [];
  const linkFor = (e) => linkBase ? `${linkBase}?eventId=${e.id}` : '';

  return (
    <section id={anchorId} className="cal-feat-section">
      <div className="max-w-6xl mx-auto px-6 lg:px-12 py-20">
        {/* Header */}
        <div className="cal-feat-header reveal">
          <div>
            {data.eyebrow && <div className="eyebrow mb-3" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
            {data.titleHtml
              ? <HtmlContent className="font-serif-tc text-4xl lg:text-5xl font-light" html={data.titleHtml} />
              : <h2 className="font-serif-tc text-4xl lg:text-5xl font-light">近期活動</h2>}
            {data.description && <p className="cal-feat-desc">{data.description}</p>}
          </div>
          {linkBase && <a href={linkBase} className="cal-feat-more">查看完整行事曆 →</a>}
        </div>

        {/* Layouts */}
        {layout === 'hero-side' && <CalFeatHeroSide events={events} cats={cats} linkFor={linkFor} has={has} />}
        {layout === 'carousel' && <CalFeatCarousel events={events} cats={cats} linkFor={linkFor} has={has} interval={parseInt(data.carouselInterval, 10) || 5} />}
        {layout === 'triple' && <CalFeatTriple events={events} cats={cats} linkFor={linkFor} has={has} />}
        {layout === 'mini-month' && <CalFeatMiniMonth events={(calData.events || []).filter(e => (e.endDate || e.startDate) >= todayStr)} allFutureEvents={events} cats={cats} linkFor={linkFor} has={has} />}
      </div>
    </section>
  );
}

// Helper — extract + render card pieces (shared across layouts)
function CalFeatCard({ event, cat, linkFor, has, size }) {
  const sd = new Date(event.startDate + 'T00:00:00');
  const ed = new Date((event.endDate || event.startDate) + 'T00:00:00');
  const isMulti = event.endDate && event.endDate !== event.startDate;
  const linkTarget = linkFor(event);
  const sizeCls = size === 'large' ? 'cal-feat-card-large' : size === 'wide' ? 'cal-feat-card-wide' : '';
  const Wrapper = linkTarget ? 'a' : 'div';
  const wrapperProps = linkTarget ? { href: linkTarget } : {};

  return (
    <Wrapper className={`cal-feat-card ${sizeCls}`} style={{ '--cat-color': cat.color }} {...wrapperProps}>
      {/* Color stripe */}
      <div className="cal-feat-stripe" style={{ background: cat.color }}></div>

      <div className="cal-feat-card-body">
        {/* Date stamp (top) */}
        {has('date') && (
          <div className="cal-feat-date">
            <div className="cal-feat-date-day">{sd.getDate()}</div>
            <div className="cal-feat-date-mo">{['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'][sd.getMonth()]}</div>
            {isMulti && (
              <div className="cal-feat-date-multi">~ {ed.getMonth() + 1}/{ed.getDate()}</div>
            )}
            <div className="cal-feat-date-year">{sd.getFullYear()}</div>
          </div>
        )}

        {/* Category tag */}
        {has('category') && (
          <span className="cal-feat-cat" style={{ background: cat.color + '22', color: cat.color }}>
            {cat.icon} {cat.name}
          </span>
        )}

        {/* Title */}
        <h3 className="cal-feat-title">{event.title}</h3>

        {/* Description (only on hero/carousel) */}
        {has('description') && event.description && size && (
          <p className="cal-feat-desc-text">{event.description}</p>
        )}

        {/* Meta — time + location */}
        {(has('time') || has('location')) && (
          <div className="cal-feat-meta">
            {has('time') && (event.startTime || event.allDay) && (
              <span className="cal-feat-meta-row">
                <span className="cal-feat-meta-icon">🕐</span>
                {event.allDay || !event.startTime ? '全日' : event.startTime + (event.endTime ? `–${event.endTime}` : '')}
              </span>
            )}
            {has('location') && event.location && (
              <span className="cal-feat-meta-row">
                <span className="cal-feat-meta-icon">📍</span>
                {event.location}
              </span>
            )}
          </div>
        )}

        {/* CTA hint */}
        {linkTarget && (
          <div className="cal-feat-cta">查看詳情 →</div>
        )}
      </div>
    </Wrapper>
  );
}

// Layout 1: hero (large) + 2 small wide cards
function CalFeatHeroSide({ events, cats, linkFor, has }) {
  const catById = (id) => cats.find(c => c.id === id) || { name: '其他', icon: '·', color: '#6b6359' };
  const [hero, ...rest] = events;
  const sides = rest.slice(0, 2);
  return (
    <div className="cal-feat-hero-side reveal">
      <div className="cal-feat-hero-col">
        <CalFeatCard event={hero} cat={catById(hero.categoryId)} linkFor={linkFor} has={has} size="large" />
      </div>
      <div className="cal-feat-side-col">
        {sides.map(e => (
          <CalFeatCard key={e.id} event={e} cat={catById(e.categoryId)} linkFor={linkFor} has={has} size="wide" />
        ))}
        {sides.length === 0 && (
          <div className="cal-feat-empty-side">僅一場近期活動</div>
        )}
      </div>
    </div>
  );
}

// Layout 2: full-width carousel
function CalFeatCarousel({ events, cats, linkFor, has, interval }) {
  const [idx, setIdx] = useState(0);
  const [paused, setPaused] = useState(false);
  const catById = (id) => cats.find(c => c.id === id) || { name: '其他', icon: '·', color: '#6b6359' };

  useEffect(() => {
    if (paused || events.length <= 1) return;
    const t = setInterval(() => setIdx(i => (i + 1) % events.length), interval * 1000);
    return () => clearInterval(t);
  }, [events.length, interval, paused]);

  const cur = events[idx];
  return (
    <div className="cal-feat-carousel reveal" onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <div className="cal-feat-carousel-stage">
        <CalFeatCard key={cur.id} event={cur} cat={catById(cur.categoryId)} linkFor={linkFor} has={has} size="large" />
      </div>
      <div className="cal-feat-carousel-controls">
        <button className="cal-feat-arrow" onClick={() => setIdx(i => (i - 1 + events.length) % events.length)} aria-label="上一個">‹</button>
        <div className="cal-feat-dots">
          {events.map((_, i) => (
            <button key={i} className={`cal-feat-dot ${i === idx ? 'active' : ''}`} onClick={() => setIdx(i)} aria-label={`第 ${i + 1} 個`} />
          ))}
        </div>
        <button className="cal-feat-arrow" onClick={() => setIdx(i => (i + 1) % events.length)} aria-label="下一個">›</button>
      </div>
    </div>
  );

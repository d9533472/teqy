// Layout 4: mini month grid + featured event
function CalFeatMiniMonth({ events, allFutureEvents, cats, linkFor, has }) {
  const catById = (id) => cats.find(c => c.id === id) || { name: '其他', icon: '·', color: '#6b6359' };
  const today = new Date();
  const cursor = new Date(today.getFullYear(), today.getMonth(), 1);
  const days = calMonthDays(cursor.getFullYear(), cursor.getMonth());
  const todayStr = formatYmdLocal(today);
  const yearMonth = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}`;

  // Build event-by-date for this month
  const eventsByDate = {};
  events.forEach(ev => {
    let d = ev.startDate;
    const end = ev.endDate || ev.startDate;
    while (d <= end) {
      if (d.startsWith(yearMonth)) {
        if (!eventsByDate[d]) eventsByDate[d] = [];
        eventsByDate[d].push(ev);
      }
      d = addDaysStr(d, 1);
    }
  });

  // Featured = first 3 upcoming
  const featured = allFutureEvents.slice(0, 3);

  return (
    <div className="cal-feat-mm reveal">
      {/* Mini month grid */}
      <div className="cal-feat-mm-cal">
        <div className="cal-feat-mm-month">
          {cursor.getFullYear()} 年 {cursor.getMonth() + 1} 月
        </div>
        <div className="cal-feat-mm-weekdays">
          {['日','一','二','三','四','五','六'].map(d => <div key={d}>{d}</div>)}
        </div>
        <div className="cal-feat-mm-grid">
          {days.map((d, i) => {
            if (!d) return <div key={i} className="cal-feat-mm-cell empty"></div>;
            const evs = eventsByDate[d.dateStr] || [];
            const isToday = d.dateStr === todayStr;
            const dotColors = [...new Set(evs.map(e => catById(e.categoryId).color))].slice(0, 3);
            return (
              <div key={i} className={`cal-feat-mm-cell ${isToday ? 'today' : ''} ${evs.length > 0 ? 'has-event' : ''}`}>
                <div className="cal-feat-mm-day">{d.day}</div>
                {evs.length > 0 && (
                  <div className="cal-feat-mm-dots">
                    {dotColors.map((c, j) => (
                      <span key={j} className="cal-feat-mm-dot" style={{ background: c }}></span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
      {/* Featured upcoming list */}
      <div className="cal-feat-mm-list">
        <div className="cal-feat-mm-list-title">近期活動</div>
        {featured.map(e => {
          const cat = catById(e.categoryId);
          const sd = new Date(e.startDate + 'T00:00:00');
          const linkTarget = linkFor(e);
          const Wrapper = linkTarget ? 'a' : 'div';
          const wrapperProps = linkTarget ? { href: linkTarget } : {};
          return (
            <Wrapper key={e.id} className="cal-feat-mm-item" {...wrapperProps}>
              <div className="cal-feat-mm-item-date" style={{ borderColor: cat.color }}>
                <div className="cal-feat-mm-item-d">{sd.getDate()}</div>
                <div className="cal-feat-mm-item-m">{sd.getMonth() + 1}月</div>
              </div>
              <div className="cal-feat-mm-item-info">
                {has('category') && (
                  <span className="cal-feat-cat" style={{ background: cat.color + '22', color: cat.color, fontSize: 11 }}>
                    {cat.icon} {cat.name}
                  </span>
                )}
                <div className="cal-feat-mm-item-title">{e.title}</div>
                {(has('time') && e.startTime) && (
                  <div className="cal-feat-mm-item-meta">🕐 {e.startTime}{e.endTime ? `–${e.endTime}` : ''}</div>
                )}
                {(has('location') && e.location) && (
                  <div className="cal-feat-mm-item-meta">📍 {e.location}</div>
                )}
              </div>
            </Wrapper>
          );
        })}

function CalendarFullSection({ data, anchorId }) {
  const calData = useCalendarData();
  const today = new Date();
  const [viewMode, setViewMode] = useState('month'); // month | week | list
  const [cursor, setCursor] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDate, setSelectedDate] = useState(formatYmdLocal(today));
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [filterCat, setFilterCat] = useState('');

  // Open from query string ?eventId=
  useEffect(() => {
    if (!calData) return;
    const params = new URLSearchParams(window.location.search);
    const eid = params.get('eventId');
    if (eid) {
      const ev = (calData.events || []).find(e => e.id === eid);
      if (ev) {
        setSelectedEvent(ev);
        const d = parseEventDate(ev.startDate);
        if (!isNaN(d.getTime())) {
          setCursor(new Date(d.getFullYear(), d.getMonth(), 1));
          setSelectedDate(canonicalDateStr(ev.startDate));
        }
      }
    }
  }, [calData]);

  // IMPORTANT: useMemo MUST be called every render (before any early return)
  // otherwise React throws "Rendered fewer hooks than expected" and the whole component crashes silently
  const events = useMemo(() => {
    if (!calData) return [];
    return (calData.events || []).filter(e => !filterCat || e.categoryId === filterCat);
  }, [calData, filterCat]);

  const eventsByDate = useMemo(() => {
    const map = {};
    events.forEach(ev => {
      const start = canonicalDateStr(ev.startDate);
      const end = canonicalDateStr(ev.endDate || ev.startDate);
      if (!start) return;
      // Add to every date in range
      let d = start;
      let safety = 0;  // prevent infinite loop if dates are bad
      while (d <= end && safety < 400) {
        if (!map[d]) map[d] = [];
        map[d].push(ev);
        d = addDaysStr(d, 1);
        safety++;
      }
    });
    return map;
  }, [events]);

  if (!calData) {
    return (
      <section id={anchorId} className="cal-full-section">
        <div className="max-w-6xl mx-auto px-6 py-16 text-center" style={{ color: 'var(--ink-mute)' }}>
          載入中⋯
        </div>
      </section>
    );
  }

  const goPrev = () => {
    if (viewMode === 'week') {
      const d = new Date(cursor);
      d.setDate(d.getDate() - 7);
      setCursor(d);
    } else {
      setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1));
    }
  };
  const goNext = () => {
    if (viewMode === 'week') {
      const d = new Date(cursor);
      d.setDate(d.getDate() + 7);
      setCursor(d);
    } else {
      setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1));
    }
  };
  const goToday = () => {
    setCursor(new Date(today.getFullYear(), today.getMonth(), 1));
    setSelectedDate(formatYmdLocal(today));
  };

  const titleStr = (() => {
    if (viewMode === 'week') {
      const start = new Date(cursor);
      start.setDate(start.getDate() - start.getDay());
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      return `${start.getFullYear()}/${start.getMonth() + 1}/${start.getDate()} – ${end.getMonth() + 1}/${end.getDate()}`;
    }
    return `${cursor.getFullYear()} 年 ${cursor.getMonth() + 1} 月`;
  })();

  return (
    <section id={anchorId} className="cal-full-section">
      <div className="max-w-6xl mx-auto px-6 lg:px-12 py-16">
        {/* Header */}
        <div className="text-center mb-10 reveal">
          {data.eyebrow && <div className="eyebrow mb-3" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
          {data.titleHtml
            ? <HtmlContent className="font-serif-tc text-4xl lg:text-5xl font-light mb-3" html={data.titleHtml} />
            : <h2 className="font-serif-tc text-4xl lg:text-5xl font-light mb-3">行事曆</h2>}
          {data.description && <p className="max-w-2xl mx-auto" style={{ color: 'var(--ink-light)' }}>{data.description}</p>}
        </div>

        {/* Toolbar */}
        <div className="cal-toolbar reveal">
          <div className="cal-nav">
            <button onClick={goPrev} className="cal-nav-btn" aria-label="上個月">‹</button>
            <button onClick={goToday} className="cal-today-btn">今天</button>
            <button onClick={goNext} className="cal-nav-btn" aria-label="下個月">›</button>
            <div className="cal-title">{titleStr}</div>
          </div>
          <div className="cal-mode">
            <button className={viewMode === 'month' ? 'active' : ''} onClick={() => setViewMode('month')}>月</button>
            <button className={viewMode === 'week' ? 'active' : ''} onClick={() => setViewMode('week')}>週</button>
            <button className={viewMode === 'list' ? 'active' : ''} onClick={() => setViewMode('list')}>列表</button>
          </div>
        </div>

        {/* Category filter */}
        <div className="cal-cat-filter reveal">
          <button className={!filterCat ? 'active' : ''} onClick={() => setFilterCat('')}>全部分類</button>
          {(calData.categories || []).map(c => (
            <button key={c.id} className={filterCat === c.id ? 'active' : ''} onClick={() => setFilterCat(c.id)}
                    style={filterCat === c.id ? { background: c.color, borderColor: c.color, color: '#fff' } : {}}>
              {c.icon} {c.name}
            </button>
          ))}
        </div>

        {/* Calendar body */}
        {viewMode === 'month' && (
          <CalendarMonthGrid
            cursor={cursor}
            eventsByDate={eventsByDate}
            categories={calData.categories}
            selectedDate={selectedDate}
            onSelectDate={setSelectedDate}
            onSelectEvent={setSelectedEvent}
          />
        )}
        {viewMode === 'week' && (
          <CalendarWeekView
            cursor={cursor}
            eventsByDate={eventsByDate}
            categories={calData.categories}
            onSelectEvent={setSelectedEvent}
          />
        )}
        {viewMode === 'list' && (
          <CalendarListView
            cursor={cursor}
            events={events}
            categories={calData.categories}
            onSelectEvent={setSelectedEvent}
          />
        )}

        {/* Selected day detail (under month view) */}
        {viewMode === 'month' && selectedDate && (
          <CalendarDayDetail
            date={selectedDate}
            events={eventsByDate[selectedDate] || []}
            categories={calData.categories}
            onSelectEvent={setSelectedEvent}
          />
        )}

        {/* Event modal */}
        {selectedEvent && (
          <CalendarEventModal
            event={selectedEvent}
            categories={calData.categories}
            onClose={() => setSelectedEvent(null)}
          />
        )}
      </div>
    </section>
  );
}

function formatYmdLocal(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// Normalize a stored date string to YYYY-MM-DD (handles "2026/5/16", "2026.5.16", or already-clean "2026-05-16")
function canonicalDateStr(s) {
  if (!s) return '';
  const str = String(s).trim();
  // Already YYYY-MM-DD
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
  // YYYY/M/D or YYYY.M.D
  m = str.match(/^(\d{4})[\/.](\d{1,2})[\/.](\d{1,2})$/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2, '0')}-${String(m[3]).padStart(2, '0')}`;
  // Has a T (already an ISO with time) — extract date part
  if (str.includes('T')) {
    const datePart = str.split('T')[0];
    return canonicalDateStr(datePart);
  }
  return str;  // fallback (still might be invalid but we tried)
}

// Safe date parser — turns any of the stored formats into a Date at midnight local
function parseEventDate(s) {
  const canon = canonicalDateStr(s);
  if (!canon) return new Date(NaN);
  return new Date(canon + 'T00:00:00');
}

function addDaysStr(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return formatYmdLocal(d);
}

            title={user ? `${user.nickname} (點擊開啟會員中心)` : '登入 / 註冊'}
            aria-label={user ? '會員中心' : '登入'}
          >
            {user ? (
              <span className="nav-auth-avatar">{(user.nickname || '?').slice(0, 1)}</span>
            ) : (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
              </svg>
            )}
          </button>

          {ctaButton && ctaButton.label && (
            <a href={ctaButton.url || '#'} target={ctaButton.url?.startsWith('http') ? '_blank' : '_self'} className="btn-primary px-6 py-2.5 text-sm">
              <span>{ctaButton.label}</span>
            </a>
          )}
        </div>
        <button className="mobile-menu-btn p-2" onClick={onMobileToggle} aria-label="menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
      </div>
    </nav>
  );
}

function MobileMenu({ open, onClose, navigation, ctaButton, onOpenAuth }) {
  const { user } = useContext(UserCtx);
  // Track which top-level items are expanded (accordion)
  const [expanded, setExpanded] = useState({});
  const toggle = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
  const handleAuth = () => {
    onClose();
    setTimeout(() => onOpenAuth(), 200);  // wait for mobile menu to slide out
  };
  return (
    <div className={`mobile-menu ${open ? 'open' : ''}`}>
      <button className="absolute top-6 right-6 p-2" onClick={onClose} aria-label="close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
      <div className="font-serif-tc space-y-6 text-2xl" style={{ color: 'var(--ink)' }}>
        {(navigation || []).map(item => {
          const hasChildren = item.children && item.children.length > 0;
          const isOpen = !!expanded[item.id];
          if (hasChildren) {
            return (
              <div key={item.id} className="mobile-nav-group">
                <div className="mobile-nav-trigger" onClick={() => toggle(item.id)}>
                  <span>{item.label}</span>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"
                       style={{ transform: isOpen ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.3s' }}>
                    <path d="M6 9l6 6 6-6"/>
                  </svg>
                </div>
                <div className={`mobile-nav-children ${isOpen ? 'open' : ''}`}>
                  {/* parent itself, in case the user wants to navigate to the parent's anchor/page */}
                  {item.target && (
                    <a href={navTargetUrl(item)} target={item.type === 'external' ? '_blank' : '_self'} className="block" onClick={onClose}>
                      <span style={{ opacity: 0.7 }}>· {item.label}(總覽)</span>
                    </a>
                  )}
                  {item.children.map(c => (
                    <a key={c.id} href={navTargetUrl(c)} target={c.type === 'external' ? '_blank' : '_self'} className="block" onClick={onClose}>
                      <span>· {c.label}</span>
                    </a>
                  ))}
                </div>
              </div>
            );
          }
          return (
            <a key={item.id} href={navTargetUrl(item)} target={item.type === 'external' ? '_blank' : '_self'} className="block" onClick={onClose}>{item.label}</a>
          );
        })}

        {/* Auth button — circle avatar style */}
        <button type="button" className="mobile-nav-auth" onClick={handleAuth}>
          {user ? (
            <>
              <span className="mobile-nav-auth-avatar">{(user.nickname || '?').slice(0, 1)}</span>
              <span style={{ fontSize: '1.4rem' }}>{user.nickname} 會員中心</span>
            </>
          ) : (
            <>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
              </svg>
              <span style={{ fontSize: '1.4rem' }}>登入 / 註冊</span>
            </>
          )}
        </button>

        {ctaButton && ctaButton.label && (
          <a href={ctaButton.url || '#'} target={ctaButton.url?.startsWith('http') ? '_blank' : '_self'} className="btn-primary inline-block px-8 py-3 text-base mt-4">
            <span>{ctaButton.label}</span>
          </a>
        )}
      </div>
    </div>
  );
}

              {(navigation || []).map(item => (

// ============================================================
// App
// ============================================================

function App() {
  const [content, setContent] = useState(null);
  const [visits, setVisits] = useState(null);
  const [error, setError] = useState(null);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [authOpen, setAuthOpen] = useState(false);
  const [user, setUser] = useState(null);
  const route = useHashRoute();
  useReveal();

  // Restore user session from localStorage on mount
  useEffect(() => {
    const token = localStorage.getItem('jc_user_token');
    if (!token) return;
    gasPost({ action: 'userGetMe', token })
      .then(r => {
        if (r.ok) {
          setUser(r.user);
        } else {
          // Token in localStorage but server doesn't recognize it — clean up fully
          localStorage.removeItem('jc_user_token');
          setUser(null);
        }
      })
      .catch(() => {
        // Network error — leave token alone, will retry next mount
      });
  }, []);

  const userLogin = (userObj, token) => {
    setUser(userObj);
    if (token) localStorage.setItem('jc_user_token', token);
  };
  const userLogout = async () => {
    const token = localStorage.getItem('jc_user_token');
    localStorage.removeItem('jc_user_token');
    setUser(null);
    if (token) gasPost({ action: 'userLogout', token }).catch(() => {});
  };
  const refreshUser = async () => {
    const token = localStorage.getItem('jc_user_token');
    if (!token) return;
    const r = await gasPost({ action: 'userGetMe', token });
    if (r.ok) setUser(r.user);
  };

  useEffect(() => {
    gasGet('getContent')
      .then(r => {
        if (r.ok) {
          setContent(r.content);
          if (typeof r.visits === 'number') setVisits(r.visits);
        }
        else setError(r.error || 'load failed');
      })
      .catch(e => setError(String(e)));
  }, []);

  // Increment visit counter once per session
  useEffect(() => {
    if (!content) return;
    if (sessionStorage.getItem('jc_visit_counted')) return;
    sessionStorage.setItem('jc_visit_counted', '1');
    // Fire & forget — don't block UI
    const xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    xhr.onload = () => {
      try {
        const r = JSON.parse(xhr.responseText);
        if (r.ok && typeof r.visits === 'number') setVisits(r.visits);
      } catch (e) {}
    };
    xhr.onerror = () => {};
    xhr.send(JSON.stringify({ action: 'incrementVisits' }));
  }, [content]);

  // After content loads + route change, scroll to anchor or top
  useEffect(() => {
    if (!content) return;
    setTimeout(() => {
      if (route.type === 'home' && route.anchor) {
        const el = document.getElementById(route.anchor);
        if (el) {
          const top = el.getBoundingClientRect().top + window.pageYOffset - 72;
          window.scrollTo({ top, behavior: 'smooth' });
          return;
        }
      }
      if (!route.anchor) window.scrollTo({ top: 0, behavior: 'auto' });
    }, 50);
  }, [content, route]);

  if (error) {
    return (
      <div className="loading-screen">
        <div className="seal">!</div>
        <p className="font-serif-tc text-base" style={{ color: 'var(--ink-light)' }}>無法載入內容: {error}</p>
        <p className="text-xs" style={{ color: 'var(--ink-light)' }}>請確認 GAS_URL 設定正確</p>
      </div>
    );
  }

  if (!content) {
    return (
      <div className="loading-screen">
        <img src={BUNDLED_TEMPLE_LOGO} alt="淨慈寺" className="loading-logo loading-seal" />
        <p className="font-serif-tc text-sm" style={{ color: 'var(--ink-light)' }}>載入中⋯</p>
      </div>
    );
  }

  let currentPage;
  if (route.type === 'page') {
    currentPage = (content.pages || []).find(p => p.slug === route.slug);
  } else {
    currentPage = (content.pages || []).find(p => p.isHome) || content.pages?.[0];
  }

  if (!currentPage) {
    return (
      <div className="loading-screen">
        <div className="seal">?</div>
        <p className="font-serif-tc text-base" style={{ color: 'var(--ink-light)' }}>找不到頁面</p>
        <a href="#/" className="text-sm" style={{ color: 'var(--temple-red)' }}>← 返回首頁</a>
      </div>
    );
  }

  const showAdminFab = content.site.showAdminFab !== false; // default on
  const showVisitBadge = content.site.showVisitBadge !== false; // default on
  const visitLabel = content.site.visitLabel || '累計訪客';

  return (
    <ContentCtx.Provider value={{ albums: content.albums || [] }}>
    <UserCtx.Provider value={{ user, login: userLogin, logout: userLogout, refresh: refreshUser }}>
    <>
      <Nav site={content.site} navigation={content.navigation} ctaButton={{ label: content.site.ctaButtonLabel, url: content.site.ctaButtonUrl }} onMobileToggle={() => setMobileOpen(v => !v)} onOpenAuth={() => setAuthOpen(true)} />
      <MobileMenu open={mobileOpen} onClose={() => setMobileOpen(false)} navigation={content.navigation} ctaButton={{ label: content.site.ctaButtonLabel, url: content.site.ctaButtonUrl }} onOpenAuth={() => setAuthOpen(true)} />
      <AuthDrawer open={authOpen} onClose={() => setAuthOpen(false)} />
      <PageRenderer page={currentPage} />
      <Footer site={content.site} footer={content.footer} navigation={content.navigation} />
      <ResetPasswordModal />
      {showVisitBadge && typeof visits === 'number' && (
        <div className="visit-fab" title={`${visitLabel}: ${visits.toLocaleString()}`}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <span className="visit-fab-label">{visitLabel}</span>
          <span className="visit-fab-num">{visits.toLocaleString()}</span>
        </div>
      )}
      {showAdminFab && (
        <a href="admin.html" className="admin-fab" title="後台管理" aria-label="管理後台">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </a>
      )}
    </>
    </UserCtx.Provider>
    </ContentCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Smooth-scroll same-page anchors
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  const href = a.getAttribute('href');
  if (href === '#' || href.startsWith('#/')) return;
  const target = document.querySelector(href);
  if (target) {
    e.preventDefault();
    const top = target.getBoundingClientRect().top + window.pageYOffset - 72;
    window.scrollTo({ top, behavior: 'smooth' });
    history.replaceState(null, '', href);
  }
});

</script>
</body>
</html>

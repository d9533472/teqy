    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.05em;
  }
  .cal-feat-more:hover {
    background: var(--temple-red); color: var(--paper-warm); border-color: var(--temple-red);
  }
  .cal-feat-empty {
    text-align: center; padding: 60px 20px;
    color: var(--ink-mute);
    background: var(--paper-warm);
    border: 1px dashed rgba(184,134,11,0.3);
    border-radius: 4px;
    font-style: italic;
  }
  .cal-feat-empty-side {
    text-align: center; padding: 32px 16px;
    color: var(--ink-mute);
    background: rgba(184,134,11,0.06);
    border-radius: 4px;
    font-style: italic;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
  }

  /* === Generic card === */
  .cal-feat-card {
    position: relative;
    display: flex;
    background: var(--paper-warm);
    border: 1px solid rgba(184,134,11,0.18);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
    --cat-color: var(--gold);
  }
  a.cal-feat-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px -16px rgba(94,23,20,0.2);
    border-color: var(--cat-color);
  }
  .cal-feat-stripe {
    flex-shrink: 0;
    width: 6px;
    background: var(--cat-color);
  }
  .cal-feat-card-body {
    flex: 1;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 12px;
    min-width: 0;
  }
  .cal-feat-date {
    display: inline-flex; align-items: baseline;
    gap: 8px;
    font-family: 'Cormorant Garamond', serif;
    color: var(--temple-red);
    line-height: 1;
    flex-wrap: wrap;
  }
  .cal-feat-date-day {
    font-size: 3rem; font-weight: 500;
  }
  .cal-feat-date-mo {
    font-size: 1rem;
    font-style: italic;
    color: var(--gold);
  }
  .cal-feat-date-multi {
    font-size: 0.85rem;
    color: var(--gold);
    font-style: italic;
  }
  .cal-feat-date-year {
    font-size: 0.85rem;
    color: var(--ink-mute);
    letter-spacing: 0.1em;
  }
  .cal-feat-cat {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    align-self: flex-start;
    letter-spacing: 0.03em;
  }
  .cal-feat-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.4rem; font-weight: 500;
    color: var(--ink); line-height: 1.45;
    margin: 0;
  }
  .cal-feat-card-large .cal-feat-title { font-size: 1.85rem; }
  .cal-feat-desc-text {
    color: var(--ink-light);
    font-size: 14px; line-height: 1.7;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cal-feat-meta {
    display: flex; flex-wrap: wrap; gap: 16px;
    font-size: 13px; color: var(--ink-light);
    padding-top: 6px;
    border-top: 1px solid rgba(184,134,11,0.12);
  }
  .cal-feat-meta-row {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .cal-feat-meta-icon {
    color: var(--gold);
    font-size: 12px;
  }
  .cal-feat-cta {
    margin-top: auto;
    padding-top: 8px;
    color: var(--temple-red);
    font-size: 13px;
    letter-spacing: 0.1em;
    font-family: 'Noto Serif TC', serif;
    transition: transform 0.3s;
  }
  a.cal-feat-card:hover .cal-feat-cta { transform: translateX(4px); }

  /* === Layout 1: Hero + Side === */
  .cal-feat-hero-side {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 20px;
    min-height: 380px;
  }
  .cal-feat-hero-col { display: flex; }
  .cal-feat-hero-col .cal-feat-card { flex: 1; }
  .cal-feat-hero-col .cal-feat-card-body { padding: 36px 40px; }
  .cal-feat-hero-col .cal-feat-stripe { width: 8px; }
  .cal-feat-side-col {
    display: flex; flex-direction: column; gap: 20px;
  }
  .cal-feat-side-col .cal-feat-card { flex: 1; }
  .cal-feat-side-col .cal-feat-date-day { font-size: 2.2rem; }
  .cal-feat-side-col .cal-feat-title { font-size: 1.15rem; }
  .cal-feat-side-col .cal-feat-card-body { padding: 18px 22px; gap: 8px; }
  @media (max-width: 768px) {
    .cal-feat-hero-side { grid-template-columns: 1fr; }
    .cal-feat-hero-col .cal-feat-card-body { padding: 24px 22px; }
    .cal-feat-card-large .cal-feat-title { font-size: 1.4rem; }
    .cal-feat-date-day { font-size: 2.4rem !important; }
  }

  /* === Layout 2: Carousel === */
  .cal-feat-carousel {
    position: relative;
  }
  .cal-feat-carousel-stage {
    min-height: 320px;
  }
  .cal-feat-carousel-stage .cal-feat-card {
    width: 100%;
    min-height: 280px;
  }
  .cal-feat-carousel-stage .cal-feat-card-body {
    padding: 36px 40px;
  }
  .cal-feat-carousel-controls {
    display: flex; justify-content: center; align-items: center;
    gap: 16px; margin-top: 24px;
  }
  .cal-feat-arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--paper-warm);
    border: 1px solid rgba(184,134,11,0.3);
    color: var(--ink-light); font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .cal-feat-arrow:hover {
    background: var(--temple-red); color: var(--paper-warm); border-color: var(--temple-red);
  }
  .cal-feat-dots {
    display: flex; gap: 8px;
  }
  .cal-feat-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(184,134,11,0.25);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: all 0.3s;
  }
  .cal-feat-dot.active {
    background: var(--temple-red);
    width: 24px;
    border-radius: 999px;
  }
  @media (max-width: 768px) {
    .cal-feat-carousel-stage .cal-feat-card-body { padding: 24px 22px; }
  }

  /* === Layout 3: Triple === */
  .cal-feat-triple {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .cal-feat-triple .cal-feat-card-body { padding: 24px 26px; gap: 10px; }
  .cal-feat-triple .cal-feat-date-day { font-size: 2.2rem; }
  .cal-feat-triple .cal-feat-title { font-size: 1.2rem; }
  @media (max-width: 900px) {
    .cal-feat-triple { grid-template-columns: 1fr; }
  }

  /* === Layout 4: Mini Month === */
  .cal-feat-mm {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 32px;
    align-items: start;
  }
  .cal-feat-mm-cal {
    background: var(--paper-warm);
    border: 1px solid rgba(184,134,11,0.18);
    border-radius: 6px;
    padding: 20px;
  }
  .cal-feat-mm-month {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .cal-feat-mm-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 6px;
  }
  .cal-feat-mm-weekdays > div {
    text-align: center;
    font-size: 11px;
    color: var(--ink-mute);
    padding: 4px;
    letter-spacing: 0.1em;
  }
  .cal-feat-mm-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-feat-mm-cell {
    aspect-ratio: 1 / 1;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 4px 0 6px;
    background: rgba(245,239,228,0.5);
    border-radius: 4px;
    transition: all 0.2s;
  }
  .cal-feat-mm-cell.empty { background: transparent; }
  .cal-feat-mm-cell.has-event {
    background: var(--paper-deep);
    cursor: default;
  }
  .cal-feat-mm-cell.today {
    background: var(--temple-red);
    color: var(--paper-warm);
  }
  .cal-feat-mm-cell.today .cal-feat-mm-day {
    color: var(--paper-warm); font-weight: 600;
  }
  .cal-feat-mm-day {
    font-size: 13px;
    color: var(--ink);
  }
  .cal-feat-mm-dots {
    display: flex; gap: 2px; margin-top: 2px;
  }
  .cal-feat-mm-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
  }
  .cal-feat-mm-list {
    display: flex; flex-direction: column;
    gap: 12px;
  }
  .cal-feat-mm-list-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.15rem;
    color: var(--ink);
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(184,134,11,0.2);
    margin-bottom: 4px;
  }
  .cal-feat-mm-item {
    display: flex; gap: 14px;
    padding: 12px 14px;
    background: var(--paper-warm);
    border: 1px solid rgba(184,134,11,0.15);
    border-radius: 4px;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s;
  }
  a.cal-feat-mm-item:hover {
    transform: translateX(4px);
    border-color: var(--gold);
    box-shadow: 0 6px 14px -8px rgba(94,23,20,0.15);
  }
  .cal-feat-mm-item-date {
    flex-shrink: 0;
    width: 56px;
    border-left: 3px solid var(--gold);
    padding-left: 10px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .cal-feat-mm-item-d {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 500;
    color: var(--temple-red); line-height: 1;
  }
  .cal-feat-mm-item-m {
    font-size: 11px; color: var(--ink-mute);
    margin-top: 2px;
  }
  .cal-feat-mm-item-info {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .cal-feat-mm-item-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px; font-weight: 500;
    color: var(--ink); line-height: 1.4;
  }
  .cal-feat-mm-item-meta {
    font-size: 12px; color: var(--ink-light);
  }
  @media (max-width: 768px) {
    .cal-feat-mm { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .cal-cell { min-height: 64px; padding: 4px; }
    .cal-cell-day { font-size: 12px; }
    .cal-cell-event { font-size: 9px; padding: 1px 4px; }
    .cal-week { grid-template-columns: 1fr; }
    .cal-week-day { min-height: auto; }
    .cal-mini-card { gap: 12px; padding: 12px; }
    .cal-mini-date { width: 56px; }
    .cal-mini-day { font-size: 1.7rem; }
    .cal-modal-body { padding: 20px; }
  }

  /* Universal "Read more" link — appears at the bottom of various sections */
  .readmore-wrap {
    display: flex;
    margin-top: 40px;
  }
  .readmore-link {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 10px 24px 10px 28px;
    border: 1px solid var(--gold);
    border-radius: 999px;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px; letter-spacing: 0.15em;
    color: var(--temple-red);
    background: transparent;
    text-decoration: none;
    transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
    position: relative;
    overflow: hidden;
  }
  .readmore-link::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--temple-red);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    z-index: 0;
  }
  .readmore-link:hover {
    color: var(--paper-warm);
    border-color: var(--temple-red);
    box-shadow: 0 12px 28px -10px rgba(94,23,20,0.4);
  }
  .readmore-link:hover::before { transform: scaleX(1); }
  .readmore-link > * { position: relative; z-index: 1; }
  .readmore-arrow {
    display: inline-flex;
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .readmore-link:hover .readmore-arrow { transform: translateX(4px); }
  /* Variant when inside dark sections (quote/dark) */
  .quote-dark .readmore-link, .marquee-dark + section .readmore-link {
    color: var(--gold-light); border-color: var(--gold-light);
  }
  .quote-dark .readmore-link::before { background: var(--gold); }
  .quote-dark .readmore-link:hover { color: var(--ink); border-color: var(--gold); }

  /* Albums section */
  .albums-section {
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-deep) 100%);
  }
  .album-year-tabs {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    margin-bottom: 32px;
  }
  .album-year-tab {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px; letter-spacing: 0.1em;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .album-year-tab:hover { border-color: var(--gold); color: var(--temple-red); }
  .album-year-tab.active {
    background: var(--temple-red);
    color: var(--paper-warm);
    border-color: var(--temple-red);
  }

  .album-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  .album-card {
    display: flex; flex-direction: column;
    background: var(--paper-warm);
    border: 1px solid rgba(184,134,11,0.18);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    text-align: left;
    padding: 0;
    transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
    font-family: inherit;
  }
  .album-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 24px 40px -16px rgba(94,23,20,0.18);
    border-color: var(--gold);
  }
  .album-cover {
    aspect-ratio: 4/3;
    background-color: var(--paper-deep);
    background-size: cover; background-position: center;
    position: relative;
    overflow: hidden;
  }
  .album-cover-empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; opacity: 0.3;
  }
  .album-cover-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(26,20,16,0.7) 100%);
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 16px;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .album-card:hover .album-cover-overlay { opacity: 1; }
  .album-cover-cta {
    color: var(--paper-warm);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px; letter-spacing: 0.15em;
  }
  .album-meta {
    padding: 20px;
    display: flex; flex-direction: column; gap: 6px;
    flex: 1;
  }
  .album-year {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; letter-spacing: 0.2em;
    color: var(--gold);
  }
  .album-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.15rem; font-weight: 500;
    color: var(--ink); line-height: 1.4;
  }
  .album-desc {
    font-size: 13px; color: var(--ink-light); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .album-event-name {
    font-size: 12px; color: var(--gold);
    font-family: 'Noto Serif TC', serif;
    font-style: italic;
  }
  .album-detail-event {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; color: var(--gold);
    margin-bottom: 8px;
    font-style: italic;
  }
  .album-count {
    font-size: 12px; color: var(--ink-mute);
    margin-top: auto; padding-top: 8px;
  }

  /* Album detail view */
  .album-back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid rgba(184,134,11,0.3);
    border-radius: 999px;
    font-size: 13px; letter-spacing: 0.05em;
    color: var(--ink-light); cursor: pointer;
    transition: all 0.3s ease;
    margin-bottom: 32px;
    font-family: inherit;
  }
  .album-back-btn:hover { border-color: var(--temple-red); color: var(--temple-red); }
  .album-detail-header { margin-bottom: 32px; }
  .album-detail-year {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 14px; letter-spacing: 0.2em;
    color: var(--gold); margin-bottom: 8px;
  }
  .album-detail-title {
    font-size: 2.5rem; font-weight: 300;
    color: var(--ink); line-height: 1.2;
    margin-bottom: 12px;
  }
  .album-detail-desc {
    font-size: 15px; color: var(--ink-light); line-height: 1.7;
    max-width: 720px;
  }

  .album-photos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .album-photo {
    aspect-ratio: 1;
    overflow: hidden; position: relative;
    background: var(--paper-deep);
    border: none; padding: 0;
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
    text-decoration: none;
    color: inherit;
  }
  .album-photo:hover { transform: scale(0.98); }
  .album-photo img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.7s cubic-bezier(0.22,1,0.36,1);
  }
  .album-photo:hover img { transform: scale(1.06); }
  .album-photo-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 14px 10px;
    background: linear-gradient(180deg, transparent 0%, rgba(26,20,16,0.85) 100%);
    color: var(--paper-warm);
    font-size: 12px; line-height: 1.4;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .album-photo:hover .album-photo-caption { transform: translateY(0); }
  .album-photo-link-badge {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(245,239,228,0.9);
    color: var(--temple-red);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }

  @media (max-width: 640px) {
    .album-grid { grid-template-columns: 1fr; }
    .album-photos-grid { grid-template-columns: repeat(2, 1fr); }
    .album-detail-title { font-size: 1.75rem; }
  }

  /* Marquee announcement bar */
  .marquee-section { padding: 22px 0; }
  .marquee-section.marquee-classic { background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper-deep) 100%); border-top: 1px solid rgba(184,134,11,0.2); border-bottom: 1px solid rgba(184,134,11,0.2); }
  .marquee-section.marquee-dark { background: var(--ink); }
  .marquee-section.marquee-accent { background: linear-gradient(90deg, var(--temple-red-deep) 0%, var(--temple-red) 100%); }

  .marquee-bar {
    display: flex; align-items: center; gap: 20px;
    min-height: 36px;
  }
  .marquee-label {
    flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 18px;
    font-family: 'Noto Serif TC', serif; font-size: 15px;
    font-weight: 500; letter-spacing: 0.12em;
    border-radius: 999px;
    white-space: nowrap;
  }
  .marquee-classic .marquee-label { background: var(--temple-red); color: var(--paper-warm); }
  .marquee-dark .marquee-label { background: var(--gold); color: var(--ink); }
  .marquee-accent .marquee-label { background: var(--paper-warm); color: var(--temple-red); }

  .marquee-track {
    flex: 1;
    overflow: hidden;
    position: relative;
    min-width: 0;
  }
  .marquee-item {
    display: inline-flex; align-items: center; gap: 16px;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    width: 100%;
  }
  .marquee-item:hover { color: inherit; }

  /* === Animation: fade === */
  .marquee-anim-fade {
    transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1);
    opacity: 1;
  }
  .marquee-anim-fade.marquee-out { opacity: 0; }
  .marquee-anim-fade.marquee-in { opacity: 1; }

  /* === Animation: vertical slide === */
  .marquee-anim-slide-vertical {
    transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
    opacity: 1; transform: translateY(0);
  }
  .marquee-anim-slide-vertical.marquee-out { opacity: 0; transform: translateY(-12px); }
  .marquee-anim-slide-vertical.marquee-in { opacity: 1; transform: translateY(0); }

  /* === Animation: horizontal slide === */
  .marquee-anim-slide-horizontal {
    transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
    opacity: 1; transform: translateX(0);
  }
  .marquee-anim-slide-horizontal.marquee-out { opacity: 0; transform: translateX(-20px); }
  .marquee-anim-slide-horizontal.marquee-in { opacity: 1; transform: translateX(0); }

  /* === Animation: continuous scroll === */
  .marquee-track-scroll {
    flex: 1;
    overflow: hidden;
    position: relative;
    min-width: 0;
  }
  .marquee-scroll-inner {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    animation: marqueeScroll linear infinite;
    will-change: transform;
  }
  .marquee-scroll-inner:hover { animation-play-state: paused; }
  @keyframes marqueeScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-scroll-item {
    display: inline-flex; align-items: center; gap: 12px;
    text-decoration: none;
    padding-right: 24px;
    flex-shrink: 0;
  }
  .marquee-scroll-sep {
    color: var(--gold);
    margin-left: 16px; opacity: 0.5;
  }

  /* Event tag (calendar event in marquee) */
  .marquee-event-tag {
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .marquee-classic .marquee-item { color: var(--ink); }
  .marquee-classic .marquee-item:hover .marquee-text { color: var(--temple-red); }
  .marquee-dark .marquee-item { color: var(--paper-deep); }
  .marquee-dark .marquee-item:hover .marquee-text { color: var(--gold-light); }
  .marquee-accent .marquee-item { color: var(--paper-warm); }

  .marquee-date {
    flex-shrink: 0;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 600;
    letter-spacing: 0.04em;
    padding: 4px 12px;
    border-radius: 4px;
    font-feature-settings: 'tnum';
  }
  .marquee-classic .marquee-date { background: rgba(184,134,11,0.18); color: var(--temple-red); }
  .marquee-dark .marquee-date { background: rgba(184,134,11,0.25); color: var(--gold-light); }
  .marquee-accent .marquee-date { background: rgba(245,239,228,0.25); color: var(--paper-warm); }

  .marquee-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; font-weight: 400;
    line-height: 1.5;
    overflow: hidden; text-overflow: ellipsis;
    transition: color 0.3s ease;
  }
  .marquee-arrow {
    flex-shrink: 0; opacity: 0.6;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .marquee-item:hover .marquee-arrow { opacity: 1; transform: translateX(3px); }

  .marquee-pager {
    flex-shrink: 0;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; letter-spacing: 0.05em;
    display: flex; gap: 4px; align-items: baseline;
  }
  .marquee-classic .marquee-pager { color: var(--ink-light); }
  .marquee-classic .marquee-num { color: var(--temple-red); font-weight: 600; }
  .marquee-classic .marquee-divider { color: var(--gold); }
  .marquee-dark .marquee-pager { color: rgba(245,239,228,0.5); }
  .marquee-dark .marquee-num { color: var(--gold-light); font-weight: 600; }
  .marquee-accent .marquee-pager { color: rgba(245,239,228,0.7); }
  .marquee-accent .marquee-num { color: var(--paper-warm); font-weight: 600; }

  @media (max-width: 640px) {
    .marquee-section { padding: 16px 0; }
    .marquee-bar { gap: 12px; min-height: 30px; }
    .marquee-label { padding: 5px 12px; font-size: 13px; gap: 6px; }
    .marquee-label svg { display: none; }
    .marquee-text { font-size: 14px; }
    .marquee-date { font-size: 13px; padding: 3px 9px; }
    .marquee-item { gap: 10px; }
    .marquee-pager { display: none; }
  }
</style>

const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// Context for global content + user state
const ContentCtx = createContext({ albums: [] });
const UserCtx = createContext({ user: null, login: () => {}, logout: () => {}, refresh: () => {} });

// ============================================================
// API
// ============================================================
function gasGet(action) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', `${GAS_URL}?action=${encodeURIComponent(action)}`);
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch (e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error('network'));
    xhr.send();
  });
}

function gasPost(payload) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch (e) { reject(e); }
    };
    xhr.onerror = () => reject(new Error('network'));
    xhr.send(JSON.stringify(payload));
  });
}

// ============================================================
// Helpers
// ============================================================
function parseRoute(hash) {
  if (!hash || hash === '#' || hash === '#/') return { type: 'home', anchor: null };
  if (hash.startsWith('#/page/')) return { type: 'page', slug: decodeURIComponent(hash.slice(7)) };
  return { type: 'home', anchor: hash.slice(1) };
}

function useHashRoute() {
  const [route, setRoute] = useState(parseRoute(window.location.hash));
  useEffect(() => {
    const onHash = () => setRoute(parseRoute(window.location.hash));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  return route;
}

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

    const observeAll = () => {
      document.querySelectorAll('.reveal:not(.visible)').forEach(el => obs.observe(el));
    };
    observeAll();

    // Also watch for new .reveal elements added later (e.g. forum after API loads)
    const mut = new MutationObserver(() => {
      observeAll();
      // Failsafe: any element that's already in the viewport should become visible immediately
      document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          el.classList.add('visible');
        }
      });
    });
    mut.observe(document.body, { childList: true, subtree: true });

    return () => { obs.disconnect(); mut.disconnect(); };
  }, []);
}

function HtmlContent({ html, className }) {
  return <div className={className} dangerouslySetInnerHTML={{ __html: html || '' }} />;
}

function ReadMoreLink({ url, label, align }) {
  if (!url) return null;
  const isExternal = url.startsWith('http');
  const text = label && label.trim() ? label : '閱讀更多 Read more';
  const justify = align === 'left' ? 'flex-start' : align === 'right' ? 'flex-end' : 'center';
  return (
    <div className="readmore-wrap" style={{ justifyContent: justify }}>
      <a href={url} target={isExternal ? '_blank' : '_self'} rel={isExternal ? 'noreferrer' : ''} className="readmore-link">
        <span className="readmore-text">{text}</span>
        <span className="readmore-arrow">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 6h13M9 1l5 5-5 5"/>
          </svg>
        </span>
      </a>
    </div>
  );
}

function navTargetUrl(item) {
  if (!item) return '#';
  if (item.type === 'external') return item.target;
  if (item.type === 'page') return `#/page/${item.target}`;
  return `#${item.target}`;
}

function HeroSection({ data, isFirst }) {
  const bg = data.backgroundImage
    ? `linear-gradient(180deg, rgba(26,20,16,0.7) 0%, rgba(26,20,16,0.55) 40%, rgba(26,20,16,0.4) 70%, var(--paper) 100%), url('${data.backgroundImage}')`
    : 'linear-gradient(180deg, var(--ink) 0%, var(--paper) 100%)';
  const subtitleHtml = (data.subtitle || '').replace(/\n/g, '<br>');
  const textShadowStrong = '0 2px 12px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4)';

// Parse YouTube ID from URL or raw ID
function parseYouTubeId(input) {
  if (!input) return '';
  const s = String(input).trim();
  // Already an ID (11 chars, no slashes)
  if (/^[A-Za-z0-9_-]{11}$/.test(s)) return s;
  // Various URL patterns
  const patterns = [
    /[?&]v=([A-Za-z0-9_-]{11})/,           // watch?v=ID
    /youtu\.be\/([A-Za-z0-9_-]{11})/,      // youtu.be/ID
    /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,  // embed/ID
    /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/, // shorts/ID
    /youtube\.com\/v\/([A-Za-z0-9_-]{11})/       // v/ID
  ];
  for (const p of patterns) {
    const m = s.match(p);
    if (m) return m[1];
  }
  return s; // fall back to whatever was given
}

function CarouselSection({ data, anchorId }) {
  const slides = data.slides || [];
  const [idx, setIdx] = useState(0);
  const autoplay = data.autoplay === '1' || data.autoplay === true;
  const interval = parseInt(data.interval || 5, 10) * 1000;

  useEffect(() => {
    if (!autoplay || slides.length <= 1) return;
    const t = setInterval(() => setIdx(i => (i + 1) % slides.length), interval);
    return () => clearInterval(t);
  }, [autoplay, slides.length, interval]);

  if (!slides.length) return null;
  const go = (n) => setIdx((n + slides.length) % slides.length);

  return (
    <section id={anchorId} className="py-12 lg:py-16">
      <div className="max-w-6xl mx-auto px-6 lg:px-12 reveal">
        <div className="carousel-shell">
          {slides.map((s, i) => (
            <div key={i} className={`carousel-slide ${i === idx ? 'active' : ''}`}
                 style={{ backgroundImage: s.image ? `linear-gradient(180deg, rgba(26,20,16,0.1) 0%, rgba(26,20,16,0.6) 100%), url('${s.image}')` : 'none' }}>
              <div className="carousel-inner">

function MarqueeSection({ data, anchorId }) {
  const calData = useCalendarData();
  const intervalSec = parseFloat(data.interval) || 4;
  const animation = data.animation || 'fade';  // fade | slide-vertical | slide-horizontal | scroll
  const scrollSpeed = parseInt(data.scrollSpeed, 10) || 60;  // px/sec for scroll mode
  const fullCalendarUrl = data.fullCalendarUrl || '';

  // Build items: interleave text items with selected calendar events
  const items = useMemo(() => {
    const todayStr = (() => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    })();

    const textItems = (data.items || []).filter(it => it.text).map(it => ({
      kind: 'text',
      date: it.date,
      text: it.text,
      url: it.url
    }));

    let eventItems = [];
    if (calData && Array.isArray(data.selectedEventIds) && data.selectedEventIds.length > 0) {
      const events = calData.events || [];
      const cats = calData.categories || [];
      eventItems = data.selectedEventIds
        .map(id => events.find(e => e.id === id))
        .filter(e => e && (e.endDate || e.startDate) >= todayStr)  // skip past events
        .map(e => {
          const cat = cats.find(c => c.id === e.categoryId) || { name: '其他', icon: '·', color: '#6b6359' };
          const sd = new Date(e.startDate + 'T00:00:00');
          const dateStr = `${sd.getMonth() + 1}/${sd.getDate()}`;
          const timeStr = e.allDay || !e.startTime ? '全日' : e.startTime + (e.endTime ? `–${e.endTime}` : '');
          const parts = [`${cat.icon} ${dateStr} ${cat.name}`];
          if (e.location) parts.push(e.location);
          parts.push(timeStr);
          parts.push(e.title);
          return {
            kind: 'event',
            date: dateStr,
            text: parts.slice(1).join(' · '),  // location · time · title
            prefix: `${cat.icon} ${cat.name}`,
            color: cat.color,
            url: fullCalendarUrl ? `${fullCalendarUrl}?eventId=${e.id}` : '',
            eventTitle: e.title
          };
        });
    }

    // Interleave: text1, event1, text2, event2, ...
    const interleaved = [];
    const maxLen = Math.max(textItems.length, eventItems.length);
    for (let i = 0; i < maxLen; i++) {
      if (textItems[i]) interleaved.push(textItems[i]);
      if (eventItems[i]) interleaved.push(eventItems[i]);
    }
    return interleaved;
  }, [data.items, data.selectedEventIds, calData, fullCalendarUrl]);

  if (!items.length) return null;

  // Different animation modes
  if (animation === 'scroll') {
    // Continuous horizontal scroll — duplicate list for seamless loop
    return (
      <MarqueeScroll items={items} data={data} anchorId={anchorId} speedPxPerSec={scrollSpeed} />
    );
  }

  // For fade / slide-vertical / slide-horizontal — paginated with timer
  return (
    <MarqueePaginated
      items={items}
      data={data}
      anchorId={anchorId}
      animation={animation}
      intervalSec={intervalSec}
    />
  );
}

// ---------- Paginated mode (fade / slide) ----------
function MarqueePaginated({ items, data, anchorId, animation, intervalSec }) {
  const [idx, setIdx] = useState(0);
  const [direction, setDirection] = useState('in'); // in | out
  const labelText = data.label || '最新訊息';
  const style = data.style || 'classic';
  const cur = items[idx] || items[0];

  useEffect(() => {
    if (items.length <= 1) return;
    const t = setInterval(() => {
      setDirection('out');
      setTimeout(() => {
        setIdx(i => (i + 1) % items.length);
        setDirection('in');
      }, 400);
    }, intervalSec * 1000);
    return () => clearInterval(t);
  }, [items.length, intervalSec]);

  // Animation class: applied to inner element for transition
  const animClass = `marquee-anim-${animation} ${direction === 'out' ? 'marquee-out' : 'marquee-in'}`;

  return (
    <section id={anchorId} className={`marquee-section marquee-${style}`}>
      <div className="max-w-7xl mx-auto px-6 lg:px-12">
        <div className="marquee-bar">
          <div className="marquee-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
            </svg>
            <span>{labelText}</span>
          </div>
          <div className="marquee-track marquee-track-paginated">
            <a className={`marquee-item ${animClass} ${cur.kind === 'event' ? 'is-event' : ''}`}
               href={cur.url || '#'}
               target={cur.url && cur.url.startsWith('http') ? '_blank' : '_self'}
               rel={cur.url && cur.url.startsWith('http') ? 'noreferrer' : ''}
               style={{
                 pointerEvents: cur.url ? 'auto' : 'none',
                 ...(cur.kind === 'event' && cur.color ? { '--event-color': cur.color } : {})
               }}>
              {cur.kind === 'event' && cur.prefix && (
                <span className="marquee-event-tag" style={{ background: cur.color + '22', color: cur.color }}>
                  {cur.prefix}
                </span>
              )}
              {cur.kind !== 'event' && cur.date && <span className="marquee-date">{cur.date}</span>}
              <span className="marquee-text">{cur.kind === 'event' ? cur.eventTitle + (cur.text ? ' · ' + cur.text.split(' · ').slice(0, -1).join(' · ') : '') : cur.text}</span>
              {cur.url && (
                <svg className="marquee-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              )}
            </a>
          </div>
          {items.length > 1 && (
            <div className="marquee-pager">
              <span className="marquee-num">{idx + 1}</span>
              <span className="marquee-divider">/</span>
              <span className="marquee-total">{items.length}</span>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

// ---------- Continuous horizontal scroll ----------
function MarqueeScroll({ items, data, anchorId, speedPxPerSec }) {
  const labelText = data.label || '最新訊息';
  const style = data.style || 'classic';
  const trackRef = useRef(null);
  const [duration, setDuration] = useState(30);

  // Compute animation duration based on actual content width and desired speed
  useEffect(() => {
    if (!trackRef.current) return;
    const w = trackRef.current.scrollWidth / 2;  // we duplicate the list, so half is one full cycle
    if (w > 0) setDuration(w / speedPxPerSec);
  }, [items, speedPxPerSec]);

  // Duplicate items so animation loops seamlessly
  const doubled = [...items, ...items];

  return (
    <section id={anchorId} className={`marquee-section marquee-${style}`}>
      <div className="max-w-7xl mx-auto px-6 lg:px-12">
        <div className="marquee-bar">
          <div className="marquee-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
            </svg>
            <span>{labelText}</span>
          </div>
          <div className="marquee-track marquee-track-scroll">
            <div className="marquee-scroll-inner" ref={trackRef} style={{ animationDuration: duration + 's' }}>
              {doubled.map((item, i) => (
                <a key={i} className={`marquee-scroll-item ${item.kind === 'event' ? 'is-event' : ''}`}
                   href={item.url || '#'}
                   target={item.url && item.url.startsWith('http') ? '_blank' : '_self'}
                   rel={item.url && item.url.startsWith('http') ? 'noreferrer' : ''}
                   style={{ pointerEvents: item.url ? 'auto' : 'none' }}>
                  {item.kind === 'event' && item.prefix && (
                    <span className="marquee-event-tag" style={{ background: (item.color || '#999') + '22', color: item.color || '#999' }}>
                      {item.prefix}
                    </span>
                  )}
                  {item.kind !== 'event' && item.date && <span className="marquee-date">{item.date}</span>}
                  <span className="marquee-text">
                    {item.kind === 'event' ? `${item.eventTitle}${item.text ? ' · ' + item.text.split(' · ').slice(0, -1).join(' · ') : ''}` : item.text}
                  </span>
                  <span className="marquee-scroll-sep">·</span>
                </a>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function AlbumsSection({ data, anchorId }) {
  const { albums: albumLibrary = [] } = useContext(ContentCtx);
  const selectedIds = data.selectedAlbumIds || [];
  // If no selection or selectedIds is "all", show all albums
  const allAlbums = useMemo(() => {
    if (data.showAll || selectedIds.length === 0) return albumLibrary;
    // Preserve order based on selectedIds
    return selectedIds
      .map(id => albumLibrary.find(a => a.id === id))
      .filter(Boolean);
  }, [albumLibrary, selectedIds, data.showAll]);

  const [openAlbum, setOpenAlbum] = useState(null);
  const [yearFilter, setYearFilter] = useState('all');
  const [lightbox, setLightbox] = useState(null);
  const [driveImagesCache, setDriveImagesCache] = useState({}); // { albumId: [images] }
  const [loadingAlbumId, setLoadingAlbumId] = useState(null);

  // Collect unique years
  const years = useMemo(() => {
    const set = new Set();
    allAlbums.forEach(a => { if (a.year) set.add(String(a.year)); });
    return Array.from(set).sort((a, b) => b.localeCompare(a));
  }, [allAlbums]);

  const filteredAlbums = yearFilter === 'all'
    ? allAlbums
    : allAlbums.filter(a => String(a.year) === yearFilter);

  // When opening a Drive-mode album, fetch images via GAS
  useEffect(() => {
    if (!openAlbum) return;
    if (openAlbum.source !== 'drive' || !openAlbum.driveFolderId) return;
    if (driveImagesCache[openAlbum.id]) return; // already loaded
    setLoadingAlbumId(openAlbum.id);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', GAS_URL);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    xhr.onload = () => {
      try {
        const r = JSON.parse(xhr.responseText);
        if (r.ok) {
          setDriveImagesCache(prev => ({ ...prev, [openAlbum.id]: r.images || [] }));
        } else {
          setDriveImagesCache(prev => ({ ...prev, [openAlbum.id]: { error: r.error || 'load failed' } }));
        }
      } catch (e) {
        setDriveImagesCache(prev => ({ ...prev, [openAlbum.id]: { error: 'parse error' } }));
      }
      setLoadingAlbumId(null);
    };
    xhr.onerror = () => {
      setDriveImagesCache(prev => ({ ...prev, [openAlbum.id]: { error: 'network error' } }));
      setLoadingAlbumId(null);
    };
    xhr.send(JSON.stringify({ action: 'listFolderImages', folderId: openAlbum.driveFolderId }));
  }, [openAlbum]);

  // Get the actual photos for the open album
  const openAlbumPhotos = useMemo(() => {
    if (!openAlbum) return [];
    if (openAlbum.source === 'drive') {
      const cached = driveImagesCache[openAlbum.id];
      if (!cached || cached.error) return [];
      return cached.map(img => ({ src: img.url, thumb: img.thumbUrl, caption: img.filename }));
    }
    // manual mode
    return (openAlbum.photos || []).map(p => ({ src: p.src, thumb: p.thumb || p.src, caption: p.caption, link: p.link }));
  }, [openAlbum, driveImagesCache]);

  // Lightbox keyboard navigation
  useEffect(() => {
    if (!lightbox) return;
    const handler = (e) => {
      if (e.key === 'Escape') setLightbox(null);
      else if (e.key === 'ArrowRight') {
        const idx = openAlbumPhotos.findIndex(p => p.src === lightbox.src);
        if (idx < openAlbumPhotos.length - 1) setLightbox(openAlbumPhotos[idx + 1]);
      } else if (e.key === 'ArrowLeft') {
        const idx = openAlbumPhotos.findIndex(p => p.src === lightbox.src);
        if (idx > 0) setLightbox(openAlbumPhotos[idx - 1]);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [lightbox, openAlbumPhotos]);

  return (
    <section id={anchorId} className="albums-section py-20 lg:py-28">
      <div className="max-w-7xl mx-auto px-6 lg:px-12">
        {/* Header */}
        {(data.eyebrow || data.titleHtml) && !openAlbum && (
          <div className="text-center mb-12 reveal">
            {data.eyebrow && <div className="eyebrow mb-4" style={{ display: 'inline-block' }}>{data.eyebrow}</div>}
            {data.titleHtml && <HtmlContent className="font-serif-tc text-4xl lg:text-5xl font-light mb-4" html={data.titleHtml} />}
            {data.description && <p className="max-w-2xl mx-auto text-base" style={{ color: 'var(--ink-light)' }}>{data.description}</p>}
          </div>
        )}

        {/* Year filter tabs (mother view only) */}
        {!openAlbum && years.length > 0 && (
          <div className="album-year-tabs reveal">
            <button className={`album-year-tab ${yearFilter === 'all' ? 'active' : ''}`} onClick={() => setYearFilter('all')}>全部</button>
            {years.map(y => (
              <button key={y} className={`album-year-tab ${yearFilter === y ? 'active' : ''}`} onClick={() => setYearFilter(y)}>{y}</button>
            ))}
          </div>
        )}

        {/* Mother view — album cards grid */}
        {!openAlbum && (
          <div className="album-grid reveal">
            {filteredAlbums.map(album => (
              <button key={album.id} className="album-card" onClick={() => setOpenAlbum(album)}>
                <div className="album-cover" style={{ backgroundImage: album.cover ? `url('${album.cover}')` : 'none' }}>
                  {!album.cover && <div className="album-cover-empty">📷</div>}
                  <div className="album-cover-overlay">
                    <span className="album-cover-cta">查看相簿 →</span>
                  </div>
                </div>
                <div className="album-meta">
                  {(album.year || album.eventDate) && (
                    <div className="album-year">
                      {album.eventDate || album.year}
                    </div>
                  )}
                  <div className="album-title">{album.title || album.eventName || '未命名相簿'}</div>
                  {album.eventName && album.title && album.eventName !== album.title && (
                    <div className="album-event-name">{album.eventName}</div>
                  )}
                  {album.description && <div className="album-desc">{album.description}</div>}
                  {album.source === 'manual' && album.photos && (
                    <div className="album-count">{album.photos.length} 張照片</div>
                  )}
                  {album.source === 'drive' && (
                    <div className="album-count">📁 來自 Drive 資料夾</div>
                  )}
                </div>
              </button>
            ))}
            {filteredAlbums.length === 0 && (
              <div style={{ gridColumn: '1 / -1', textAlign: 'center', padding: '60px 0', color: 'var(--ink-mute)' }}>
                這個年份還沒有相簿
              </div>
            )}
          </div>
        )}

        {/* Single album view — photo grid */}
        {openAlbum && (
          <div className="album-detail reveal">
            <button className="album-back-btn" onClick={() => setOpenAlbum(null)}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              <span>回到相簿列表</span>
            </button>
            <div className="album-detail-header">
              {(openAlbum.year || openAlbum.eventDate) && (
                <div className="album-detail-year">{openAlbum.eventDate || openAlbum.year}</div>
              )}
              <h3 className="album-detail-title font-serif-tc">{openAlbum.title || openAlbum.eventName || '未命名相簿'}</h3>
              {openAlbum.eventName && openAlbum.title && openAlbum.eventName !== openAlbum.title && (
                <p className="album-detail-event">{openAlbum.eventName}</p>
              )}
              {openAlbum.description && <p className="album-detail-desc">{openAlbum.description}</p>}
            </div>

            {loadingAlbumId === openAlbum.id ? (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--ink-mute)' }}>
                <div className="seal loading-seal" style={{ display: 'inline-flex', margin: '0 auto 16px' }}>慈</div>
                <div>從 Google Drive 載入照片中⋯</div>
              </div>
            ) : driveImagesCache[openAlbum.id]?.error ? (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--danger, #a83838)' }}>
                載入失敗:{driveImagesCache[openAlbum.id].error}
              </div>
            ) : openAlbumPhotos.length === 0 ? (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--ink-mute)' }}>
                這本相簿還沒有照片
              </div>
            ) : (
              <div className="album-photos-grid">
                {openAlbumPhotos.map((p, i) => {
                  const inner = (
                    <>
                      <img src={p.thumb || p.src} alt={p.caption || ''} loading="lazy" />
                      {p.caption && <div className="album-photo-caption">{p.caption}</div>}
                      {p.link && <div className="album-photo-link-badge">↗</div>}
                    </>
                  );
                  // If photo has a link, clicking opens link instead of lightbox
                  if (p.link) {
                    const isExt = p.link.startsWith('http');
                    return (
                      <a key={i} href={p.link} target={isExt ? '_blank' : '_self'} rel={isExt ? 'noreferrer' : ''} className="album-photo">
                        {inner}
                      </a>
                    );
                  }
                  return (
                    <button key={i} className="album-photo" onClick={() => setLightbox(p)}>
                      {inner}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Lightbox */}
      {lightbox && (
        <div className="lightbox" onClick={() => setLightbox(null)}>
          <button className="lightbox-close" onClick={() => setLightbox(null)}>✕</button>
          <img src={lightbox.src} alt={lightbox.caption || ''} onClick={(e) => e.stopPropagation()} />
          {lightbox.caption && <div className="lightbox-caption">{lightbox.caption}</div>}
        </div>
      )}
    </section>
  );
}

// AuthDrawer — slide-in panel for login/register/member-center
// Triggered from Nav avatar button
// ============================================================
function AuthDrawer({ open, onClose }) {
  const { user } = useContext(UserCtx);
  const [view, setView] = useState('login'); // login | register | profile | password | mythreads
  const drawerRef = useRef(null);

  // Reset view when drawer opens
  useEffect(() => {
    if (open) setView(user ? 'menu' : 'login');
  }, [open, user]);

  // Close on Escape
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  // Lock body scroll when open
  useEffect(() => {
    if (open) document.body.style.overflow = 'hidden';
    else document.body.style.overflow = '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);

  return (
    <>
      <div className={`auth-drawer-overlay ${open ? 'open' : ''}`} onClick={onClose}></div>
      <aside ref={drawerRef} className={`auth-drawer ${open ? 'open' : ''}`}>
        <div className="auth-drawer-head">
          <h3 className="auth-drawer-title">
            {!user && view === 'login' && '會員登入'}
            {!user && view === 'register' && '註冊新帳號'}
            {!user && view === 'forgot' && '忘記密碼'}
            {user && view === 'menu' && '會員中心'}
            {user && view === 'profile' && '修改基本資料'}
            {user && view === 'password' && '修改密碼'}
            {user && view === 'mythreads' && '我發過的文章'}
          </h3>
          <button className="auth-drawer-close" onClick={onClose} aria-label="關閉">✕</button>
        </div>

        <div className="auth-drawer-body">
          {!user && view === 'login' && (
            <DrawerLoginForm onSwitchRegister={() => setView('register')} onSwitchForgot={() => setView('forgot')} onSuccess={onClose} />
          )}
          {!user && view === 'register' && (
            <DrawerRegisterForm onSwitchLogin={() => setView('login')} onSuccess={onClose} />
          )}
          {!user && view === 'forgot' && (
            <DrawerForgotForm onBack={() => setView('login')} />
          )}
          {user && view === 'menu' && (
            <DrawerMemberMenu onNav={setView} onClose={onClose} />
          )}
          {user && view === 'profile' && (
            <DrawerEditProfile onBack={() => setView('menu')} />
          )}
          {user && view === 'password' && (
            <DrawerChangePassword onBack={() => setView('menu')} />
          )}
          {user && view === 'mythreads' && (
            <DrawerMyThreads onBack={() => setView('menu')} onClose={onClose} />
          )}
        </div>
      </aside>
    </>
  );
}

// ====== Drawer: Login Form ======
function DrawerLoginForm({ onSwitchRegister, onSwitchForgot, onSuccess }) {
  const { login } = useContext(UserCtx);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  const submit = async (e) => {
    e?.preventDefault?.();
    if (!email || !password) { setMsg({ type: 'error', text: '請填寫信箱與密碼' }); return; }
    setBusy(true); setMsg(null);
    try {
      const r = await gasPost({ action: 'userLogin', email, password });
      if (r.ok) {
        login(r.user, r.token);
        setMsg({ type: 'success', text: `${r.user.nickname} 道親,登入成功 🪷` });
        setTimeout(() => onSuccess(), 800);
      } else {
        const errors = {
          invalid_credentials: '帳號或密碼錯誤',
          missing_credentials: '請填寫信箱與密碼',
          blocked: '此帳號已被停用',
          not_verified: '此信箱尚未完成驗證,請至信箱收信'
        };
        setMsg({ type: 'error', text: errors[r.error] || ('登入失敗: ' + r.error) });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗,請稍後再試' });
    }
    setBusy(false);
  };

  return (
    <form onSubmit={submit} className="drawer-form">
      {msg && <div className={`drawer-msg drawer-msg-${msg.type}`}>{msg.text}</div>}
      <label className="drawer-label">電子信箱</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoComplete="email" />
      <label className="drawer-label">密碼</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required autoComplete="current-password" />
      <button type="submit" className="drawer-btn-primary" disabled={busy}>{busy ? '登入中⋯' : '登入'}</button>
      <div className="drawer-form-links">
        <button type="button" className="drawer-link" onClick={onSwitchForgot}>忘記密碼?</button>
        <button type="button" className="drawer-link" onClick={onSwitchRegister}>還沒帳號?註冊</button>
      </div>
    </form>
  );
}

// ====== Drawer: Register Form ======
function DrawerRegisterForm({ onSwitchLogin, onSuccess }) {
  const { login } = useContext(UserCtx);
  const [config, setConfig] = useState(null);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [nickname, setNickname] = useState('');
  const [country, setCountry] = useState('台灣');
  const [region, setRegion] = useState('');
  const [customRegion, setCustomRegion] = useState('');
  const [gender, setGender] = useState('');
  const [job, setJob] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => {
    gasPost({ action: 'userGetConfig' }).then(r => {
      if (r.ok) setConfig(r.config);
    });
  }, []);

  const submit = async (e) => {
    e?.preventDefault?.();
    if (password !== confirmPw) { setMsg({ type: 'error', text: '兩次密碼輸入不同' }); return; }
    if (password.length < 6) { setMsg({ type: 'error', text: '密碼至少 6 碼' }); return; }
    if (!nickname.trim()) { setMsg({ type: 'error', text: '請填寫稱呼' }); return; }
    if (!gender) { setMsg({ type: 'error', text: '請選擇性別' }); return; }
    if (!job) { setMsg({ type: 'error', text: '請選擇天職' }); return; }
    if (country === '台灣' && !region) { setMsg({ type: 'error', text: '請選擇區域' }); return; }
    if (country === '台灣' && region === '其他' && !customRegion.trim()) { setMsg({ type: 'error', text: '請填寫您的區域' }); return; }

    setBusy(true); setMsg(null);
    try {
      const r = await gasPost({
        action: 'userRegister',
        email, password, nickname,
        country,
        region: country === '台灣' ? region : '',
        customRegion: (country === '台灣' && region === '其他') ? customRegion : '',
        gender, job
      });
      if (r.ok) {
        // Auto-login if token returned
        if (r.token && r.user) {
          login(r.user, r.token);
          setMsg({ type: 'success', text: `歡迎 ${r.user.nickname} 道親!註冊成功 🪷` });
          setTimeout(() => onSuccess(), 1200);
        } else {
          setMsg({ type: 'success', text: '註冊成功!請至您的信箱收驗證信。' });
        }
      } else {
        const errors = {
          email_exists: '此信箱已被註冊,請改用「登入」',
          invalid_email: '信箱格式有誤',
          password_too_short: '密碼至少 6 碼',
          missing_nickname: '請填寫稱呼',
          missing_country: '請選擇所在國家',
          missing_gender: '請選擇性別',
          missing_job: '請選擇天職'
        };
        setMsg({ type: 'error', text: errors[r.error] || ('註冊失敗: ' + r.error) });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗' });
    }
    setBusy(false);
  };

  return (
    <form onSubmit={submit} className="drawer-form">
      {msg && <div className={`drawer-msg drawer-msg-${msg.type}`}>{msg.text}</div>}
      <label className="drawer-label">電子信箱 *</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoComplete="email" />
      <label className="drawer-label">密碼(至少 6 碼)*</label>
      <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required minLength={6} autoComplete="new-password" />
      <label className="drawer-label">再次輸入密碼 *</label>
      <input type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} required minLength={6} autoComplete="new-password" />
      <label className="drawer-label">稱呼 *</label>
      <input type="text" value={nickname} onChange={(e) => setNickname(e.target.value)} required maxLength={30} placeholder="可填本名或法名" />

      <label className="drawer-label">性別 *</label>
      <div className="drawer-radio-row">
        <label className={`drawer-radio ${gender === '乾道' ? 'checked' : ''}`}>
          <input type="radio" name="gender" value="乾道" checked={gender === '乾道'} onChange={(e) => setGender(e.target.value)} />
          <span>乾道(男)</span>
        </label>
        <label className={`drawer-radio ${gender === '坤道' ? 'checked' : ''}`}>
          <input type="radio" name="gender" value="坤道" checked={gender === '坤道'} onChange={(e) => setGender(e.target.value)} />
          <span>坤道(女)</span>
        </label>
      </div>

      <label className="drawer-label">天職 *</label>
      <select value={job} onChange={(e) => setJob(e.target.value)} required>
        <option value="">請選擇⋯</option>
        {(config?.jobs || ['點傳師', '講師', '壇主', '辦事人員', '清口人員', '道親']).map(j => (
          <option key={j} value={j}>{j}</option>
        ))}
      </select>

      <label className="drawer-label">所在國家 *</label>
      <select value={country} onChange={(e) => { setCountry(e.target.value); setRegion(''); setCustomRegion(''); }} required>
        {(config?.countries || ['台灣', '其他']).map(c => <option key={c} value={c}>{c}</option>)}
      </select>

      {country === '台灣' && (
        <>
          <label className="drawer-label">區域 *</label>
          <select value={region} onChange={(e) => setRegion(e.target.value)} required>
            <option value="">請選擇⋯</option>
            {(config?.twRegions || []).map(r => <option key={r} value={r}>{r}</option>)}
          </select>
          {region === '其他' && (
            <>
              <label className="drawer-label">請填寫您的區域 *</label>
              <input type="text" value={customRegion} onChange={(e) => setCustomRegion(e.target.value)} required placeholder="例:海外某某分壇" maxLength={30} />
            </>
          )}
        </>
      )}

      <button type="submit" className="drawer-btn-primary" disabled={busy}>{busy ? '註冊中⋯' : '註冊'}</button>
      <div className="drawer-form-links">
        <button type="button" className="drawer-link" onClick={onSwitchLogin}>已有帳號?登入</button>
      </div>
    </form>
  );
}

// ====== Drawer: Forgot Password ======
function DrawerForgotForm({ onBack }) {
  const [email, setEmail] = useState('');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  const submit = async (e) => {
    e?.preventDefault?.();
    setBusy(true); setMsg(null);
    try {
      const r = await gasPost({ action: 'userRequestPasswordReset', email });
      if (r.ok) {
        setMsg({ type: 'success', text: '若該信箱有註冊,重設信件已寄出。請至信箱收信。' });
      } else {
        setMsg({ type: 'error', text: '寄送失敗,請稍後再試' });
      }
    } catch (err) {
      setMsg({ type: 'error', text: '連線失敗' });
    }
    setBusy(false);
  };

  return (
    <form onSubmit={submit} className="drawer-form">
      {msg && <div className={`drawer-msg drawer-msg-${msg.type}`}>{msg.text}</div>}
      <p className="drawer-help-text">輸入註冊時使用的電子信箱,我們會寄送重設密碼的連結。</p>
      <label className="drawer-label">電子信箱</label>
      <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
      <button type="submit" className="drawer-btn-primary" disabled={busy}>{busy ? '寄送中⋯' : '寄送重設信'}</button>
      <button type="button" className="drawer-link" onClick={onBack}>← 返回登入</button>
    </form>
  );
}

          <div className="drawer-profile-meta">📍 {user.country}{regionDisplay !== user.country ? ` · ${regionDisplay}` : ''}</div>
        )}

      </div>

      {/* Menu */}
      <div className="drawer-menu-list">
        <button className="drawer-menu-item" onClick={() => onNav('profile')}>
          <span className="drawer-menu-icon">📝</span>

        </button>
        <button className="drawer-menu-item" onClick={() => onNav('password')}>
          <span className="drawer-menu-icon">🔑</span>
          <span>修改密碼</span>
          <span className="drawer-menu-chev">›</span>
        </button>
        <button className="drawer-menu-item" onClick={() => onNav('mythreads')}>
          <span className="drawer-menu-icon">📚</span>
          <span>我發過的文章</span>

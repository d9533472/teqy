// ============================================================
// Page Editor
// ============================================================
function PageEditor({ page, onUpdatePage, onDeletePage, password, showToast }) {
  const [showPicker, setShowPicker] = useState(false);

  const updateSection = (idx, newSection) => {
    const newSections = [...page.sections];
    newSections[idx] = newSection;
    onUpdatePage({ ...page, sections: newSections });
  };
  const deleteSection = (idx) => {
    if (!confirm('確定刪除這個區塊?')) return;
    onUpdatePage({ ...page, sections: page.sections.filter((_, i) => i !== idx) });
  };
  const moveSection = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= page.sections.length) return;
    const newSections = [...page.sections];
    [newSections[idx], newSections[j]] = [newSections[j], newSections[idx]];
    onUpdatePage({ ...page, sections: newSections });
  };
  const addSection = (type) => {
    setShowPicker(false);
    const newSection = { id: uid(), type, data: {} };
    onUpdatePage({ ...page, sections: [...page.sections, newSection] });
  };

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="grid-2">
          <div>
            <label className="field-label">頁面標題</label>
            <input type="text" value={page.title || ''} onChange={(e) => onUpdatePage({ ...page, title: e.target.value })} />
          </div>
          <div>
            <label className="field-label">URL Slug</label>
            <input type="text" value={page.slug || ''} onChange={(e) => onUpdatePage({ ...page, slug: e.target.value })} className="font-mono" disabled={page.isHome} />
            <div className="field-help">{page.isHome ? '首頁固定為 /，無法修改' : '網址會是 #/page/' + (page.slug || '...')}</div>
          </div>
        </div>
        <div className="flex items-center gap-3 mt-4">
          <label className="flex items-center gap-2 text-sm" style={{ color: 'var(--ink-soft)' }}>
            <input type="checkbox" checked={!!page.isHome} onChange={(e) => onUpdatePage({ ...page, isHome: e.target.checked })} />
            設為首頁
          </label>
          {!page.isHome && (
            <button className="btn btn-danger btn-sm ml-auto" onClick={onDeletePage}>刪除此頁</button>
          )}
        </div>
      </div>

      <div className="flex items-center justify-between mb-4">
        <h3 className="font-serif text-lg font-medium">區塊 ({page.sections.length})</h3>
        <button className="btn btn-primary btn-sm" onClick={() => setShowPicker(true)}>+ 新增區塊</button>
      </div>

      {page.sections.map((section, i) => (
        <SectionEditor
          key={section.id}
          section={section}
          onUpdate={(s) => updateSection(i, s)}
          onDelete={() => deleteSection(i)}
          onMoveUp={() => moveSection(i, -1)}
          onMoveDown={() => moveSection(i, 1)}
          canMoveUp={i > 0}
          canMoveDown={i < page.sections.length - 1}
          password={password}
          showToast={showToast}
        />
      ))}

      {page.sections.length === 0 && (
        <div className="card p-8 text-center" style={{ color: 'var(--ink-mute)' }}>
          這頁還沒有任何區塊,點上方「新增區塊」開始建立
        </div>
      )}

      {showPicker && <SectionTypePicker onPick={addSection} onClose={() => setShowPicker(false)} />}
    </div>
  );
}

// ============================================================
// Navigation Editor
// ============================================================
function NavItemEditor({ item, onUpdate, onDelete, onMoveUp, onMoveDown, canMoveUp, canMoveDown, depth }) {
  const { pages = [] } = useContext(ContentCtx);
  const update = (key, val) => onUpdate({ ...item, [key]: val });
  const updateChild = (i, child) => {
    const newChildren = [...(item.children || [])];
    newChildren[i] = child;
    update('children', newChildren);
  };
  const deleteChild = (i) => {
    if (!confirm('確定刪除這個子選單?')) return;
    update('children', (item.children || []).filter((_, idx) => idx !== i));
  };
  const moveChild = (i, dir) => {
    const j = i + dir;
    const newChildren = [...(item.children || [])];
    if (j < 0 || j >= newChildren.length) return;
    [newChildren[i], newChildren[j]] = [newChildren[j], newChildren[i]];
    update('children', newChildren);
  };
  const addChild = () => {
    update('children', [...(item.children || []), { id: uid(), label: '新項目', type: 'anchor', target: '' }]);
  };

  // Collect all anchors across all pages for the anchor dropdown
  const anchorOptions = useMemo(() => {
    const out = [];
    pages.forEach(p => {
      (p.sections || []).forEach(s => {
        if (s.anchorId) {
          const schema = (typeof SECTION_SCHEMAS !== 'undefined') ? SECTION_SCHEMAS[s.type] : null;
          const label = schema ? `${schema.label} (#${s.anchorId})` : `#${s.anchorId}`;
          out.push({ id: s.anchorId, label, page: p.title });
        }
      });
    });
    return out;
  }, [pages]);

  // Reset target when type changes (so old slug/anchor doesn't leak across types)
  const handleTypeChange = (newType) => {
    let newTarget = '';
    if (newType === 'page' && pages.length > 0) {
      const home = pages.find(p => p.isHome) || pages[0];
      newTarget = home.slug || '/';
    } else if (newType === 'anchor' && anchorOptions.length > 0) {
      newTarget = anchorOptions[0].id;
    }
    onUpdate({ ...item, type: newType, target: newTarget });
  };

  return (
    <div className="repeater-item" style={{ marginLeft: depth * 24 }}>
      <div className="repeater-controls">
        <button type="button" className="btn btn-ghost btn-sm" onClick={onMoveUp} disabled={!canMoveUp}>↑</button>
        <button type="button" className="btn btn-ghost btn-sm" onClick={onMoveDown} disabled={!canMoveDown}>↓</button>
        <button type="button" className="btn btn-ghost btn-sm" onClick={onDelete} style={{ color: 'var(--danger)' }}>✕</button>
      </div>
      <div className="grid-2">
        <div>
          <label className="field-label">顯示文字</label>
          <input type="text" value={item.label || ''} onChange={(e) => update('label', e.target.value)} />
        </div>
        <div>
          <label className="field-label">類型</label>
          <select value={item.type || 'anchor'} onChange={(e) => handleTypeChange(e.target.value)}>
            <option value="anchor">⚓ 區塊錨點</option>
            <option value="page">📄 內部頁面</option>
            <option value="external">🌐 外部連結</option>
          </select>
        </div>
      </div>
      <div className="mt-3">
        {item.type === 'page' && (
          <>
            <label className="field-label">選擇頁面</label>
            {pages.length === 0 ? (
              <div className="field-help" style={{ color: 'var(--danger)' }}>還沒有任何頁面,請先到「頁面」分頁建立</div>
            ) : (
              <select value={item.target || ''} onChange={(e) => update('target', e.target.value)}>
                {pages.map(p => (
                  <option key={p.id} value={p.slug || '/'}>
                    {p.title}{p.isHome ? ' (首頁)' : ''} {p.slug ? `· /${p.slug}` : ''}
                  </option>
                ))}
              </select>
            )}
          </>
        )}
        {item.type === 'anchor' && (
          <>
            <label className="field-label">選擇區塊</label>
            {anchorOptions.length === 0 ? (
              <div className="field-help" style={{ color: 'var(--danger)' }}>
                目前沒有任何區塊設定錨點 ID。請先到區塊設定填入「錨點 ID」欄位
              </div>
            ) : (
              <select value={item.target || ''} onChange={(e) => update('target', e.target.value)}>
                <option value="">— 選擇區塊 —</option>
                {anchorOptions.map(a => (
                  <option key={a.id + '-' + a.page} value={a.id}>
                    {a.label} · {a.page}
                  </option>
                ))}
              </select>
            )}
          </>
        )}
        {item.type === 'external' && (
          <>
            <label className="field-label">完整網址 (https://)</label>
            <input
              type="text"
              value={item.target || ''}
              onChange={(e) => update('target', e.target.value)}
              className="font-mono"
              placeholder="https://example.com"
            />
          </>
        )}
      </div>
      {depth === 0 && (
        <div className="mt-4 pt-3 border-t" style={{ borderColor: 'var(--border)' }}>
          <div className="text-xs mb-2" style={{ color: 'var(--ink-mute)' }}>子選單 (下拉選項)</div>
          {(item.children || []).map((c, i) => (
            <NavItemEditor
              key={c.id}
              item={c}
              onUpdate={(nc) => updateChild(i, nc)}
              onDelete={() => deleteChild(i)}
              onMoveUp={() => moveChild(i, -1)}
              onMoveDown={() => moveChild(i, 1)}
              canMoveUp={i > 0}
              canMoveDown={i < (item.children || []).length - 1}
              depth={depth + 1}
            />
          ))}
          <button type="button" className="btn btn-ghost btn-sm" onClick={addChild}>+ 新增子選單</button>
        </div>
      )}
    </div>
  );
}

function NavEditor({ navigation, onUpdate }) {
  const update = (i, item) => {
    const n = [...navigation];
    n[i] = item;
    onUpdate(n);
  };
  const remove = (i) => {
    if (!confirm('確定刪除此導覽項?')) return;
    onUpdate(navigation.filter((_, idx) => idx !== i));
  };
  const move = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= navigation.length) return;
    const n = [...navigation];
    [n[i], n[j]] = [n[j], n[i]];
    onUpdate(n);
  };
  const add = () => {
    onUpdate([...navigation, { id: uid(), label: '新選項', type: 'anchor', target: '', children: [] }]);
  };
  return (
    <div className="card p-6">
      <div className="flex items-center justify-between mb-4">
        <h2 className="font-serif text-2xl font-medium">導覽列</h2>
        <button className="btn btn-primary btn-sm" onClick={add}>+ 新增選項</button>
      </div>
      {navigation.map((item, i) => (
        <NavItemEditor
          key={item.id}
          item={item}
          onUpdate={(it) => update(i, it)}
          onDelete={() => remove(i)}
          onMoveUp={() => move(i, -1)}
          onMoveDown={() => move(i, 1)}
          canMoveUp={i > 0}
          canMoveDown={i < navigation.length - 1}
          depth={0}
        />
      ))}
    </div>
  );
}

function BackupsView({ password, showToast, onRestore }) {
  const [backups, setBackups] = useState([]);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    setLoading(true);
    const r = await gasPost({ action: 'listBackups', password });
    if (r.ok) setBackups(r.backups);
    else showToast('無法載入備份列表', 'error');
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  const restore = async (id, name) => {
    if (!confirm(`確定要還原到「${name}」這個版本?目前的內容會自動再備份一次。`)) return;
    const r = await gasPost({ action: 'restoreBackup', password, fileId: id });
    if (r.ok) {
      showToast('還原成功,正在重新載入⋯', 'success');
      onRestore && onRestore();
    } else {
      showToast('還原失敗: ' + (r.error || ''), 'error');
    }
  };

  return (
    <div className="card p-6">
      <div className="flex items-center justify-between mb-6">
        <h2 className="font-serif text-2xl font-medium">備份歷史</h2>
        <button className="btn btn-secondary btn-sm" onClick={refresh}>重新整理</button>
      </div>
      {loading ? <div style={{ color: 'var(--ink-mute)' }}>載入中⋯</div> :
        backups.length === 0 ? <div style={{ color: 'var(--ink-mute)' }}>尚無備份(每次儲存都會自動備份)</div> :
        <div>
          {backups.map(b => (
            <div key={b.id} className="repeater-item flex items-center justify-between" style={{ paddingTop: 12, paddingBottom: 12 }}>
              <div>
                <div className="font-mono text-sm">{b.name}</div>
                <div className="text-xs mt-1" style={{ color: 'var(--ink-mute)' }}>{new Date(b.created).toLocaleString('zh-TW')}</div>
              </div>
              <button className="btn btn-secondary btn-sm" onClick={() => restore(b.id, b.name)}>還原此版本</button>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

function VisitorStatsView({ password, showToast }) {
  const [visits, setVisits] = useState(null);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(false);
  const [editValue, setEditValue] = useState('');
  const [saving, setSaving] = useState(false);

  const refresh = async () => {
    setLoading(true);
    try {
      const r = await gasPost({ action: 'getVisits', password });
      if (r.ok) setVisits(r.visits);
      else showToast('無法載入訪客統計: ' + (r.error || ''), 'error');
    } catch (e) {
      showToast('載入失敗: ' + e.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  const startEdit = () => {
    setEditValue(String(visits || 0));
    setEditing(true);
  };

  const save = async () => {
    const n = parseInt(editValue, 10);
    if (isNaN(n) || n < 0) {
      showToast('請輸入大於等於 0 的整數', 'error');
      return;
    }
    setSaving(true);
    try {
      const r = await gasPost({ action: 'setVisits', password, value: n });
      if (r.ok) {
        setVisits(r.visits);
        setEditing(false);
        showToast('訪客數已更新', 'success');
      } else {
        showToast('更新失敗: ' + (r.error || ''), 'error');
      }
    } catch (e) {
      showToast('更新失敗: ' + e.message, 'error');
    }
    setSaving(false);
  };

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-center justify-between mb-6">
          <h2 className="font-serif text-2xl font-medium">訪客統計</h2>
          <button className="btn btn-secondary btn-sm" onClick={refresh}>重新整理</button>
        </div>

        {loading ? (
          <div style={{ color: 'var(--ink-mute)' }}>載入中⋯</div>
        ) : (
          <div>
            <div className="text-center py-8" style={{ background: 'var(--bg)', borderRadius: 8 }}>
              <div className="text-xs uppercase tracking-widest mb-3" style={{ color: 'var(--ink-mute)', letterSpacing: '0.2em' }}>Total Visits</div>
              {!editing ? (
                <>
                  <div className="font-serif text-6xl font-light mb-2" style={{ color: 'var(--temple-red)' }}>
                    {(visits || 0).toLocaleString()}
                  </div>
                  <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>累計訪問人次</div>
                  <button className="btn btn-secondary btn-sm mt-6" onClick={startEdit}>手動修改數字</button>
                </>
              ) : (
                <div style={{ maxWidth: 320, margin: '0 auto' }}>
                  <label className="field-label">設定新的累計數</label>
                  <input
                    type="number"
                    value={editValue}
                    onChange={(e) => setEditValue(e.target.value)}
                    min="0"
                    className="text-center"
                    style={{ fontSize: 24, padding: 12 }}
                    autoFocus
                  />
                  <div className="flex gap-2 mt-4 justify-center">
                    <button className="btn btn-primary" onClick={save} disabled={saving}>
                      {saving ? '儲存中⋯' : '確認儲存'}
                    </button>
                    <button className="btn btn-secondary" onClick={() => setEditing(false)}>取消</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      <div className="card p-6">
        <h3 className="font-serif text-lg font-medium mb-3">關於訪客計數</h3>
        <ul className="text-sm space-y-2" style={{ color: 'var(--ink-soft)' }}>
          <li>• 同一個瀏覽分頁(session)只計數一次,不會因為按 F5 重整就一直加</li>
          <li>• 計數獨立儲存在 GAS Properties,即使重置內容也不會歸零</li>
          <li>• 想隱藏不顯示計數,到「頁尾設定」取消勾選即可</li>
          <li>• 想從某個起始數開始(例如要承接舊網站的數字),點「手動修改數字」直接設定</li>
        </ul>
      </div>
    </div>
  );
}

function UsersManagerView({ password, showToast }) {
  const [users, setUsers] = useState([]);
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('users'); // users | settings
  const [filter, setFilter] = useState('all'); // all | verified | unverified | blocked
  const [search, setSearch] = useState('');
  const [editingUser, setEditingUser] = useState(null);

  const loadAll = async () => {
    setLoading(true);
    try {
      const [r1, r2] = await Promise.all([
        gasPost({ action: 'adminListUsers', password }),
        gasPost({ action: 'userGetConfig' })
      ]);
      if (r1.ok) setUsers(r1.users);
      if (r2.ok) setConfig(r2.config);
    } catch (e) {
      showToast('載入失敗: ' + e.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => { loadAll(); }, []);

  const filtered = users.filter(u => {
    if (filter === 'verified' && !u.verified) return false;
    if (filter === 'unverified' && u.verified) return false;
    if (filter === 'blocked' && !u.blocked) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!u.email.toLowerCase().includes(s) && !(u.nickname || '').toLowerCase().includes(s)) return false;
    }
    return true;
  });

  const stats = {
    total: users.length,
    verified: users.filter(u => u.verified).length,
    unverified: users.filter(u => !u.verified && !u.blocked).length,
    blocked: users.filter(u => u.blocked).length
  };

  const updateUser = async (userId, patch) => {
    const r = await gasPost({ action: 'adminUpdateUser', password, userId, patch });
    if (r.ok) {
      showToast('已更新', 'success');
      loadAll();
    } else {
      showToast('更新失敗: ' + (r.error || ''), 'error');
    }
  };

  const deleteUser = async (user) => {
    if (!confirm(`確定刪除使用者「${user.nickname}」(${user.email})?\n此操作無法復原。`)) return;
    const r = await gasPost({ action: 'adminDeleteUser', password, userId: user.id });
    if (r.ok) {
      showToast('已刪除', 'success');
      loadAll();
    } else {
      showToast('刪除失敗', 'error');
    }
  };

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-4">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>👥 使用者管理</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>管理註冊會員、信箱驗證、停用等</div>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={loadAll}>重新整理</button>
        </div>

        {/* Stats */}
        <div className="grid-2" style={{ gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
          <div className="user-stat-card"><div className="user-stat-num">{stats.total}</div><div className="user-stat-label">總人數</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--success)' }}>{stats.verified}</div><div className="user-stat-label">已驗證</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--gold)' }}>{stats.unverified}</div><div className="user-stat-label">未驗證</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--danger)' }}>{stats.blocked}</div><div className="user-stat-label">已停用</div></div>
        </div>
      </div>

      {/* Tabs */}
      <div className="card p-6">
        <div className="link-field-tabs" style={{ marginBottom: 16 }}>
          <button type="button" className={`link-tab ${tab === 'users' ? 'active' : ''}`} onClick={() => setTab('users')}>使用者列表</button>
          <button type="button" className={`link-tab ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>註冊欄位設定</button>
        </div>

        {tab === 'users' && (
          <div>
            {/* Filter bar */}
            <div className="flex flex-wrap gap-2 items-center mb-4">
              <input type="text" placeholder="🔍 搜尋姓名/信箱" value={search} onChange={(e) => setSearch(e.target.value)} style={{ flex: 1, minWidth: 180 }} />
              <select value={filter} onChange={(e) => setFilter(e.target.value)} style={{ width: 130 }}>
                <option value="all">全部</option>
                <option value="verified">已驗證</option>
                <option value="unverified">未驗證</option>
                <option value="blocked">已停用</option>
              </select>
            </div>

            {loading ? (
              <div style={{ color: 'var(--ink-mute)', padding: 24, textAlign: 'center' }}>載入中⋯</div>
            ) : filtered.length === 0 ? (
              <div style={{ color: 'var(--ink-mute)', padding: 32, textAlign: 'center' }}>
                {users.length === 0 ? '尚未有任何使用者註冊' : '沒有符合條件的使用者'}
              </div>
            ) : (
              <div className="users-table-wrap">
                <table className="users-table">
                  <thead>
                    <tr>
                      <th>稱呼</th>

                      <th>性別/天職</th>
                      <th>地區</th>
                      <th>狀態</th>

                    </tr>

                  <tbody>

                      <tr key={u.id} className={u.blocked ? 'blocked' : ''}>

                        <td className="font-mono" style={{ fontSize: 12 }}>{u.email}</td>

                          <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>{u.job || '—'}</div>
                        </td>
                        <td style={{ fontSize: 12 }}>
                          {u.country}{u.region ? ` · ${u.region}` : ''}
                        </td>
                        <td>
                          {u.blocked ? <span className="badge danger">停用</span> :
                           u.verified ? <span className="badge success">已驗證</span> :
                           <span className="badge warn">未驗證</span>}
                        </td>
                        <td style={{ fontSize: 11, color: 'var(--ink-mute)' }}>
                          {u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-TW') : '—'}
                        </td>
                        <td>
                          <button className="btn btn-ghost btn-sm" onClick={() => setEditingUser(u)}>編輯</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab === 'settings' && config && (
          <UserConfigEditor config={config} onSave={async (newConfig) => {
            const r = await gasPost({ action: 'adminSaveUserConfig', password, config: newConfig });
            if (r.ok) {
              showToast('設定已儲存', 'success');
              setConfig(newConfig);
            } else {
              showToast('儲存失敗: ' + (r.error || ''), 'error');
            }
          }} />
        )}
      </div>

      {editingUser && (
        <UserEditModal
          user={editingUser}
          onClose={() => setEditingUser(null)}
          onSave={(patch) => { updateUser(editingUser.id, patch); setEditingUser(null); }}
          onDelete={() => { deleteUser(editingUser); setEditingUser(null); }}
        />
      )}
    </div>
  );
}

          <label className="field-label mt-4">台灣區域(堂區)清單(每行一個,使用「其他」會讓使用者自填)</label>
          <textarea

      {tab === 'email' && (

          <div className="text-sm mb-4" style={{ color: 'var(--ink-light)' }}>
            編輯歡迎信的內容。可使用以下變數,系統會自動替換:

          <div className="mb-4 p-3" style={{ background: 'var(--bg)', borderRadius: 6, fontSize: 12, color: 'var(--ink-soft)' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 8 }}>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{nickname}'}</code> 使用者稱呼</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{email}'}</code> 註冊信箱</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{gender}'}</code> 性別(乾道/坤道)</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{job}'}</code> 天職</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{country}'}</code> 國家</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{region}'}</code> 縣市</div>
              <div><code style={{ background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 3, color: 'var(--temple-red)' }}>{'{siteName}'}</code> 網站名稱</div>
            </div>
          </div>

          <label className="field-label">郵件主旨</label>
          <input type="text" value={(draft.welcomeEmail || {}).subject || ''} onChange={(e) => updateEmail('subject', e.target.value)} placeholder="【{siteName}】感謝您的註冊" />

          <label className="field-label mt-3">問候語</label>
          <input type="text" value={(draft.welcomeEmail || {}).greeting || ''} onChange={(e) => updateEmail('greeting', e.target.value)} placeholder="{nickname} 道親,您好" />

          <label className="field-label mt-3">內文(支援 HTML 標籤)</label>
          <textarea
            value={(draft.welcomeEmail || {}).bodyHtml || ''}
            onChange={(e) => updateEmail('bodyHtml', e.target.value)}
            style={{ minHeight: 200, fontFamily: 'monospace', fontSize: 13 }}
            placeholder='<p>歡迎您加入...</p>'
          />
          <div className="field-help">
            可用 HTML 標籤:<code>&lt;p&gt;</code> <code>&lt;strong&gt;</code> <code>&lt;ul&gt;&lt;li&gt;</code> <code>&lt;a href=""&gt;</code> <code>&lt;br&gt;</code> 等。每段請用 <code>&lt;p&gt;</code> 包起來。
          </div>

          <label className="field-label mt-3">署名</label>
          <input type="text" value={(draft.welcomeEmail || {}).signature || ''} onChange={(e) => updateEmail('signature', e.target.value)} placeholder="淨慈寺文化園區 敬上" />

          <div className="mt-6 p-4" style={{ background: 'var(--paper, #f5efe4)', border: '1px solid rgba(184,134,11,0.25)', borderRadius: 4 }}>

      <div className="mt-6 sticky bottom-0 py-4" style={{ background: 'var(--bg-card)', borderTop: dirty ? '1px solid var(--border)' : 'none' }}>
        <button className="btn btn-primary" onClick={() => onSave(draft)} disabled={!dirty}>
          {dirty ? '儲存設定' : '尚無變更'}
        </button>
      </div>
    </div>
  );
}

function WelcomeEmailPreview({ tpl }) {
  const sample = {
    siteName: '淨慈寺文化園區',
    nickname: '王小明',
    email: 'sample@example.com',
    gender: '乾道',
    job: '道親',
    country: '台灣',
    region: '台北市'
  };
  const fill = (s) => String(s || '').replace(/\{(\w+)\}/g, (m, k) => sample[k] !== undefined ? sample[k] : m);
  const subject = fill(tpl.subject);
  const greeting = fill(tpl.greeting);
  const body = fill(tpl.bodyHtml);
  const signature = fill(tpl.signature);

  return (
    <div style={{ fontFamily: 'Noto Serif TC, serif', background: '#faf5eb', padding: 16, borderRadius: 4, border: '1px solid #d4cab7' }}>
      <div style={{ fontSize: 13, color: '#8a7a6a', marginBottom: 8 }}>
        主旨: <span style={{ color: '#1a1410', fontWeight: 500 }}>{subject || '(空)'}</span>
      </div>
      <hr style={{ border: 'none', borderTop: '1px solid #d4cab7', margin: '12px 0' }} />
      {greeting && <p style={{ fontWeight: 500, color: '#1a1410', margin: '0 0 12px' }}>{greeting}</p>}
      <div style={{ color: '#2d2520', lineHeight: 1.7, fontSize: 14 }} dangerouslySetInnerHTML={{ __html: body }} />
      {signature && <p style={{ marginTop: 16, fontStyle: 'italic', color: '#57463a', textAlign: 'right', fontSize: 13 }}>{signature}</p>}
    </div>
  );
}


// ============================================================
// Forum Manager — categories + threads/replies moderation
// ============================================================
function ForumManagerView({ password, showToast }) {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState('categories'); // categories | threads
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterCatId, setFilterCatId] = useState(''); // category filter
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [openThread, setOpenThread] = useState(null); // thread object when reading/editing
  const [showCompose, setShowCompose] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const r = await gasPost({ action: 'adminForumGetAll', password });
      if (r.ok) {
        setData(r.data);
        // Refresh openThread if open
        if (openThread) {
          const updated = (r.data.threads || []).find(t => t.id === openThread.id);
          if (updated) setOpenThread(updated);
        }
      }
    } catch (e) {
      showToast('載入失敗', 'error');
    }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const saveCategories = async (cats) => {
    const r = await gasPost({ action: 'adminForumSaveCategories', password, categories: cats });
    if (r.ok) { showToast('分類已儲存', 'success'); load(); }
    else showToast('儲存失敗', 'error');
  };

  const togglePin = async (thread) => {
    const r = await gasPost({ action: 'adminForumPinThread', password, threadId: thread.id, pinned: !thread.pinned });
    if (r.ok) { showToast(thread.pinned ? '已取消置頂' : '已置頂', 'success'); load(); }
  };
  const toggleLock = async (thread) => {
    const r = await gasPost({ action: 'adminForumLockThread', password, threadId: thread.id, locked: !thread.locked });
    if (r.ok) { showToast(thread.locked ? '已解鎖' : '已鎖定', 'success'); load(); }
  };
  const delThread = async (thread) => {
    if (!confirm(`確定刪除討論串「${thread.title}」?\n所有留言也會一起刪除,無法復原。`)) return;
    const r = await gasPost({ action: 'adminForumDeleteThread', password, threadId: thread.id });
    if (r.ok) { showToast('已刪除', 'success'); setOpenThread(null); load(); }
  };
  const moveThread = async (thread, newCatId) => {
    if (newCatId === thread.categoryId) return;
    const r = await gasPost({ action: 'adminForumMoveThread', password, threadId: thread.id, categoryId: newCatId });
    if (r.ok) { showToast('已移動分類', 'success'); load(); }
    else showToast('移動失敗', 'error');
  };
  const updateThread = async (threadId, patch) => {
    const r = await gasPost({ action: 'adminForumUpdateThread', password, threadId, patch });
    if (r.ok) { showToast('已更新文章', 'success'); load(); return true; }
    showToast('更新失敗', 'error'); return false;
  };
  const updateReply = async (threadId, replyId, contentHtml) => {
    const r = await gasPost({ action: 'adminForumUpdateReply', password, threadId, replyId, contentHtml });
    if (r.ok) { showToast('已更新留言', 'success'); load(); return true; }
    showToast('更新失敗', 'error'); return false;
  };
  const deleteReply = async (threadId, replyId) => {
    if (!confirm('確定刪除此留言?')) return;
    const r = await gasPost({ action: 'adminForumDeleteReply', password, threadId, replyId });
    if (r.ok) { showToast('已刪除留言', 'success'); load(); }
  };
  const createAdminThread = async (payload) => {
    const r = await gasPost({ action: 'adminForumCreateThread', password, ...payload });
    if (r.ok) { showToast('已發布', 'success'); setShowCompose(false); load(); }
    else showToast('發布失敗: ' + (r.error || ''), 'error');
  };

  // Bulk actions
  const bulkMove = async (categoryId) => {
    const ids = Array.from(selectedIds);
    if (ids.length === 0 || !categoryId) return;
    const r = await gasPost({ action: 'adminForumBulkMove', password, threadIds: ids, categoryId });
    if (r.ok) { showToast(`已移動 ${r.moved} 篇`, 'success'); setSelectedIds(new Set()); load(); }
  };
  const bulkDelete = async () => {
    const ids = Array.from(selectedIds);
    if (ids.length === 0) return;
    if (!confirm(`確定刪除已選的 ${ids.length} 篇文章及其所有留言?無法復原。`)) return;
    const r = await gasPost({ action: 'adminForumBulkDelete', password, threadIds: ids });
    if (r.ok) { showToast(`已刪除 ${r.deleted} 篇`, 'success'); setSelectedIds(new Set()); load(); }
  };

  if (loading || !data) {
    return <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>載入中⋯</div>;
  }

  // Helper: get all descendant ids (for filtering by parent category)
  const getDescendantIds = (catId) => {
    const out = [catId];
    (data.categories || []).filter(c => c.parentId === catId).forEach(child => {
      out.push(...getDescendantIds(child.id));
    });
    return out;
  };

  const allThreads = (data.threads || []).slice().sort((a, b) => {
    if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
    return new Date(b.lastReplyAt || b.createdAt) - new Date(a.lastReplyAt || a.createdAt);
  });

  let filteredThreads = allThreads;
  if (filterCatId) {
    const ids = new Set(getDescendantIds(filterCatId));
    filteredThreads = filteredThreads.filter(t => ids.has(t.categoryId));
  }
  if (search) {
    const s = search.toLowerCase();
    filteredThreads = filteredThreads.filter(t =>
      t.title.toLowerCase().includes(s) ||
      (t.author?.nickname || '').toLowerCase().includes(s) ||
      stripHtmlAdmin(t.contentHtml || '').toLowerCase().includes(s)
    );
  }

  const categoryById = (id) => (data.categories || []).find(c => c.id === id);
  const allCats = (data.categories || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
  const catOptions = renderCatOptions(allCats);

  // Selection helpers
  const allSelected = filteredThreads.length > 0 && filteredThreads.every(t => selectedIds.has(t.id));
  const toggleAll = () => {
    if (allSelected) setSelectedIds(new Set());
    else setSelectedIds(new Set(filteredThreads.map(t => t.id)));
  };
  const toggleOne = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };

  // If a thread is open in reader/editor, show that view
  if (openThread) {
    return (
      <ForumThreadAdminView
        thread={openThread}
        categories={data.categories || []}
        onBack={() => setOpenThread(null)}
        onPin={() => togglePin(openThread)}
        onLock={() => toggleLock(openThread)}
        onDelete={() => delThread(openThread)}
        onMove={(catId) => moveThread(openThread, catId)}
        onUpdate={async (patch) => {
          const ok = await updateThread(openThread.id, patch);
          return ok;
        }}
        onUpdateReply={(replyId, html) => updateReply(openThread.id, replyId, html)}
        onDeleteReply={(replyId) => deleteReply(openThread.id, replyId)}
      />
    );
  }

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-3">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>💬 討論區管理</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>分類結構、文章 & 留言內容、置頂/鎖定/刪除/移動</div>
          </div>
          <div className="flex gap-2">
            <button className="btn btn-primary btn-sm" onClick={() => setShowCompose(true)}>+ 管理員發文</button>
            <button className="btn btn-secondary btn-sm" onClick={load}>重新整理</button>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>
          <div className="user-stat-card"><div className="user-stat-num">{(data.categories || []).length}</div><div className="user-stat-label">分類</div></div>
          <div className="user-stat-card"><div className="user-stat-num">{allThreads.length}</div><div className="user-stat-label">討論串</div></div>
          <div className="user-stat-card"><div className="user-stat-num">{allThreads.reduce((s, t) => s + (t.replies || []).length, 0)}</div><div className="user-stat-label">留言</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--gold)' }}>{allThreads.filter(t => t.pinned).length}</div><div className="user-stat-label">置頂</div></div>
        </div>
      </div>

      <div className="card p-6">
        <div className="link-field-tabs" style={{ marginBottom: 16 }}>
          <button type="button" className={`link-tab ${tab === 'categories' ? 'active' : ''}`} onClick={() => setTab('categories')}>分類管理</button>
          <button type="button" className={`link-tab ${tab === 'threads' ? 'active' : ''}`} onClick={() => setTab('threads')}>文章列表</button>
        </div>

        {tab === 'categories' && (
          <ForumCategoriesEditor
            categories={data.categories || []}
            threads={data.threads || []}
            onSave={saveCategories}
          />
        )}

        {tab === 'threads' && (
          <div>
            {/* Filter & search */}
            <div className="flex flex-wrap gap-2 items-center mb-3">
              <input type="text" placeholder="🔍 搜尋標題/作者/內容" value={search} onChange={(e) => setSearch(e.target.value)} style={{ flex: 1, minWidth: 200 }} />
              <select value={filterCatId} onChange={(e) => setFilterCatId(e.target.value)} style={{ minWidth: 180 }}>
                <option value="">全部分類</option>
                {catOptions}
              </select>
            </div>

            {/* Bulk action bar (when selection > 0) */}
            {selectedIds.size > 0 && (
              <div className="bulk-action-bar">
                <span className="text-sm font-medium" style={{ color: 'var(--temple-red)' }}>已選 {selectedIds.size} 篇</span>
                <select onChange={(e) => { if (e.target.value) { bulkMove(e.target.value); e.target.value = ''; } }} defaultValue="">
                  <option value="">移動到分類⋯</option>
                  {catOptions}
                </select>
                <button className="btn btn-danger btn-sm" onClick={bulkDelete}>刪除選取</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedIds(new Set())}>取消選取</button>
              </div>
            )}

            {filteredThreads.length === 0 ? (
              <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>
                {allThreads.length === 0 ? '尚無任何討論串' : '沒有符合的結果'}
              </div>
            ) : (
              <div className="users-table-wrap">
                <table className="users-table">
                  <thead>
                    <tr>
                      <th style={{ width: 28 }}>
                        <input type="checkbox" checked={allSelected} onChange={toggleAll} />
                      </th>
                      <th style={{ width: 60 }}>狀態</th>
                      <th>標題</th>
                      <th>分類</th>
                      <th>作者</th>
                      <th style={{ textAlign: 'center' }}>留言</th>
                      <th style={{ textAlign: 'center' }}>讚</th>
                      <th>最後活動</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredThreads.map(t => {
                      const cat = categoryById(t.categoryId);
                      const sel = selectedIds.has(t.id);
                      return (
                        <tr key={t.id} style={sel ? { background: 'rgba(139,36,33,0.05)' } : {}}>
                          <td>
                            <input type="checkbox" checked={sel} onChange={() => toggleOne(t.id)} />
                          </td>
                          <td style={{ whiteSpace: 'nowrap' }}>
                            {t.pinned && <span className="badge warn" style={{ marginRight: 2 }}>📌</span>}
                            {t.locked && <span className="badge danger" style={{ marginRight: 2 }}>🔒</span>}
                            {t.isAdminPost && <span className="badge success" title="管理員發文">★</span>}
                          </td>
                          <td>
                            <button className="link-as-btn" onClick={() => setOpenThread(t)}><strong>{t.title}</strong></button>
                          </td>
                          <td style={{ fontSize: 12 }}>{cat ? `${cat.icon} ${cat.name}` : <span style={{ color: 'var(--danger)' }}>(無分類)</span>}</td>
                          <td style={{ fontSize: 12 }}>{t.author?.nickname}{t.author?.job ? ` ${t.author.job}` : ''}</td>
                          <td style={{ textAlign: 'center' }}>{(t.replies || []).length}</td>
                          <td style={{ textAlign: 'center' }}>{(t.likes || []).length}</td>
                          <td style={{ fontSize: 11, color: 'var(--ink-mute)' }}>
                            {t.lastReplyAt ? new Date(t.lastReplyAt).toLocaleDateString('zh-TW') : '—'}
                          </td>
                          <td style={{ whiteSpace: 'nowrap' }}>
                            <button className="btn btn-ghost btn-sm" onClick={() => setOpenThread(t)}>檢視</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Admin compose modal */}
      {showCompose && (
        <ForumAdminComposeModal
          categories={data.categories || []}
          onClose={() => setShowCompose(false)}
          onSubmit={createAdminThread}
        />
      )}
    </div>
  );
}

// Build hierarchical <option> elements with indentation
function renderCatOptions(cats, parentId, depth) {
  parentId = parentId || null;
  depth = depth || 0;
  const out = [];
  cats.filter(c => (c.parentId || null) === parentId).forEach(c => {
    out.push(<option key={c.id} value={c.id}>{'\u00a0\u00a0'.repeat(depth)}{c.icon} {c.name}</option>);
    out.push(...renderCatOptions(cats, c.id, depth + 1));
  });
  return out;
}

function stripHtmlAdmin(s) { return String(s || '').replace(/<[^>]+>/g, ' '); }

// ============================================================
// Forum thread admin view — read full thread, edit thread + replies, move, etc.
// ============================================================
function ForumThreadAdminView({ thread, categories, onBack, onPin, onLock, onDelete, onMove, onUpdate, onUpdateReply, onDeleteReply }) {
  const [editing, setEditing] = useState(false);
  const [editTitle, setEditTitle] = useState(thread.title);
  const [editAttachments, setEditAttachments] = useState(thread.attachments || []);
  const editorRef = useRef(null);
  const [editingReplyId, setEditingReplyId] = useState(null);
  const replyEditorRefs = useRef({});

  useEffect(() => {
    if (editing && editorRef.current) {
      editorRef.current.innerHTML = thread.contentHtml || '';
      setEditAttachments(thread.attachments || []);
    }
  }, [editing, thread.id]);

  const cat = categories.find(c => c.id === thread.categoryId);

  const saveEdit = async () => {
    const html = editorRef.current?.innerHTML || '';
    if (!editTitle.trim()) { alert('標題不可空白'); return; }
    if (!html.trim() || html === '<br>') { alert('內容不可空白'); return; }
    const ok = await onUpdate({ title: editTitle.trim(), contentHtml: html, attachments: editAttachments });
    if (ok) setEditing(false);
  };

  const saveReply = async (reply) => {
    const ref = replyEditorRefs.current[reply.id];
    if (!ref) return;
    const html = ref.innerHTML;
    if (!html.trim() || html === '<br>') { alert('內容不可空白'); return; }
    const ok = await onUpdateReply(reply.id, html);
    if (ok) setEditingReplyId(null);
  };

  return (
    <div>
      <div className="flex items-center gap-2 mb-4">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← 返回列表</button>
        <span className="text-sm" style={{ color: 'var(--ink-mute)' }}>·</span>
        <span className="text-sm" style={{ color: 'var(--ink-light)' }}>{cat ? `${cat.icon} ${cat.name}` : '(無分類)'}</span>
      </div>

      <div className="card p-6">
        {/* Thread head */}
        <div className="flex items-start justify-between gap-3 flex-wrap mb-3">
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="flex flex-wrap gap-2 mb-2">
              {thread.pinned && <span className="badge warn">📌 置頂</span>}
              {thread.locked && <span className="badge danger">🔒 已鎖定</span>}
              {thread.isAdminPost && <span className="badge success">★ 管理員發文</span>}
            </div>
            {editing ? (
              <input type="text" value={editTitle} onChange={(e) => setEditTitle(e.target.value)} style={{ fontSize: 18, fontWeight: 500 }} />
            ) : (
              <h2 className="font-serif text-2xl font-medium" style={{ margin: 0 }}>{thread.title}</h2>
            )}
            <div className="text-xs mt-2" style={{ color: 'var(--ink-mute)' }}>
              {thread.author?.nickname}{thread.author?.job ? ` · ${thread.author.job}` : ''} · {new Date(thread.createdAt).toLocaleString('zh-TW')}
              {thread.editedByAdmin && <span style={{ color: 'var(--temple-red)', marginLeft: 8 }}>(管理員已編輯)</span>}
            </div>
          </div>
          <div className="flex flex-wrap gap-1" style={{ alignItems: 'flex-start' }}>
            {!editing && (
              <>
                <select value={thread.categoryId} onChange={(e) => onMove(e.target.value)} className="btn btn-ghost btn-sm" style={{ paddingTop: 6, paddingBottom: 6 }}>
                  {renderCatOptions(categories.slice().sort((a, b) => (a.order || 0) - (b.order || 0)))}
                </select>

                        <>

                        <>
                          <button className="btn btn-ghost btn-sm" onClick={() => setEditingReplyId(r.id)}>編輯</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => onDeleteReply(r.id)} style={{ color: 'var(--danger)' }}>刪除</button>
                        </>
                      )}

                  <div className="admin-reply-body">
                    {isReplyEditing ? (
                      <AdminContentEditor

                      <div dangerouslySetInnerHTML={{ __html: r.contentHtml }} />
                    )}

                  <div className="text-xs mt-2" style={{ color: 'var(--ink-mute)' }}>{(r.likes || []).length} 個讚</div>
                </div>
              );

        )}
      </div>
    </div>
  );
}

// Lightweight contentEditable editor for admin — reuses similar pattern as public side
function AdminContentEditor({ editorRef, initialContent, compact }) {
  const innerRef = useRef(null);
  const setRef = (el) => {
    innerRef.current = el;
    if (typeof editorRef === 'function') editorRef(el);
    else if (editorRef) editorRef.current = el;
  };

  useEffect(() => {
    if (innerRef.current && initialContent !== undefined) {
      innerRef.current.innerHTML = initialContent || '';
    }
  }, []);

  const exec = (cmd, val) => { document.execCommand(cmd, false, val); innerRef.current?.focus(); };

  return (
    <div className="forum-editor">
      <div className="forum-editor-toolbar" style={{ background: 'var(--bg)' }}>
        <button type="button" onClick={() => exec('bold')}><strong>B</strong></button>
        <button type="button" onClick={() => exec('italic')}><em>I</em></button>
        <button type="button" onClick={() => exec('underline')} style={{ textDecoration: 'underline' }}>U</button>
        <span className="forum-editor-divider"></span>
        <button type="button" onClick={() => exec('insertUnorderedList')}>• 列表</button>
        <button type="button" onClick={() => {
          const url = prompt('輸入連結網址 (https://...)');
          if (url) exec('createLink', url);
        }}>🔗</button>
      </div>
      <div
        ref={setRef}
        className={`forum-editor-area ${compact ? 'compact' : ''}`}
        contentEditable
        suppressContentEditableWarning
        style={{ background: 'var(--bg-card)', color: 'var(--ink)' }}
      />
    </div>
  );
}

// Admin attachment uploader — uses admin password instead of token
function AdminAttachmentsField({ value, onChange }) {
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);

  const onFile = async (file) => {
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert(`檔案過大: ${file.name}。單檔上限 10 MB`);
      return;
    }
    setUploading(true);
    try {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const base64 = e.target.result.split(',')[1];
          // Admin uses session token via login; if no token use admin password
          const token = localStorage.getItem('jc_user_token') || '';
          const r = await gasPost({
            action: 'forumUploadAttachment',
            token,
            base64,
            filename: file.name,
            mimeType: file.type
          });
          if (r.ok && r.attachment) {
            onChange([...(value || []), r.attachment]);
          } else {
            // For admin without user token, suggest a workaround
            if (r.error === 'login_required') {
              alert('管理員上傳附件需要先以會員身份登入前台。請先到前台註冊一個管理員帳號並登入,或使用前台發文功能。');
            } else {
              alert('上傳失敗: ' + (r.error || ''));
            }
          }
        } catch (err) {
          alert('上傳失敗: ' + err.message);
        }
        setUploading(false);
        if (fileRef.current) fileRef.current.value = '';
      };
      reader.readAsDataURL(file);
    } catch (err) {
      setUploading(false);
      alert('檔案讀取失敗');
    }
  };

  const removeAt = (i) => onChange((value || []).filter((_, idx) => idx !== i));
  const list = value || [];

  return (
    <div>
      {list.length > 0 && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 8 }}>
          {list.map((att, i) => (
            <div key={att.id} className="admin-att-card">
              <div className="admin-att-icon">{adminAttIcon(att.mimeType, att.filename)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 500, fontSize: 13, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{att.filename}</div>
                <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>{adminFormatBytes(att.size)}</div>
              </div>
              <button type="button" className="btn btn-ghost btn-sm" onClick={() => removeAt(i)} style={{ color: 'var(--danger)' }}>✕</button>
            </div>
          ))}
        </div>
      )}
      <button type="button" className="btn btn-secondary btn-sm" onClick={() => fileRef.current?.click()} disabled={uploading}>
        {uploading ? '上傳中⋯' : '+ 加入附件'}
      </button>
      <input ref={fileRef} type="file" style={{ display: 'none' }} onChange={(e) => onFile(e.target.files[0])} />
    </div>
  );
}

// Read-only display of attachments in admin thread view
function AdminAttachmentDisplay({ attachments }) {
  if (!attachments || attachments.length === 0) return null;
  return (
    <div className="mt-4 p-3" style={{ background: 'rgba(184,134,11,0.06)', border: '1px solid rgba(184,134,11,0.2)', borderRadius: 6 }}>
      <div className="text-sm font-medium mb-2" style={{ color: 'var(--ink-light)' }}>📎 附件 ({attachments.length})</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {attachments.map(att => (
          <a key={att.id} href={att.downloadUrl} target="_blank" rel="noreferrer" className="admin-att-card admin-att-card-clickable">
            <div className="admin-att-icon">{adminAttIcon(att.mimeType, att.filename)}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 500, fontSize: 13, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: 'var(--ink)' }}>{att.filename}</div>
              <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>{adminFormatBytes(att.size)} · 下載 ↓</div>
            </div>
          </a>
        ))}
      </div>
    </div>
  );

function adminFormatBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

function adminAttIcon(mime, filename) {
  const lower = (filename || '').toLowerCase();
  const m = (mime || '').toLowerCase();
  if (m.startsWith('image/')) return '🖼';
  if (m === 'application/pdf' || lower.endsWith('.pdf')) return '📄';
  if (lower.match(/\.(docx?|odt|rtf)$/) || m.includes('word')) return '📝';
  if (lower.match(/\.(xlsx?|csv|ods)$/) || m.includes('sheet') || m.includes('excel')) return '📊';
  if (lower.match(/\.(pptx?|odp)$/) || m.includes('presentation')) return '📽';
  if (lower.match(/\.(zip|rar|7z|tar|gz)$/) || m.includes('zip')) return '🗜';
  if (lower.match(/\.(mp4|mov|avi|mkv|webm)$/) || m.startsWith('video/')) return '🎬';
  if (lower.match(/\.(mp3|wav|m4a|flac|ogg)$/) || m.startsWith('audio/')) return '🎵';
  if (lower.match(/\.(txt|md|log)$/) || m.startsWith('text/')) return '📃';
  return '📎';
}

// ============================================================
// Original ForumCategoriesEditor (legacy stub kept for replacement below)
// (the actual implementation is just below)
// ============================================================

function ForumCategoriesEditor({ categories, onSave, threads }) {
  const [draft, setDraft] = useState(categories);
  const [editingId, setEditingId] = useState(null);
  const dirty = JSON.stringify(draft) !== JSON.stringify(categories);

  const update = (id, patch) => {
    setDraft(draft.map(c => c.id === id ? { ...c, ...patch } : c));
  };

  // Move within siblings (same parentId)
  const move = (id, dir) => {
    const cat = draft.find(c => c.id === id);
    if (!cat) return;
    const siblings = draft.filter(c => (c.parentId || null) === (cat.parentId || null));
    siblings.sort((a, b) => (a.order || 0) - (b.order || 0));
    const idx = siblings.findIndex(s => s.id === id);
    const swapWith = siblings[idx + dir];
    if (!swapWith) return;
    const swap = [...draft];
    const a = swap.find(c => c.id === id);
    const b = swap.find(c => c.id === swapWith.id);
    [a.order, b.order] = [b.order || 0, a.order || 0];
    setDraft(swap);
  };

  // Get descendant ids (recursive)
  const getDescendants = (parentId) => {
    const out = [];
    draft.filter(c => c.parentId === parentId).forEach(child => {
      out.push(child.id, ...getDescendants(child.id));
    });
    return out;
  };

  const remove = (id) => {
    const cat = draft.find(c => c.id === id);
    if (!cat) return;
    const descIds = getDescendants(id);
    const allIds = [id, ...descIds];
    const threadCount = (threads || []).filter(t => allIds.indexOf(t.categoryId) >= 0).length;
    let warning = `確定刪除分類「${cat.name}」?`;
    if (descIds.length > 0) warning += `\n此分類底下還有 ${descIds.length} 個子分類也會一併刪除。`;
    if (threadCount > 0) warning += `\n此分類及子分類共有 ${threadCount} 篇文章會變成「無分類」(不會刪文,但要在「文章列表」手動移到別的分類)。`;
    if (!confirm(warning)) return;
    setDraft(draft.filter(c => allIds.indexOf(c.id) < 0));
  };

  const addRoot = () => {
    const newCat = {
      id: 'cat-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6),
      parentId: null,
      name: '新分類', description: '', icon: '💬',
      order: draft.filter(c => !c.parentId).length,
      readPolicy: 'members', writePolicy: 'members'
    };
    setDraft([...draft, newCat]);
    setEditingId(newCat.id);
  };

  const addChild = (parentId) => {
    const siblings = draft.filter(c => c.parentId === parentId);
    const newCat = {
      id: 'cat-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6),
      parentId,
      name: '新子分類', description: '', icon: '💬',
      order: siblings.length,
      readPolicy: 'members', writePolicy: 'members'
    };
    setDraft([...draft, newCat]);
    setEditingId(newCat.id);
  };

  // Move to different parent (re-parent)
  const reparent = (id, newParentId) => {
    if (id === newParentId) return; // can't be own parent
    // Check no circular: newParentId can't be a descendant of id
    if (getDescendants(id).indexOf(newParentId) >= 0) {
      alert('不能將分類移到自己的子分類底下');
      return;
    }
    update(id, { parentId: newParentId || null });
  };

  // Render tree recursively
  const renderTree = (parentId, depth) => {
    const siblings = draft.filter(c => (c.parentId || null) === parentId).sort((a, b) => (a.order || 0) - (b.order || 0));
    if (siblings.length === 0) return null;
    return (
      <div className={depth > 0 ? 'cat-tree-children' : ''}>
        {siblings.map((c, idx) => {
          const isEditing = editingId === c.id;
          const childCount = draft.filter(cc => cc.parentId === c.id).length;
          const allDescendant = [c.id, ...getDescendants(c.id)];
          const threadCount = (threads || []).filter(t => allDescendant.indexOf(t.categoryId) >= 0).length;
          // Possible parents: any cat that is NOT this cat or its descendants
          const possibleParents = draft.filter(p => allDescendant.indexOf(p.id) < 0);
          return (
            <div key={c.id} className="cat-tree-node">
              <div className="cat-tree-row">
                <span className="cat-tree-handle" style={{ width: 28 + depth * 4 }}>
                  {depth > 0 ? '└' : ''}
                </span>
                <span className="cat-tree-icon">{c.icon || '💬'}</span>
                <div className="cat-tree-name">
                  {c.name}
                  {childCount > 0 && <span className="cat-tree-badge">{childCount} 個子分類</span>}
                  {threadCount > 0 && <span className="cat-tree-badge" style={{ color: 'var(--temple-red)' }}>{threadCount} 篇文</span>}
                </div>
                <div className="cat-tree-controls">
                  <button type="button" className="btn btn-ghost btn-sm" disabled={idx === 0} onClick={() => move(c.id, -1)}>↑</button>
                  <button type="button" className="btn btn-ghost btn-sm" disabled={idx === siblings.length - 1} onClick={() => move(c.id, 1)}>↓</button>
                  <button type="button" className="btn btn-ghost btn-sm" onClick={() => addChild(c.id)} title="新增子分類">+ 子</button>
                  <button type="button" className="btn btn-ghost btn-sm" onClick={() => setEditingId(isEditing ? null : c.id)}>{isEditing ? '收起' : '編輯'}</button>
                  <button type="button" className="btn btn-ghost btn-sm" onClick={() => remove(c.id)} style={{ color: 'var(--danger)' }}>✕</button>
                </div>
              </div>
              {isEditing && (
                <div className="cat-tree-edit">
                  <div className="grid-2">
                    <div>
                      <label className="field-label">圖示(emoji)</label>
                      <EmojiPicker value={c.icon || ''} onChange={(v) => update(c.id, { icon: v })} placeholder="💬" allowCustom />
                    </div>
                    <div>
                      <label className="field-label">分類名稱</label>
                      <input type="text" value={c.name || ''} onChange={(e) => update(c.id, { name: e.target.value })} />
                    </div>
                  </div>
                  <div className="mt-3">
                    <label className="field-label">描述(選填)</label>
                    <input type="text" value={c.description || ''} onChange={(e) => update(c.id, { description: e.target.value })} placeholder="例:法務交流、修行心得" />
                  </div>
                  <div className="mt-3">
                    <label className="field-label">所屬上層分類</label>
                    <select value={c.parentId || ''} onChange={(e) => reparent(c.id, e.target.value || null)}>
                      <option value="">— 頂層分類 —</option>
                      {possibleParents.map(p => (
                        <option key={p.id} value={p.id}>{p.icon} {p.name}</option>
                      ))}
                    </select>
                  </div>
                  <div className="grid-2 mt-3">
                    <div>
                      <label className="field-label">誰可閱讀</label>
                      <select value={c.readPolicy || 'members'} onChange={(e) => update(c.id, { readPolicy: e.target.value })}>
                        <option value="public">所有人(訪客也能看)</option>
                        <option value="members">僅會員</option>
                      </select>
                    </div>
                    <div>
                      <label className="field-label">誰可發文</label>
                      <select value={c.writePolicy || 'members'} onChange={(e) => update(c.id, { writePolicy: e.target.value })}>
                        <option value="members">僅會員</option>
                        <option value="public">僅會員(同上)</option>
                      </select>
                    </div>
                  </div>
                </div>
              )}
              {/* Render children */}
              {renderTree(c.id, depth + 1)}
            </div>
          );
        })}
      </div>
    );
  };

  return (
    <div>
      <div className="text-sm mb-4" style={{ color: 'var(--ink-light)' }}>
        建立樹狀分類結構。點「+ 子」可新增任意深度的子分類。每個分類可獨立設定權限,子分類預設繼承上層權限可被覆寫。
      </div>

      <div className="cat-tree">
        {renderTree(null, 0)}
      </div>

      <button type="button" className="btn btn-secondary btn-sm mt-3" onClick={addRoot}>+ 新增頂層分類</button>

      <div className="mt-6 sticky bottom-0 py-4" style={{ background: 'var(--bg-card)', borderTop: dirty ? '1px solid var(--border)' : 'none' }}>
        <button className="btn btn-primary" onClick={() => onSave(draft)} disabled={!dirty}>
          {dirty ? '儲存分類結構' : '尚無變更'}
        </button>
      </div>
    </div>
  );
}


// ============================================================
// System Health — disk usage, Gmail quota, system stats
// ============================================================
function SystemHealthView({ password, showToast }) {
  const [health, setHealth] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    setLoading(true);
    try {
      const r = await gasPost({ action: 'adminGetSystemHealth', password });
      if (r.ok) setHealth(r.health);
      else showToast('讀取失敗: ' + (r.error || ''), 'error');
    } catch (e) { showToast('連線失敗', 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  if (loading || !health) {
    return <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>讀取系統狀態⋯</div>;
  }

  const fileLabel = {
    content: '網站內容',
    users: '使用者資料',
    forum: '討論區',
    calendar: '行事曆'
  };

  const statusBadge = (status) => {
    if (status === 'danger') return <span className="badge danger">⚠️ 過大</span>;
    if (status === 'warn') return <span className="badge warn">注意</span>;
    if (status === 'ok') return <span className="badge success">健康</span>;
    return <span className="badge">未建立</span>;
  };

  const formatBytes = (b) => {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(2) + ' MB';
  };

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-3">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>⚙️ 系統健康檢查</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>
              即時監控資料檔大小、Gmail 配額、系統狀態
            </div>
          </div>
          <button className="btn btn-secondary btn-sm" onClick={load}>重新整理</button>
        </div>
        <div className="text-xs" style={{ color: 'var(--ink-mute)' }}>
          檢查時間:{new Date(health.timestamp).toLocaleString('zh-TW')}
        </div>
      </div>

      {/* Files */}
      <div className="card p-6 mb-4">
        <h3 className="font-serif text-lg font-medium mb-1">📂 資料檔狀態</h3>
        <div className="text-sm mb-4" style={{ color: 'var(--ink-mute)' }}>
          每個資料檔在 1 MB 以下健康、1-3 MB 注意、超過 3 MB 建議分檔。
        </div>
        <div className="users-table-wrap">
          <table className="users-table">
            <thead>
              <tr>
                <th>檔案</th>
                <th>狀態</th>
                <th>大小</th>
                <th>最後更新</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(health.files).map(([key, f]) => (
                <tr key={key}>
                  <td>
                    <strong>{fileLabel[key] || key}</strong>
                    <div className="text-xs font-mono" style={{ color: 'var(--ink-mute)' }}>{f.filename}</div>
                  </td>
                  <td>{statusBadge(f.exists ? f.status : 'none')}</td>
                  <td style={{ fontFamily: 'monospace', fontSize: 13 }}>{f.exists ? formatBytes(f.sizeBytes) : '—'}</td>
                  <td style={{ fontSize: 12, color: 'var(--ink-mute)' }}>
                    {f.lastModified ? new Date(f.lastModified).toLocaleString('zh-TW') : '—'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {health.files.forum.status === 'warn' || health.files.forum.status === 'danger' ? (
          <div className="mt-4 p-3" style={{ background: 'rgba(184,134,11,0.1)', border: '1px solid rgba(184,134,11,0.3)', borderRadius: 6, fontSize: 13 }}>
            💡 <strong>討論區檔案偏大</strong> — 隨討論串和留言累積會繼續成長。建議近期內聯絡 Claude 進行「分檔遷移」(把每篇文章拆成獨立檔),可大幅降低讀取時間。
          </div>
        ) : null}
      </div>

      {/* Gmail quota */}
      <div className="card p-6 mb-4">

        <div className="text-sm mb-4" style={{ color: 'var(--ink-mute)' }}>
          一般 Gmail 每天 100 封、Workspace 1500 封。配額每日 UTC 重置。
        </div>
        <div className="flex items-center gap-4 flex-wrap">
          <div className="user-stat-card" style={{ minWidth: 160 }}>
            <div className="user-stat-num" style={{
              color: health.gmail.status === 'danger' ? 'var(--danger)' :
                     health.gmail.status === 'warn' ? 'var(--gold)' : 'var(--temple-red)'
            }}>{health.gmail.remaining ?? '?'}</div>
            <div className="user-stat-label">今日剩餘配額</div>
          </div>
          <div style={{ flex: 1, minWidth: 200, fontSize: 13, color: 'var(--ink-light)' }}>
            {health.gmail.status === 'danger' && '⚠️ 配額即將耗盡 — 暫停所有非必要寄信'}
            {health.gmail.status === 'warn' && '⚠ 配額偏低 — 大量註冊或群發信時可能撞限'}
            {health.gmail.status === 'ok' && '✓ 配額充足'}
            {health.gmail.status === 'unknown' && '無法讀取配額(請確認 GAS 已授權 MailApp)'}

        </div>
      </div>

      {/* Stats */}
      <div className="grid-2 mb-4" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 16 }}>
        {health.userStats && (
          <div className="card p-6">
            <h3 className="font-serif text-lg font-medium mb-3">👥 使用者統計</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
              <div className="user-stat-card"><div className="user-stat-num">{health.userStats.total}</div><div className="user-stat-label">總註冊</div></div>
              <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--success)' }}>{health.userStats.verified}</div><div className="user-stat-label">已驗證</div></div>
              <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--danger)' }}>{health.userStats.blocked}</div><div className="user-stat-label">已停用</div></div>
            </div>
          </div>
        )}

        {health.forumStats && (
          <div className="card p-6">
            <h3 className="font-serif text-lg font-medium mb-3">💬 討論區統計</h3>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
              <div className="user-stat-card"><div className="user-stat-num">{health.forumStats.threadCount}</div><div className="user-stat-label">文章</div></div>
              <div className="user-stat-card"><div className="user-stat-num">{health.forumStats.replyCount}</div><div className="user-stat-label">留言</div></div>
              <div className="user-stat-card"><div className="user-stat-num">{health.forumStats.categoryCount}</div><div className="user-stat-label">分類</div></div>
            </div>
            {health.forumStats.largestThreadReplies > 100 && (
              <div className="text-xs mt-3" style={{ color: 'var(--gold)' }}>
                💡 最大單篇文章已有 {health.forumStats.largestThreadReplies} 則留言,建議考慮拆分長討論
              </div>
            )}
          </div>
        )}
      </div>

      <div className="grid-2 mb-4" style={{ gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12 }}>
        <div className="card p-5">
          <div className="text-sm mb-1" style={{ color: 'var(--ink-mute)' }}>網站訪問次數</div>
          <div className="font-cormorant" style={{ fontSize: 28, fontWeight: 500, color: 'var(--temple-red)' }}>{health.visits || 0}</div>
        </div>
        <div className="card p-5">
          <div className="text-sm mb-1" style={{ color: 'var(--ink-mute)' }}>備份檔案數</div>
          <div className="font-cormorant" style={{ fontSize: 28, fontWeight: 500, color: 'var(--ink)' }}>{health.backupCount}</div>
        </div>
        <div className="card p-5">
          <div className="text-sm mb-1" style={{ color: 'var(--ink-mute)' }}>進行中的群發信</div>

            <div className="font-cormorant" style={{ fontSize: 28, fontWeight: 500, color: 'var(--gold)' }}>
              {health.attachmentStats.count}

              共 {(health.attachmentStats.totalBytes / 1024 / 1024).toFixed(1)} MB

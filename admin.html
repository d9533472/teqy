          </div>
        )}
      </div>
    </div>
  );
}


// ============================================================
// Broadcast Manager — schedule mass emails to user groups
// ============================================================
function BroadcastManagerView({ password, showToast }) {
  const [tab, setTab] = useState('list'); // list | compose
  const [broadcasts, setBroadcasts] = useState([]);
  const [userConfig, setUserConfig] = useState(null);
  const [loading, setLoading] = useState(true);

  const load = async () => {
    setLoading(true);
    try {
      const [r1, r2] = await Promise.all([
        gasPost({ action: 'adminBroadcastList', password }),
        gasPost({ action: 'userGetConfig' })
      ]);
      if (r1.ok) setBroadcasts(r1.broadcasts);
      if (r2.ok) setUserConfig(r2.config);
    } catch (e) { showToast('讀取失敗', 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const cancelBroadcast = async (b) => {
    if (!confirm(`確定取消「${b.subject}」?已寄出的信不會收回,只會停止後續寄送。`)) return;
    const r = await gasPost({ action: 'adminBroadcastCancel', password, broadcastId: b.id });
    if (r.ok) { showToast('已取消', 'success'); load(); }
  };
  const deleteBroadcast = async (b) => {
    if (!confirm(`確定刪除這筆群發信記錄?`)) return;
    const r = await gasPost({ action: 'adminBroadcastDelete', password, broadcastId: b.id });
    if (r.ok) { showToast('已刪除', 'success'); load(); }
  };

  const statusBadge = (s) => {
    if (s === 'pending') return <span className="badge warn">⏳ 等待寄送</span>;
    if (s === 'sending') return <span className="badge warn">🚀 寄送中</span>;
    if (s === 'done') return <span className="badge success">✓ 已完成</span>;
    if (s === 'cancelled') return <span className="badge">已取消</span>;
    return <span className="badge">{s}</span>;
  };

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-1">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>📨 群發信</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>對所有會員或特定族群發信。系統會自動分批寄送,避開 Gmail 配額限制。</div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={() => setTab('compose')}>+ 新增群發信</button>
        </div>
      </div>

      <div className="card p-6">
        <div className="link-field-tabs" style={{ marginBottom: 16 }}>
          <button type="button" className={`link-tab ${tab === 'list' ? 'active' : ''}`} onClick={() => setTab('list')}>歷史記錄</button>
          <button type="button" className={`link-tab ${tab === 'compose' ? 'active' : ''}`} onClick={() => setTab('compose')}>撰寫新群發信</button>
        </div>

        {tab === 'compose' && userConfig && (
          <BroadcastComposeForm
            userConfig={userConfig}
            password={password}
            showToast={showToast}
            onSent={() => { setTab('list'); load(); }}
          />
        )}

        {tab === 'list' && (
          <div>
            {loading ? (
              <div style={{ padding: 24, textAlign: 'center', color: 'var(--ink-mute)' }}>載入中⋯</div>
            ) : broadcasts.length === 0 ? (
              <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>
                尚未發送過任何群發信
              </div>
            ) : (
              <div className="users-table-wrap">
                <table className="users-table">
                  <thead>
                    <tr>
                      <th>主旨</th>
                      <th>對象</th>
                      <th>狀態</th>
                      <th>進度</th>
                      <th>排程時間</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {broadcasts.map(b => (
                      <tr key={b.id}>
                        <td><strong>{b.subject}</strong></td>
                        <td style={{ fontSize: 12 }}>{describeAudience(b.audience, b.audienceFilter)} ({b.totalRecipients} 人)</td>
                        <td>{statusBadge(b.status)}</td>
                        <td style={{ fontSize: 12 }}>
                          已寄 <strong>{b.sentCount}</strong> · 失敗 {b.failedCount} · 待寄 {b.pendingCount}
                          <div style={{ height: 4, background: 'var(--bg)', borderRadius: 2, overflow: 'hidden', marginTop: 4 }}>
                            <div style={{
                              height: '100%',
                              width: `${b.totalRecipients > 0 ? (b.sentCount / b.totalRecipients) * 100 : 0}%`,
                              background: 'var(--temple-red)',
                              transition: 'width 0.3s'
                            }} />
                          </div>
                        </td>
                        <td style={{ fontSize: 11, color: 'var(--ink-mute)' }}>
                          {b.scheduledAt ? new Date(b.scheduledAt).toLocaleString('zh-TW') : '立即'}
                        </td>
                        <td style={{ whiteSpace: 'nowrap' }}>
                          {(b.status === 'pending' || b.status === 'sending') && (
                            <button className="btn btn-ghost btn-sm" onClick={() => cancelBroadcast(b)}>取消</button>
                          )}
                          {(b.status === 'done' || b.status === 'cancelled') && (
                            <button className="btn btn-ghost btn-sm" onClick={() => deleteBroadcast(b)} style={{ color: 'var(--danger)' }}>刪除記錄</button>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
            <div className="mt-3 flex justify-end">
              <button className="btn btn-secondary btn-sm" onClick={load}>重新整理</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function describeAudience(audience, filter) {
  if (audience === 'all') return '全部會員';
  if (audience === 'job') return `天職:${(filter?.jobs || []).join(', ') || '?'}`;
  if (audience === 'gender') return `${filter?.gender || ''}`;
  if (audience === 'country') return `國家:${filter?.country || ''}`;
  if (audience === 'specific') return `特定 ${(filter?.userIds || []).length} 人`;
  return audience;
}

function BroadcastComposeForm({ userConfig, password, showToast, onSent }) {
  const [subject, setSubject] = useState('');
  const [bodyHtml, setBodyHtml] = useState('<p>各位道親 平安:</p>\n<p></p>\n<p>...信件內容...</p>\n<p></p>\n<p>清淨慈悲、廣結善緣</p>');
  const [audience, setAudience] = useState('all');
  const [filterJobs, setFilterJobs] = useState([]);
  const [filterGender, setFilterGender] = useState('乾道');
  const [filterCountry, setFilterCountry] = useState('台灣');
  const [scheduleEnabled, setScheduleEnabled] = useState(false);
  const [scheduleAt, setScheduleAt] = useState('');
  const [testEmail, setTestEmail] = useState('');
  const [busy, setBusy] = useState(false);
  const [confirmOpen, setConfirmOpen] = useState(false);

  const toggleJob = (j) => {
    if (filterJobs.indexOf(j) >= 0) setFilterJobs(filterJobs.filter(x => x !== j));
    else setFilterJobs([...filterJobs, j]);
  };

  const buildFilter = () => {
    if (audience === 'job') return { jobs: filterJobs };
    if (audience === 'gender') return { gender: filterGender };
    if (audience === 'country') return { country: filterCountry };
    return {};
  };

  const sendTest = async () => {
    if (!testEmail.trim()) { showToast('請輸入測試信箱', 'error'); return; }
    if (!subject.trim() || !bodyHtml.trim()) { showToast('請先填寫主旨與內文', 'error'); return; }
    setBusy(true);
    const r = await gasPost({
      action: 'adminBroadcastSendTest',
      password,
      subject, bodyHtml,
      testEmail: testEmail.trim()
    });
    setBusy(false);
    if (r.ok) showToast(`測試信已寄至 ${testEmail}`, 'success');
    else showToast('寄送失敗: ' + (r.error || ''), 'error');
  };

  const submit = async () => {
    if (!subject.trim() || !bodyHtml.trim()) { showToast('請填寫主旨和內文', 'error'); return; }
    if (audience === 'job' && filterJobs.length === 0) { showToast('請選擇至少一個天職', 'error'); return; }

    const payload = {
      subject: subject.trim(),
      bodyHtml,
      audience,
      audienceFilter: buildFilter(),
      scheduledAt: scheduleEnabled && scheduleAt ? new Date(scheduleAt).toISOString() : null
    };
    setBusy(true);
    const r = await gasPost({ action: 'adminBroadcastCreate', password, ...payload });
    setBusy(false);
    if (r.ok) {
      showToast(`已建立群發任務,共 ${r.recipientCount} 位收件者`, 'success');
      onSent();
    } else {
      const errs = {
        no_recipients: '符合條件的收件者為 0 人',
        missing_subject: '主旨不可空白',
        missing_body: '內文不可空白'
      };
      showToast(errs[r.error] || ('失敗: ' + r.error), 'error');
    }
  };

  return (
    <div>
      <div className="text-sm mb-4 p-3" style={{ background: 'var(--bg)', borderRadius: 6, color: 'var(--ink-soft)' }}>
        💡 <strong>運作方式:</strong> 系統建立任務後會自動每 5 分鐘寄出一批(每批 30 封),避開 Gmail 每日 100 封的限制。一旦完成會自動停止 trigger。<br/>
        <strong>變數可用:</strong> <code>{'{nickname}'}</code> <code>{'{job}'}</code> <code>{'{gender}'}</code> <code>{'{email}'}</code> <code>{'{country}'}</code> <code>{'{region}'}</code> <code>{'{siteName}'}</code>
      </div>

      <label className="field-label">郵件主旨</label>
      <input type="text" value={subject} onChange={(e) => setSubject(e.target.value)} placeholder="【{siteName}】法會通知" />

      <label className="field-label mt-3">內文(支援 HTML)</label>
      <textarea
        value={bodyHtml}
        onChange={(e) => setBodyHtml(e.target.value)}
        rows={10}
        style={{ fontFamily: 'monospace', fontSize: 13 }}
      />
      <div className="field-help">
        可用 HTML:<code>&lt;p&gt;</code> <code>&lt;strong&gt;</code> <code>&lt;ul&gt;&lt;li&gt;</code> <code>&lt;a href=""&gt;</code> <code>&lt;br&gt;</code>
      </div>

      <label className="field-label mt-4">收件對象</label>
      <select value={audience} onChange={(e) => setAudience(e.target.value)}>
        <option value="all">全部會員(已驗證 + 未停用)</option>
        <option value="job">特定天職</option>
        <option value="gender">特定性別(乾道/坤道)</option>
        <option value="country">特定國家</option>
      </select>

      {audience === 'job' && (
        <div className="mt-2 p-3" style={{ background: 'var(--bg)', borderRadius: 6 }}>
          <div className="text-sm mb-2" style={{ color: 'var(--ink-soft)' }}>選擇要寄送的天職(可多選):</div>
          <div className="flex flex-wrap gap-2">
            {(userConfig.jobs || []).map(j => (
              <label key={j} className="flex items-center gap-1 text-sm" style={{ padding: '6px 12px', background: filterJobs.indexOf(j) >= 0 ? 'var(--temple-red)' : 'var(--bg-card)', color: filterJobs.indexOf(j) >= 0 ? 'white' : 'var(--ink)', borderRadius: 999, cursor: 'pointer', border: '1px solid var(--border)' }}>
                <input type="checkbox" checked={filterJobs.indexOf(j) >= 0} onChange={() => toggleJob(j)} style={{ display: 'none' }} />
                {j}
              </label>
            ))}
          </div>
        </div>
      )}

      {audience === 'gender' && (
        <div className="mt-2">
          <select value={filterGender} onChange={(e) => setFilterGender(e.target.value)}>
            <option value="乾道">乾道</option>
            <option value="坤道">坤道</option>
          </select>
        </div>
      )}

      {audience === 'country' && (
        <div className="mt-2">
          <select value={filterCountry} onChange={(e) => setFilterCountry(e.target.value)}>
            {(userConfig.countries || []).map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      )}

      <div className="mt-4 pt-4 border-t" style={{ borderColor: 'var(--border)' }}>
        <label className="flex items-center gap-2 text-sm" style={{ color: 'var(--ink-soft)' }}>
          <input type="checkbox" checked={scheduleEnabled} onChange={(e) => setScheduleEnabled(e.target.checked)} />
          排程定時寄送(不勾就立即排隊寄)
        </label>
        {scheduleEnabled && (
          <div className="mt-2">
            <input type="datetime-local" value={scheduleAt} onChange={(e) => setScheduleAt(e.target.value)} />
            <div className="field-help">時區為 GAS 設定的時區(預設台北時間)</div>
          </div>
        )}
      </div>

      <div className="mt-4 pt-4 border-t" style={{ borderColor: 'var(--border)' }}>
        <label className="field-label">先寄一封測試信(選填,但建議先測試格式)</label>
        <div className="flex gap-2">
          <input type="email" value={testEmail} onChange={(e) => setTestEmail(e.target.value)} placeholder="your@email.com" style={{ flex: 1 }} />
          <button type="button" className="btn btn-secondary btn-sm" onClick={sendTest} disabled={busy}>📧 寄測試</button>
        </div>
      </div>

      <div className="mt-6 pt-4 border-t flex gap-2 justify-end" style={{ borderColor: 'var(--border)' }}>
        <button className="btn btn-primary" onClick={() => setConfirmOpen(true)} disabled={busy || !subject.trim() || !bodyHtml.trim()}>
          {busy ? '處理中⋯' : '建立群發任務'}
        </button>
      </div>

      {confirmOpen && (
        <div className="modal-overlay" onClick={() => setConfirmOpen(false)}>
          <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 460 }}>
            <h3 className="font-serif text-xl font-medium mb-3">確認寄送</h3>
            <div className="text-sm" style={{ color: 'var(--ink-soft)', lineHeight: 1.7 }}>
              <div className="mb-2"><strong>主旨:</strong>{subject}</div>
              <div className="mb-2"><strong>對象:</strong>{describeAudience(audience, buildFilter())}</div>
              <div className="mb-2"><strong>排程:</strong>{scheduleEnabled && scheduleAt ? new Date(scheduleAt).toLocaleString('zh-TW') : '建立後立即進入寄送佇列'}</div>
              <div className="mt-3 p-3" style={{ background: 'rgba(184,134,11,0.1)', borderRadius: 4, fontSize: 13 }}>
                ⚠️ 寄出後無法收回。系統會自動分批寄送以避免 Gmail 配額耗盡。
              </div>
            </div>
            <div className="mt-4 flex gap-2 justify-end">
              <button className="btn btn-secondary btn-sm" onClick={() => setConfirmOpen(false)}>取消</button>
              <button className="btn btn-primary btn-sm" onClick={() => { setConfirmOpen(false); submit(); }} disabled={busy}>確認建立</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ============================================================
// Calendar Manager — events, categories, import (CSV/ICS/Google)
// ============================================================
function CalendarManagerView({ password, showToast }) {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState('events'); // events | categories | import
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterMonth, setFilterMonth] = useState(''); // 'YYYY-MM' or empty
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [editingEvent, setEditingEvent] = useState(null);

  const load = async () => {
    setLoading(true);
    try {
      const r = await gasPost({ action: 'adminCalendarGetAll', password });
      if (r.ok) setData(r.data);
    } catch (e) { showToast('載入失敗', 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const saveEvent = async (ev) => {
    const r = await gasPost({ action: 'adminCalendarSaveEvent', password, event: ev });
    if (r.ok) { showToast('已儲存', 'success'); setEditingEvent(null); load(); }
    else showToast('儲存失敗: ' + (r.error || ''), 'error');
  };
  const delEvent = async (ev) => {
    if (!confirm(`確定刪除「${ev.title}」?`)) return;
    const r = await gasPost({ action: 'adminCalendarDeleteEvent', password, eventId: ev.id });
    if (r.ok) { showToast('已刪除', 'success'); load(); }
  };
  const bulkDelete = async () => {
    const ids = Array.from(selectedIds);
    if (ids.length === 0) return;
    if (!confirm(`確定刪除 ${ids.length} 個活動?`)) return;
    const r = await gasPost({ action: 'adminCalendarBulkDelete', password, eventIds: ids });
    if (r.ok) { showToast(`已刪除 ${r.deleted}`, 'success'); setSelectedIds(new Set()); load(); }
  };
  const bulkMove = async (catId) => {
    const ids = Array.from(selectedIds);
    if (ids.length === 0 || !catId) return;
    const r = await gasPost({ action: 'adminCalendarBulkMove', password, eventIds: ids, categoryId: catId });
    if (r.ok) { showToast(`已移動 ${r.moved}`, 'success'); setSelectedIds(new Set()); load(); }
  };
  const saveCategories = async (cats) => {
    const r = await gasPost({ action: 'adminCalendarSaveCategories', password, categories: cats });
    if (r.ok) { showToast('分類已儲存', 'success'); load(); }
    else showToast('儲存失敗', 'error');
  };

  if (loading || !data) {
    return <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>載入中⋯</div>;
  }

  const cats = (data.categories || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
  let events = (data.events || []).slice().sort((a, b) =>
    (b.startDate + (b.startTime || '')).localeCompare(a.startDate + (a.startTime || ''))
  );
  if (search) {
    const s = search.toLowerCase();
    events = events.filter(e =>
      e.title.toLowerCase().includes(s) ||
      (e.description || '').toLowerCase().includes(s) ||
      (e.location || '').toLowerCase().includes(s));
  }
  if (filterCat) events = events.filter(e => e.categoryId === filterCat);
  if (filterMonth) events = events.filter(e => (e.startDate || '').startsWith(filterMonth));

  const catById = (id) => cats.find(c => c.id === id) || { name: '其他', icon: '·', color: '#999' };
  const allSelected = events.length > 0 && events.every(e => selectedIds.has(e.id));
  const toggleAll = () => {
    if (allSelected) setSelectedIds(new Set());
    else setSelectedIds(new Set(events.map(e => e.id)));
  };
  const toggleOne = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };

  // Stats
  const today = new Date();
  const ym = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
  const totalEvents = (data.events || []).length;
  const thisMonthCount = (data.events || []).filter(e => (e.startDate || '').startsWith(ym)).length;
  const upcomingCount = (data.events || []).filter(e => (e.endDate || e.startDate) >= formatYmdLocalAdmin(today)).length;

  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-3">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>📅 行事曆管理</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>新增活動、設定分類、匯入 CSV/iCalendar/Google Calendar</div>
          </div>
          <div className="flex gap-2">
            <button className="btn btn-primary btn-sm" onClick={() => setEditingEvent({ startDate: formatYmdLocalAdmin(today) })}>+ 新增活動</button>
            <button className="btn btn-secondary btn-sm" onClick={load}>重新整理</button>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>
          <div className="user-stat-card"><div className="user-stat-num">{totalEvents}</div><div className="user-stat-label">總活動</div></div>
          <div className="user-stat-card"><div className="user-stat-num">{thisMonthCount}</div><div className="user-stat-label">本月活動</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--temple-red)' }}>{upcomingCount}</div><div className="user-stat-label">未來活動</div></div>
          <div className="user-stat-card"><div className="user-stat-num" style={{ color: 'var(--gold)' }}>{cats.length}</div><div className="user-stat-label">分類</div></div>
        </div>
      </div>

      <div className="card p-6">
        <div className="link-field-tabs" style={{ marginBottom: 16 }}>
          <button type="button" className={`link-tab ${tab === 'events' ? 'active' : ''}`} onClick={() => setTab('events')}>活動列表</button>
          <button type="button" className={`link-tab ${tab === 'categories' ? 'active' : ''}`} onClick={() => setTab('categories')}>分類設定</button>
          <button type="button" className={`link-tab ${tab === 'import' ? 'active' : ''}`} onClick={() => setTab('import')}>匯入</button>
        </div>

        {tab === 'events' && (
          <div>
            {/* Filter */}
            <div className="flex flex-wrap gap-2 items-center mb-3">
              <input type="text" placeholder="🔍 搜尋標題/描述/地點" value={search} onChange={(e) => setSearch(e.target.value)} style={{ flex: 1, minWidth: 180 }} />
              <select value={filterCat} onChange={(e) => setFilterCat(e.target.value)}>
                <option value="">全部分類</option>
                {cats.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
              </select>
              <input type="month" value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} />
            </div>

            {selectedIds.size > 0 && (
              <div className="bulk-action-bar">
                <span className="text-sm font-medium" style={{ color: 'var(--temple-red)' }}>已選 {selectedIds.size}</span>
                <select onChange={(e) => { if (e.target.value) { bulkMove(e.target.value); e.target.value = ''; } }} defaultValue="">
                  <option value="">移動到分類⋯</option>
                  {cats.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
                </select>
                <button className="btn btn-danger btn-sm" onClick={bulkDelete}>刪除選取</button>
                <button className="btn btn-ghost btn-sm" onClick={() => setSelectedIds(new Set())}>取消</button>
              </div>
            )}

            {events.length === 0 ? (
              <div style={{ padding: 32, textAlign: 'center', color: 'var(--ink-mute)' }}>
                {(data.events || []).length === 0 ? '尚未有任何活動,點上方「+ 新增活動」開始' : '沒有符合的結果'}
              </div>
            ) : (
              <div className="users-table-wrap">
                <table className="users-table">
                  <thead>
                    <tr>
                      <th style={{ width: 28 }}><input type="checkbox" checked={allSelected} onChange={toggleAll} /></th>
                      <th>日期</th>
                      <th>分類</th>
                      <th>標題</th>
                      <th>地點</th>
                      <th>來源</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {events.map(ev => {
                      const cat = catById(ev.categoryId);
                      const sel = selectedIds.has(ev.id);
                      const isMulti = ev.endDate && ev.endDate !== ev.startDate;
                      return (
                        <tr key={ev.id} style={sel ? { background: 'rgba(139,36,33,0.05)' } : {}}>
                          <td><input type="checkbox" checked={sel} onChange={() => toggleOne(ev.id)} /></td>
                          <td style={{ whiteSpace: 'nowrap', fontSize: 12 }}>
                            <div style={{ fontWeight: 500 }}>{ev.startDate}</div>
                            {isMulti && <div style={{ fontSize: 11, color: 'var(--gold)' }}>～ {ev.endDate}</div>}
                            {ev.startTime && <div style={{ fontSize: 11, color: 'var(--ink-mute)' }}>{ev.startTime}{ev.endTime ? `–${ev.endTime}` : ''}</div>}
                          </td>
                          <td>
                            <span className="badge" style={{ background: cat.color + '22', color: cat.color }}>{cat.icon} {cat.name}</span>
                          </td>
                          <td>
                            <button className="link-as-btn" onClick={() => setEditingEvent(ev)}><strong>{ev.title}</strong></button>
                            {ev.description && <div className="text-xs" style={{ color: 'var(--ink-mute)', marginTop: 2 }}>{ev.description.slice(0, 60)}{ev.description.length > 60 ? '⋯' : ''}</div>}
                          </td>
                          <td style={{ fontSize: 12 }}>{ev.location || '—'}</td>
                          <td style={{ fontSize: 11 }}>
                            {ev.source === 'csv' && <span className="badge warn">CSV</span>}
                            {ev.source === 'ics' && <span className="badge warn">ICS</span>}
                            {ev.source === 'google' && <span className="badge success">Google</span>}
                            {(!ev.source || ev.source === 'manual') && <span className="badge" style={{ color: 'var(--ink-mute)' }}>手動</span>}
                          </td>
                          <td>
                            <button className="btn btn-ghost btn-sm" onClick={() => setEditingEvent(ev)}>編輯</button>
                            <button className="btn btn-ghost btn-sm" onClick={() => delEvent(ev)} style={{ color: 'var(--danger)' }}>✕</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab === 'categories' && (
          <CalendarCategoriesEditor categories={cats} onSave={saveCategories} />
        )}

        {tab === 'import' && (
          <CalendarImportPanel password={password} showToast={showToast} onImported={load} />
        )}
      </div>

      {editingEvent && (
        <CalendarEventEditModal
          event={editingEvent}
          categories={cats}
          password={password}
          showToast={showToast}
          onClose={() => setEditingEvent(null)}
          onSave={saveEvent}
        />
      )}
    </div>
  );
}

function formatYmdLocalAdmin(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function CalendarEventEditModal({ event, categories, password, showToast, onClose, onSave }) {
  const [draft, setDraft] = useState({
    id: event.id || '',
    title: event.title || '',
    description: event.description || '',
    categoryId: event.categoryId || (categories[0]?.id || 'other'),
    startDate: event.startDate || '',
    endDate: event.endDate || event.startDate || '',
    startTime: event.startTime || '',
    endTime: event.endTime || '',
    allDay: event.allDay !== false && !event.startTime,
    location: event.location || '',
    address: event.address || '',
    image: event.image || '',
    url: event.url || '',
    source: event.source || 'manual'
  });
  const update = (patch) => setDraft({ ...draft, ...patch });
  const submit = (e) => {
    e?.preventDefault?.();
    if (!draft.title.trim()) { alert('請填寫標題'); return; }
    if (!draft.startDate) { alert('請選擇開始日期'); return; }
    const ev = { ...draft };
    if (!ev.endDate) ev.endDate = ev.startDate;
    if (ev.allDay) { ev.startTime = ''; ev.endTime = ''; }
    onSave(ev);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 640 }}>
        <h3 className="font-serif text-xl font-medium mb-3">{event.id ? '編輯活動' : '新增活動'}</h3>
        <form onSubmit={submit}>
          <label className="field-label">標題 *</label>
          <input type="text" value={draft.title} onChange={(e) => update({ title: e.target.value })} required />

          <label className="field-label mt-3">分類</label>
          <select value={draft.categoryId} onChange={(e) => update({ categoryId: e.target.value })}>
            {categories.map(c => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
          </select>

          <div className="grid-2 mt-3">
            <div>
              <label className="field-label">開始日期 *</label>
              <input type="date" value={draft.startDate} onChange={(e) => update({ startDate: e.target.value, endDate: draft.endDate || e.target.value })} required />
            </div>
            <div>
              <label className="field-label">結束日期 (可同開始日期)</label>
              <input type="date" value={draft.endDate} onChange={(e) => update({ endDate: e.target.value })} />
            </div>
          </div>

          <label className="flex items-center gap-2 mt-3 text-sm" style={{ color: 'var(--ink-soft)' }}>
            <input type="checkbox" checked={draft.allDay} onChange={(e) => update({ allDay: e.target.checked })} />
            全日活動 (不設定具體時間)
          </label>

          {!draft.allDay && (
            <div className="grid-2 mt-3">
              <div>
                <label className="field-label">開始時間</label>
                <input type="time" value={draft.startTime} onChange={(e) => update({ startTime: e.target.value })} />
              </div>
              <div>
                <label className="field-label">結束時間</label>
                <input type="time" value={draft.endTime} onChange={(e) => update({ endTime: e.target.value })} />
              </div>
            </div>
          )}

          <div className="grid-2 mt-3">
            <div>
              <label className="field-label">地點</label>
              <input type="text" value={draft.location} onChange={(e) => update({ location: e.target.value })} placeholder="例: 大雄寶殿" />
            </div>
            <div>
              <label className="field-label">完整地址 (選填)</label>
              <input type="text" value={draft.address} onChange={(e) => update({ address: e.target.value })} />
            </div>
          </div>

          <label className="field-label mt-3">描述</label>
          <textarea value={draft.description} onChange={(e) => update({ description: e.target.value })} rows={4} />

          <label className="field-label mt-3">圖片 (選填,顯示在活動詳情)</label>
          <ImageField value={draft.image} onChange={(v) => update({ image: v })} password={password} showToast={showToast} />

          <label className="field-label mt-3">連結 (選填,如報名表)</label>
          <input type="text" value={draft.url} onChange={(e) => update({ url: e.target.value })} placeholder="https://..." />

          <div className="flex gap-2 mt-4 justify-end">
            <button type="button" className="btn btn-secondary btn-sm" onClick={onClose}>取消</button>
            <button type="submit" className="btn btn-primary btn-sm">{event.id ? '儲存變更' : '新增活動'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function CalendarCategoriesEditor({ categories, onSave }) {
  const [draft, setDraft] = useState(categories);
  const dirty = JSON.stringify(draft) !== JSON.stringify(categories);
  const update = (i, patch) => setDraft(draft.map((c, idx) => idx === i ? { ...c, ...patch } : c));
  const move = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= draft.length) return;
    const next = [...draft];
    [next[i], next[j]] = [next[j], next[i]];
    setDraft(next);
  };
  const remove = (i) => {
    if (!confirm(`刪除分類「${draft[i].name}」?屬於此分類的活動會變成「無分類」`)) return;
    setDraft(draft.filter((_, idx) => idx !== i));
  };
  const add = () => {
    setDraft([...draft, {
      id: 'cat-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 5),
      name: '新分類', icon: '·', color: '#6b6359', order: draft.length
    }]);
  };
  return (
    <div>
      <div className="text-sm mb-4" style={{ color: 'var(--ink-light)' }}>
        編輯活動分類。每個分類有自己的顏色和圖示,在月曆網格上會以對應顏色顯示。
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {draft.map((c, i) => (
          <div key={c.id} className="cat-tree-row" style={{ padding: 14 }}>
            <div style={{ flexShrink: 0 }}>
              <EmojiPicker value={c.icon || ''} onChange={(v) => update(i, { icon: v })} placeholder="·" allowCustom />
            </div>
            <input type="text" value={c.name || ''} onChange={(e) => update(i, { name: e.target.value })} placeholder="分類名稱" style={{ flex: 1 }} />
            <input type="color" value={c.color || '#6b6359'} onChange={(e) => update(i, { color: e.target.value })} style={{ width: 44, height: 36, padding: 2, border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }} />
            <button type="button" className="btn btn-ghost btn-sm" disabled={i === 0} onClick={() => move(i, -1)}>↑</button>
            <button type="button" className="btn btn-ghost btn-sm" disabled={i === draft.length - 1} onClick={() => move(i, 1)}>↓</button>
            <button type="button" className="btn btn-ghost btn-sm" onClick={() => remove(i)} style={{ color: 'var(--danger)' }}>✕</button>
          </div>
        ))}
      </div>
      <button type="button" className="btn btn-secondary btn-sm mt-3" onClick={add}>+ 新增分類</button>
      <div className="mt-6 sticky bottom-0 py-4" style={{ background: 'var(--bg-card)', borderTop: dirty ? '1px solid var(--border)' : 'none' }}>
        <button className="btn btn-primary" onClick={() => onSave(draft)} disabled={!dirty}>{dirty ? '儲存分類設定' : '尚無變更'}</button>
      </div>
    </div>
  );
}

function CalendarImportPanel({ password, showToast, onImported }) {
  const [tab, setTab] = useState('csv'); // csv | ics | google
  const [csvText, setCsvText] = useState('');
  const [icsText, setIcsText] = useState('');
  const [googleId, setGoogleId] = useState('');
  const [googleReplace, setGoogleReplace] = useState(false);
  const [busy, setBusy] = useState(false);
  const csvFileRef = useRef(null);
  const icsFileRef = useRef(null);

  const onCsvFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setCsvText(e.target.result);
    reader.readAsText(file);
  };

  const downloadCalendarTemplate = () => {
    const today = new Date();
    const ymd = (offsetDays) => {
      const d = new Date(today);
      d.setDate(d.getDate() + offsetDays);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    // Build sample rows — 5 examples covering different scenarios
    const rows = [
      ['title', 'description', 'category', 'startDate', 'endDate', 'startTime', 'endTime', 'location', 'address', 'url'],
      ['中元普渡法會', '一年一度中元普渡法會,歡迎信眾參加', '法會', ymd(7), ymd(7), '09:00', '12:00', '大雄寶殿', '台北市文山區木柵路三段五號', 'https://example.com/register'],
      ['親子DIY手作', '小朋友也可以參加的傳統工藝課程', '活動', ymd(14), ymd(14), '14:00', '16:30', '文化園區', '', ''],
      ['佛學進階班(連續四週)', '從基礎到進階,適合已修讀過初級班的學員', '課程', ymd(21), ymd(42), '19:00', '21:00', '講堂二樓', '', ''],
      ['法會準備義工招募', '需要 10 位義工協助場地佈置與接待', '其他', ymd(5), ymd(5), '', '', '', '', ''],
      ['全日禪修營', '需提前報名,提供素食三餐', '法會', ymd(30), ymd(31), '', '', '禪修中心', '南投縣埔里鎮中山路一段', 'https://example.com/retreat']
    ];

    // Build CSV — quote fields containing comma/quote/newline; double internal quotes
    const escapeField = (v) => {
      const s = String(v || '');
      if (s.includes(',') || s.includes('"') || s.includes('\n')) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    };
    const csv = rows.map(r => r.map(escapeField).join(',')).join('\r\n');

    // Add UTF-8 BOM so Excel opens it correctly with Chinese
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '行事曆範例_' + ymd(0) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('已下載範例檔', 'success');
  };
  const onIcsFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => setIcsText(e.target.result);
    reader.readAsText(file);
  };

  const [importErrors, setImportErrors] = useState([]);

  const importCsv = async () => {
    if (!csvText.trim()) { showToast('請先選擇 CSV 檔案或貼上內容', 'error'); return; }
    setBusy(true);
    setImportErrors([]);
    const r = await gasPost({ action: 'adminCalendarImportCsv', password, csv: csvText });
    setBusy(false);
    if (r.ok) {
      if (r.imported > 0 && r.skipped === 0) {
        showToast(`成功匯入 ${r.imported} 場活動 🪷`, 'success');
        setCsvText('');
        if (csvFileRef.current) csvFileRef.current.value = '';
        setImportErrors([]);
        onImported();
      } else if (r.imported > 0 && r.skipped > 0) {
        showToast(`匯入 ${r.imported} 場,跳過 ${r.skipped} 場(下方有錯誤詳情)`, 'success');
        setImportErrors(r.errors || []);
        onImported();
      } else {
        // imported = 0
        showToast(`沒有任何活動被匯入,跳過 ${r.skipped} 列(下方有錯誤詳情)`, 'error');
        setImportErrors(r.errors || []);
      }
    } else {
      showToast('匯入失敗: ' + (r.error || ''), 'error');
      setImportErrors([]);
    }
  };

  const importIcs = async () => {
    if (!icsText.trim()) { showToast('請先選擇 .ics 檔案或貼上內容', 'error'); return; }
    setBusy(true);
    const r = await gasPost({ action: 'adminCalendarImportIcs', password, icsText });
    setBusy(false);
    if (r.ok) {
      showToast(`成功匯入 ${r.imported} 場活動`, 'success');
      setIcsText(''); if (icsFileRef.current) icsFileRef.current.value = '';
      onImported();
    } else showToast('匯入失敗: ' + (r.error || ''), 'error');
  };

  const syncGoogle = async () => {
    if (!googleId.trim()) { showToast('請填寫日曆 ID', 'error'); return; }
    if (googleReplace && !confirm('使用「取代模式」會先刪除這個日曆過去同步的全部活動,然後重新匯入。確定?')) return;
    setBusy(true);
    const r = await gasPost({ action: 'adminCalendarSyncGoogle', password, calendarId: googleId.trim(), replace: googleReplace });
    setBusy(false);
    if (r.ok) {
      showToast(`已從 Google 同步 ${r.imported} 場 (該日曆共 ${r.total} 場)`, 'success');
      onImported();
    } else showToast('同步失敗: ' + (r.error || ''), 'error');
  };

  return (
    <div>
      <div className="link-field-tabs" style={{ marginBottom: 16 }}>
        <button type="button" className={`link-tab ${tab === 'csv' ? 'active' : ''}`} onClick={() => setTab('csv')}>📄 CSV</button>
        <button type="button" className={`link-tab ${tab === 'ics' ? 'active' : ''}`} onClick={() => setTab('ics')}>📅 iCalendar (.ics)</button>
        <button type="button" className={`link-tab ${tab === 'google' ? 'active' : ''}`} onClick={() => setTab('google')}>🔄 Google Calendar 同步</button>
      </div>

      {tab === 'csv' && (
        <div>
          <div className="text-sm mb-3" style={{ color: 'var(--ink-light)' }}>
            從 Excel 編輯後存成 CSV (UTF-8) 檔案匯入。
          </div>

          {/* Template download */}
          <div className="p-3 mb-4" style={{ background: 'rgba(184,134,11,0.08)', border: '1px solid rgba(184,134,11,0.3)', borderRadius: 6, fontSize: 13 }}>
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div>
                <div style={{ fontWeight: 500, marginBottom: 4 }}>📥 第一次使用?下載範例 CSV</div>
                <div style={{ color: 'var(--ink-soft)', fontSize: 12 }}>含 5 筆範例活動 + 完整欄位示範,直接用 Excel 打開編輯就好</div>
              </div>
              <button type="button" className="btn btn-secondary btn-sm" onClick={downloadCalendarTemplate}>
                ⬇ 下載範例檔
              </button>
            </div>
          </div>

          <div className="p-3 mb-4" style={{ background: 'var(--bg)', borderRadius: 6, fontSize: 13 }}>
            <div style={{ fontWeight: 500, marginBottom: 6 }}>必要欄位 (CSV 第一列要是這些欄名):</div>
            <div className="font-mono text-xs" style={{ color: 'var(--temple-red)' }}>
              title, startDate
            </div>
            <div style={{ fontWeight: 500, margin: '10px 0 6px' }}>選填欄位:</div>
            <div className="font-mono text-xs" style={{ color: 'var(--ink-soft)' }}>
              description, category, endDate, startTime, endTime, location, address, url
            </div>
            <div style={{ marginTop: 10, fontSize: 12, color: 'var(--ink-mute)' }}>
              · 日期格式:<code>2026-04-30</code>(YYYY-MM-DD)<br/>
              · 時間格式:<code>09:00</code>(HH:MM)<br/>
              · category 可填分類名稱(法會/活動/課程/其他),會自動對應;對應不到歸到「其他」<br/>
              · ⚠️ Excel 存檔時請選「<strong>CSV UTF-8</strong>」格式,中文才不會亂碼
            </div>
          </div>
          <input type="file" accept=".csv,text/csv" ref={csvFileRef} onChange={(e) => onCsvFile(e.target.files[0])} className="mb-3" />
          <textarea value={csvText} onChange={(e) => setCsvText(e.target.value)} rows={8} placeholder="或直接貼上 CSV 內容..." style={{ fontFamily: 'monospace', fontSize: 12 }} />
          <button className="btn btn-primary mt-3" onClick={importCsv} disabled={busy || !csvText.trim()}>{busy ? '匯入中⋯' : '匯入 CSV'}</button>

          {importErrors.length > 0 && (
            <div className="mt-4 p-3" style={{ background: 'rgba(168,56,56,0.08)', border: '1px solid rgba(168,56,56,0.3)', borderRadius: 6 }}>
              <div className="text-sm font-medium mb-2" style={{ color: 'var(--temple-red)' }}>
                ⚠️ 匯入錯誤詳情(顯示前 10 筆):
              </div>
              <ul style={{ margin: 0, paddingLeft: 20, fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.7 }}>
                {importErrors.map((err, i) => <li key={i}>{err}</li>)}
              </ul>
              <div className="text-xs mt-2" style={{ color: 'var(--ink-mute)' }}>
                💡 大部分錯誤是因為 Excel 把 ISO 日期格式自動改成其他格式。建議:1) 在 Excel 裡選整個日期欄 → 設定儲存格格式 → 「文字」 2) 或直接用記事本/VS Code 編輯 CSV(不要用 Excel)
              </div>
            </div>
          )}
        </div>
      )}

      {tab === 'ics' && (
        <div>
          <div className="text-sm mb-3" style={{ color: 'var(--ink-light)' }}>
            從 Google Calendar / Outlook / Apple Calendar 等匯出的 <code>.ics</code> 檔案。
          </div>
          <div className="p-3 mb-4" style={{ background: 'var(--bg)', borderRadius: 6, fontSize: 13 }}>
            <div style={{ fontWeight: 500, marginBottom: 6 }}>取得 .ics 檔案:</div>
            <div style={{ color: 'var(--ink-soft)' }}>
              · <strong>Google Calendar:</strong>設定 → 匯入 / 匯出 → 匯出<br/>
              · <strong>Outlook:</strong>檔案 → 儲存行事曆 → 選擇格式 .ics<br/>
              · <strong>Apple 行事曆:</strong>檔案 → 匯出
            </div>
          </div>
          <input type="file" accept=".ics,text/calendar" ref={icsFileRef} onChange={(e) => onIcsFile(e.target.files[0])} className="mb-3" />
          <textarea value={icsText} onChange={(e) => setIcsText(e.target.value)} rows={8} placeholder="或直接貼上 .ics 內容..." style={{ fontFamily: 'monospace', fontSize: 11 }} />
          <button className="btn btn-primary mt-3" onClick={importIcs} disabled={busy || !icsText.trim()}>{busy ? '匯入中⋯' : '匯入 ICS'}</button>
        </div>
      )}

      {tab === 'google' && (
        <div>
          <div className="text-sm mb-3" style={{ color: 'var(--ink-light)' }}>
            直接從 Google Calendar 同步活動(免下載 .ics)。一次同步當下時間前後 1 個月到 1 年的活動。
          </div>
          <div className="p-3 mb-4" style={{ background: 'rgba(184,134,11,0.1)', border: '1px solid rgba(184,134,11,0.3)', borderRadius: 6, fontSize: 13 }}>
            <div style={{ fontWeight: 500, marginBottom: 6, color: 'var(--gold)' }}>⚠️ 第一次使用須額外授權</div>
            <div style={{ color: 'var(--ink-soft)' }}>
              第一次點「立即同步」時 GAS 會跳新權限視窗要求「<strong>查看您 Google 日曆</strong>」,請允許。<br/>
              <br/>
              <strong>取得日曆 ID:</strong>進入 Google Calendar → 找到要同步的日曆 → 設定 → 「整合日曆」區段 → 複製「日曆 ID」(格式像 <code>abc@group.calendar.google.com</code>)。<br/>
              <br/>
              <strong>注意:</strong>該日曆必須是「執行此 GAS 的 Google 帳號」可以存取的(自己的、或被分享的)。
            </div>
          </div>
          <label className="field-label">Google 日曆 ID</label>
          <input type="text" value={googleId} onChange={(e) => setGoogleId(e.target.value)} placeholder="abc123@group.calendar.google.com" className="font-mono" style={{ fontSize: 12 }} />
          <label className="flex items-center gap-2 mt-3 text-sm" style={{ color: 'var(--ink-soft)' }}>
            <input type="checkbox" checked={googleReplace} onChange={(e) => setGoogleReplace(e.target.checked)} />
            <strong>取代模式:</strong>先刪除這個日曆過去同步的所有活動,再重新匯入(若不勾就是「只新增不刪舊」)
          </label>
          <button className="btn btn-primary mt-3" onClick={syncGoogle} disabled={busy || !googleId.trim()}>{busy ? '同步中⋯' : '🔄 立即同步'}</button>
        </div>
      )}
    </div>
  );
}

function Login({ onLogin }) {
  const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    if (!pw) return;
    setBusy(true); setErr('');
    try {
      const r = await gasPost({ action: 'login', password: pw });
      if (r.ok) {
        sessionStorage.setItem('jc_pw', pw);
        onLogin(pw);
      } else {
        setErr('密碼錯誤');
      }
    } catch (e) {
      setErr('連線失敗,請確認 GAS_URL');
    }
    setBusy(false);
  };

  return (
    <div className="login-bg min-h-screen flex items-center justify-center p-6">
      {/* Decorative layers */}
      <div className="login-enso" aria-hidden="true"></div>
      <div className="login-dust d1" aria-hidden="true"></div>
      <div className="login-dust d2" aria-hidden="true"></div>
      <div className="login-dust d3" aria-hidden="true"></div>
      <div className="login-dust d4" aria-hidden="true"></div>
      <div className="login-dust d5" aria-hidden="true"></div>
      <div className="login-dust d6" aria-hidden="true"></div>
      <div className="login-vertical-text" aria-hidden="true">清淨慈悲・廣結善緣</div>

      {/* Login card */}
      <div className="card login-card p-10" style={{ maxWidth: 420, width: '100%' }}>
        <div className="login-card-accent"></div>
        <div className="text-center mb-8">
          <div className="font-cormorant italic text-sm tracking-[0.4em] mb-2" style={{ color: 'var(--gold)' }}>JING CI</div>
          <div className="font-serif font-semibold text-2xl" style={{ color: 'var(--ink)' }}>淨慈寺 CMS</div>
          <div className="text-xs mt-1" style={{ color: 'var(--ink-mute)', letterSpacing: '0.25em' }}>ADMIN PANEL</div>
        </div>
        <div className="mb-4">
          <label className="field-label">管理密碼</label>
          <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submit()} autoFocus />
        </div>
        {err && <div className="text-sm mb-4" style={{ color: 'var(--danger)' }}>{err}</div>}
        <button className="btn btn-primary w-full" onClick={submit} disabled={busy}>{busy ? '登入中⋯' : '登入'}</button>
        <div className="text-center mt-6 font-cormorant italic text-xs" style={{ color: 'var(--ink-mute)', letterSpacing: '0.2em' }}>
          以一寺之力 · 渡萬千有緣
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Main App
// ============================================================
function App() {
  const [password, setPassword] = useState(sessionStorage.getItem('jc_pw') || null);
  const [content, setContent] = useState(null);
  const [origContent, setOrigContent] = useState(null);
  const [loading, setLoading] = useState(false);
  const [active, setActive] = useState({ type: 'site' });
  const [toast, setToast] = useState(null);
  const [saving, setSaving] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const showToast = (msg, kind = '') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 2400);
  };

  const loadContent = async () => {
    setLoading(true);
    try {
      const r = await gasGetContent();
      if (r.ok) {
        setContent(r.content);
        setOrigContent(JSON.stringify(r.content));
      } else {
        showToast('載入失敗: ' + (r.error || ''), 'error');
      }
    } catch (e) {
      showToast('載入失敗: ' + e.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => {
    if (password && !content) loadContent();
  }, [password]);

  const dirty = content && JSON.stringify(content) !== origContent;

  useEffect(() => {
    const handler = (e) => {
      if (dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const save = async () => {
    setSaving(true);
    try {
      const r = await gasPost({ action: 'saveContent', password, content });
      if (r.ok) {
        setOrigContent(JSON.stringify(content));
        showToast('已儲存', 'success');
      } else {
        showToast('儲存失敗: ' + (r.error || ''), 'error');
      }
    } catch (e) {
      showToast('儲存失敗: ' + e.message, 'error');
    }
    setSaving(false);
  };

  const logout = () => {
    if (dirty && !confirm('有未儲存的變更,確定要登出?')) return;
    sessionStorage.removeItem('jc_pw');
    setPassword(null);
    setContent(null);
    setOrigContent(null);
  };

  if (!password) return <Login onLogin={setPassword} />;
  if (loading || !content) return (
    <div className="min-h-screen flex items-center justify-center">
      <div style={{ color: 'var(--ink-mute)' }}>載入中⋯</div>
    </div>
  );

  // Page management
  const updatePage = (pageId, newPage) => {
    const newPages = content.pages.map(p => p.id === pageId ? newPage : p);
    // If marked as home, clear other pages
    if (newPage.isHome) {
      newPages.forEach(p => { if (p.id !== pageId) p.isHome = false; });
    }
    setContent({ ...content, pages: newPages });
  };
  const deletePage = (pageId) => {
    const page = content.pages.find(p => p.id === pageId);
    if (!page || page.isHome) { showToast('首頁無法刪除', 'error'); return; }
    if (!confirm(`確定刪除頁面「${page.title}」?`)) return;
    setContent({ ...content, pages: content.pages.filter(p => p.id !== pageId) });
    setActive({ type: 'site' });
  };
  const addPage = () => {
    const slug = prompt('新頁面的 slug (只能英數和 -):', 'new-page');
    if (!slug) return;
    if (!/^[a-z0-9-]+$/i.test(slug)) { showToast('slug 只能用英數和 -', 'error'); return; }
    if (content.pages.some(p => p.slug === slug)) { showToast('slug 已存在', 'error'); return; }
    const newPage = {
      id: uid(),
      slug,
      title: '新頁面',
      isHome: false,
      sections: []
    };
    setContent({ ...content, pages: [...content.pages, newPage] });
    setActive({ type: 'page', pageId: newPage.id });
  };

  const currentPage = active.type === 'page' ? content.pages.find(p => p.id === active.pageId) : null;

  // On mobile, clicking a sidebar item should close the sidebar
  const goTo = (target) => {
    setActive(target);
    setSidebarOpen(false);
  };

  return (
    <ContentCtx.Provider value={{ pages: content.pages || [], albums: content.albums || [] }}>
    <div className="app-shell">
      {/* Mobile sidebar overlay */}
      <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />

      {/* Sidebar */}
      <aside className={`admin-sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="p-5 border-b flex items-center justify-between" style={{ borderColor: 'var(--border)' }}>
          <div className="flex items-center gap-3">
            <div className="seal">慈</div>
            <div>
              <div className="font-serif font-semibold">淨慈寺 CMS</div>
              <div className="text-xs" style={{ color: 'var(--ink-mute)' }}>Admin Panel</div>
            </div>
          </div>
          <button className="mobile-only btn btn-ghost btn-sm" onClick={() => setSidebarOpen(false)} aria-label="關閉側邊欄" style={{ fontSize: 20, padding: '4px 8px' }}>✕</button>
        </div>
        <div className="p-3 overflow-y-auto" style={{ flex: 1 }}>
          <div className="sidebar-section-title">設定</div>
          <div className={`sidebar-link ${active.type === 'site' ? 'active' : ''}`} onClick={() => goTo({ type: 'site' })}>
            <span>⚙</span> 網站設定
          </div>
          <div className={`sidebar-link ${active.type === 'navigation' ? 'active' : ''}`} onClick={() => goTo({ type: 'navigation' })}>
            <span>≡</span> 導覽列
          </div>
          <div className={`sidebar-link ${active.type === 'footer' ? 'active' : ''}`} onClick={() => goTo({ type: 'footer' })}>
            <span>▭</span> 頁尾
          </div>

          <div className="sidebar-section-title flex items-center justify-between">
            <span>頁面</span>
            <button className="btn btn-ghost btn-sm" onClick={addPage} title="新增頁面">+</button>
          </div>
          {content.pages.map(p => (
            <div
              key={p.id}
              className={`sidebar-link ${active.type === 'page' && active.pageId === p.id ? 'active' : ''}`}
              onClick={() => goTo({ type: 'page', pageId: p.id })}
            >
              <span>{p.isHome ? '⌂' : '◢'}</span>
              <span className="truncate">{p.title}</span>
              {p.isHome && <span className="ml-auto text-xs" style={{ color: 'var(--gold)' }}>首頁</span>}
            </div>
          ))}

          <div className="sidebar-section-title">媒體</div>
          <div className={`sidebar-link ${active.type === 'albums-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'albums-manager' })}>
            <span>📸</span> 相簿管理
            {(content.albums || []).length > 0 && <span className="ml-auto text-xs" style={{ color: 'var(--gold)' }}>{(content.albums || []).length}</span>}
          </div>
          <div className={`sidebar-link ${active.type === 'calendar-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'calendar-manager' })}>
            <span>📅</span> 行事曆管理
          </div>

          <div className="sidebar-section-title">會員</div>
          <div className={`sidebar-link ${active.type === 'users-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'users-manager' })}>
            <span>👥</span> 使用者管理
          </div>
          <div className={`sidebar-link ${active.type === 'forum-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'forum-manager' })}>
            <span>💬</span> 討論區管理
          </div>

          <div className="sidebar-section-title">工具</div>
          <div className={`sidebar-link ${active.type === 'broadcast' ? 'active' : ''}`} onClick={() => goTo({ type: 'broadcast' })}>
            <span>📨</span> 群發信
          </div>
          <div className={`sidebar-link ${active.type === 'backups' ? 'active' : ''}`} onClick={() => goTo({ type: 'backups' })}>
            <span>↻</span> 備份歷史
          </div>
          <div className={`sidebar-link ${active.type === 'visitors' ? 'active' : ''}`} onClick={() => goTo({ type: 'visitors' })}>
            <span>👁</span> 訪客統計
          </div>
          <div className={`sidebar-link ${active.type === 'system-health' ? 'active' : ''}`} onClick={() => goTo({ type: 'system-health' })}>
            <span>⚙️</span> 系統健康檢查
          </div>
        </div>
        <div className="p-3 border-t" style={{ borderColor: 'var(--border)' }}>
          <button className="sidebar-link w-full" onClick={logout} style={{ color: 'var(--danger)' }}>
            <span>↪</span> 登出
          </button>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-y-auto" style={{ height: '100vh', minWidth: 0 }}>
        {/* Top save bar */}
        <div className="top-save-bar sticky top-0 z-10 px-8 py-4 flex items-center justify-between border-b gap-3"
             style={{ background: 'rgba(247,245,241,0.92)', backdropFilter: 'blur(8px)', borderColor: 'var(--border)' }}>
          <div className="flex items-center gap-3 min-w-0">
            <button className="mobile-hamburger btn btn-ghost btn-sm" onClick={() => setSidebarOpen(true)} aria-label="選單" style={{ padding: '6px 8px', fontSize: 18 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
                <path d="M4 7h16M4 12h16M4 17h16"/>
              </svg>
            </button>
            <div className="save-status flex items-center gap-2 text-sm min-w-0">
              {dirty ? (
                <><span className="dirty-dot"></span><span className="truncate" style={{ color: 'var(--ink-soft)' }}>有未儲存的變更</span></>
              ) : (
                <span className="truncate" style={{ color: 'var(--ink-mute)' }}>已儲存</span>
              )}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <a href="index.html" target="_blank" className="btn btn-secondary btn-sm desktop-only">預覽公開頁 ↗</a>
            <a href="index.html" target="_blank" className="btn btn-secondary btn-sm mobile-only" aria-label="預覽" title="預覽公開頁" style={{ padding: '4px 10px' }}>↗</a>
            <button className="btn btn-primary" onClick={save} disabled={!dirty || saving}>
              {saving ? '儲存中⋯' : '儲存'}
            </button>
          </div>
        </div>

        <div className="admin-content p-8 max-w-5xl mx-auto">
          {active.type === 'site' && <SiteEditor site={content.site} onUpdate={(s) => setContent({ ...content, site: s })} password={password} showToast={showToast} />}
          {active.type === 'navigation' && <NavEditor navigation={content.navigation} onUpdate={(n) => setContent({ ...content, navigation: n })} />}
          {active.type === 'footer' && <FooterEditor footer={content.footer} onUpdate={(f) => setContent({ ...content, footer: f })} />}
          {active.type === 'page' && currentPage && (
            <PageEditor
              key={currentPage.id}
              page={currentPage}
              onUpdatePage={(p) => updatePage(currentPage.id, p)}
              onDeletePage={() => deletePage(currentPage.id)}
              password={password}
              showToast={showToast}
            />
          )}
          {active.type === 'backups' && <BackupsView password={password} showToast={showToast} onRestore={loadContent} />}
          {active.type === 'visitors' && <VisitorStatsView password={password} showToast={showToast} />}
          {active.type === 'broadcast' && <BroadcastManagerView password={password} showToast={showToast} />}
          {active.type === 'system-health' && <SystemHealthView password={password} showToast={showToast} />}
          {active.type === 'albums-manager' && (
            <AlbumsManagerView
              albums={content.albums || []}
              onUpdate={(albums) => setContent({ ...content, albums })}
              password={password}
              showToast={showToast}
            />
          )}
          {active.type === 'calendar-manager' && (
            <CalendarManagerView password={password} showToast={showToast} />
          )}
          {active.type === 'users-manager' && (
            <UsersManagerView password={password} showToast={showToast} />
          )}
          {active.type === 'forum-manager' && (
            <ForumManagerView password={password} showToast={showToast} />
          )}
        </div>
      </main>

      {toast && <div className={`toast ${toast.kind}`}>{toast.msg}</div>}
    </div>
    </ContentCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>

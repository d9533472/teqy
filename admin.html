            onChange={(e) => updateList('jobs', e.target.value)}
            style={{ minHeight: 200, fontFamily: 'monospace', fontSize: 13 }}
          />
        </div>
      </div>

      <label className="field-label mt-4">台灣縣市清單(每行一個,使用者選擇國家為「台灣」時才會顯示)</label>
      <textarea
        value={(draft.twRegions || []).join('\n')}
        onChange={(e) => updateList('twRegions', e.target.value)}
        style={{ minHeight: 200, fontFamily: 'monospace', fontSize: 13 }}
      />

      <div className="mt-6">
        <button className="btn btn-primary" onClick={() => onSave(draft)} disabled={!dirty}>
          {dirty ? '儲存設定' : '尚無變更'}
        </button>
      </div>
    </div>
  );
}


// ============================================================
// Albums Manager — top-level page for managing the album library
// ============================================================
function AlbumsManagerView({ albums, onUpdate, password, showToast }) {
  return (
    <div>
      <div className="card p-6 mb-6">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-2">
          <div>
            <h2 className="font-serif text-2xl font-medium" style={{ marginBottom: 4 }}>📸 相簿管理</h2>
            <div className="text-sm" style={{ color: 'var(--ink-mute)' }}>
              所有相簿集中管理。在「區塊」設定裡的「相簿展示」可以挑選要顯示哪幾本
            </div>
          </div>
          <div className="text-sm" style={{ color: 'var(--ink-light)' }}>
            <strong style={{ color: 'var(--temple-red)' }}>{albums.length}</strong> 本相簿 ·
            手動模式共 <strong>{albums.filter(a => a.source !== 'drive').reduce((acc, a) => acc + (a.photos || []).length, 0)}</strong> 張照片
          </div>
        </div>
      </div>

        <AlbumsEditor value={albums} onChange={onUpdate} password={password} showToast={showToast} />

// ============================================================
// Login screen
// ============================================================
function Login({ onLogin }) {
  const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const submit = async () => {
    if (!pw) return;
    setBusy(true); setErr('');
    try {
      const r = await gasPost({ action: 'login', password: pw });
      if (r.ok) {
        sessionStorage.setItem('jc_pw', pw);
        onLogin(pw);
      } else {
        setErr('密碼錯誤');
      }
    } catch (e) {
      setErr('連線失敗,請確認 GAS_URL');
    }
    setBusy(false);
  };

  return (
    <div className="login-bg min-h-screen flex items-center justify-center p-6">
      {/* Decorative layers */}
      <div className="login-enso" aria-hidden="true"></div>
      <div className="login-dust d1" aria-hidden="true"></div>
      <div className="login-dust d2" aria-hidden="true"></div>
      <div className="login-dust d3" aria-hidden="true"></div>
      <div className="login-dust d4" aria-hidden="true"></div>
      <div className="login-dust d5" aria-hidden="true"></div>
      <div className="login-dust d6" aria-hidden="true"></div>
      <div className="login-vertical-text" aria-hidden="true">清淨慈悲・廣結善緣</div>

      {/* Login card */}
      <div className="card login-card p-10" style={{ maxWidth: 420, width: '100%' }}>
        <div className="login-card-accent"></div>
        <div className="text-center mb-8">
          <div className="font-cormorant italic text-sm tracking-[0.4em] mb-2" style={{ color: 'var(--gold)' }}>JING CI</div>
          <div className="font-serif font-semibold text-2xl" style={{ color: 'var(--ink)' }}>淨慈寺 CMS</div>
          <div className="text-xs mt-1" style={{ color: 'var(--ink-mute)', letterSpacing: '0.25em' }}>ADMIN PANEL</div>
        </div>
        <div className="mb-4">
          <label className="field-label">管理密碼</label>
          <input type="password" value={pw} onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submit()} autoFocus />
        </div>
        {err && <div className="text-sm mb-4" style={{ color: 'var(--danger)' }}>{err}</div>}
        <button className="btn btn-primary w-full" onClick={submit} disabled={busy}>{busy ? '登入中⋯' : '登入'}</button>
        <div className="text-center mt-6 font-cormorant italic text-xs" style={{ color: 'var(--ink-mute)', letterSpacing: '0.2em' }}>
          以一寺之力 · 渡萬千有緣
        </div>
      </div>
    </div>
  );
}

// ============================================================
// Main App
// ============================================================
function App() {
  const [password, setPassword] = useState(sessionStorage.getItem('jc_pw') || null);
  const [content, setContent] = useState(null);
  const [origContent, setOrigContent] = useState(null);
  const [loading, setLoading] = useState(false);
  const [active, setActive] = useState({ type: 'site' });
  const [toast, setToast] = useState(null);
  const [saving, setSaving] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const showToast = (msg, kind = '') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 2400);
  };

  const loadContent = async () => {
    setLoading(true);
    try {
      const r = await gasGetContent();
      if (r.ok) {
        setContent(r.content);
        setOrigContent(JSON.stringify(r.content));
      } else {
        showToast('載入失敗: ' + (r.error || ''), 'error');
      }
    } catch (e) {
      showToast('載入失敗: ' + e.message, 'error');
    }
    setLoading(false);
  };

  useEffect(() => {
    if (password && !content) loadContent();
  }, [password]);

  const dirty = content && JSON.stringify(content) !== origContent;

  useEffect(() => {
    const handler = (e) => {
      if (dirty) {
        e.preventDefault();
        e.returnValue = '';
      }
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const save = async () => {
    setSaving(true);
    try {
      const r = await gasPost({ action: 'saveContent', password, content });
      if (r.ok) {
        setOrigContent(JSON.stringify(content));
        showToast('已儲存', 'success');
      } else {
        showToast('儲存失敗: ' + (r.error || ''), 'error');
      }
    } catch (e) {
      showToast('儲存失敗: ' + e.message, 'error');
    }
    setSaving(false);
  };

  const logout = () => {
    if (dirty && !confirm('有未儲存的變更,確定要登出?')) return;
    sessionStorage.removeItem('jc_pw');
    setPassword(null);
    setContent(null);
    setOrigContent(null);
  };

  if (!password) return <Login onLogin={setPassword} />;
  if (loading || !content) return (
    <div className="min-h-screen flex items-center justify-center">
      <div style={{ color: 'var(--ink-mute)' }}>載入中⋯</div>
    </div>
  );

  // Page management
  const updatePage = (pageId, newPage) => {
    const newPages = content.pages.map(p => p.id === pageId ? newPage : p);
    // If marked as home, clear other pages
    if (newPage.isHome) {
      newPages.forEach(p => { if (p.id !== pageId) p.isHome = false; });
    }
    setContent({ ...content, pages: newPages });
  };
  const deletePage = (pageId) => {
    const page = content.pages.find(p => p.id === pageId);
    if (!page || page.isHome) { showToast('首頁無法刪除', 'error'); return; }
    if (!confirm(`確定刪除頁面「${page.title}」?`)) return;
    setContent({ ...content, pages: content.pages.filter(p => p.id !== pageId) });
    setActive({ type: 'site' });
  };
  const addPage = () => {
    const slug = prompt('新頁面的 slug (只能英數和 -):', 'new-page');
    if (!slug) return;
    if (!/^[a-z0-9-]+$/i.test(slug)) { showToast('slug 只能用英數和 -', 'error'); return; }
    if (content.pages.some(p => p.slug === slug)) { showToast('slug 已存在', 'error'); return; }
    const newPage = {
      id: uid(),
      slug,
      title: '新頁面',
      isHome: false,
      sections: []
    };
    setContent({ ...content, pages: [...content.pages, newPage] });
    setActive({ type: 'page', pageId: newPage.id });
  };

  const currentPage = active.type === 'page' ? content.pages.find(p => p.id === active.pageId) : null;

  // On mobile, clicking a sidebar item should close the sidebar
  const goTo = (target) => {
    setActive(target);
    setSidebarOpen(false);
  };

  return (
    <ContentCtx.Provider value={{ pages: content.pages || [], albums: content.albums || [] }}>
    <div className="app-shell">
      {/* Mobile sidebar overlay */}
      <div className={`sidebar-overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />

      {/* Sidebar */}
      <aside className={`admin-sidebar ${sidebarOpen ? 'open' : ''}`}>
        <div className="p-5 border-b flex items-center justify-between" style={{ borderColor: 'var(--border)' }}>
          <div className="flex items-center gap-3">
            <div className="seal">慈</div>
            <div>
              <div className="font-serif font-semibold">淨慈寺 CMS</div>
              <div className="text-xs" style={{ color: 'var(--ink-mute)' }}>Admin Panel</div>
            </div>
          </div>
          <button className="mobile-only btn btn-ghost btn-sm" onClick={() => setSidebarOpen(false)} aria-label="關閉側邊欄" style={{ fontSize: 20, padding: '4px 8px' }}>✕</button>
        </div>
        <div className="p-3 overflow-y-auto" style={{ flex: 1 }}>
          <div className="sidebar-section-title">設定</div>
          <div className={`sidebar-link ${active.type === 'site' ? 'active' : ''}`} onClick={() => goTo({ type: 'site' })}>
            <span>⚙</span> 網站設定
          </div>
          <div className={`sidebar-link ${active.type === 'navigation' ? 'active' : ''}`} onClick={() => goTo({ type: 'navigation' })}>
            <span>≡</span> 導覽列
          </div>
          <div className={`sidebar-link ${active.type === 'footer' ? 'active' : ''}`} onClick={() => goTo({ type: 'footer' })}>
            <span>▭</span> 頁尾
          </div>

          <div className="sidebar-section-title flex items-center justify-between">
            <span>頁面</span>
            <button className="btn btn-ghost btn-sm" onClick={addPage} title="新增頁面">+</button>
          </div>
          {content.pages.map(p => (
            <div
              key={p.id}
              className={`sidebar-link ${active.type === 'page' && active.pageId === p.id ? 'active' : ''}`}
              onClick={() => goTo({ type: 'page', pageId: p.id })}
            >
              <span>{p.isHome ? '⌂' : '◢'}</span>
              <span className="truncate">{p.title}</span>
              {p.isHome && <span className="ml-auto text-xs" style={{ color: 'var(--gold)' }}>首頁</span>}
            </div>
          ))}

          <div className="sidebar-section-title">媒體</div>
          <div className={`sidebar-link ${active.type === 'albums-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'albums-manager' })}>
            <span>📸</span> 相簿管理
            {(content.albums || []).length > 0 && <span className="ml-auto text-xs" style={{ color: 'var(--gold)' }}>{(content.albums || []).length}</span>}
          </div>

          <div className="sidebar-section-title">會員</div>
          <div className={`sidebar-link ${active.type === 'users-manager' ? 'active' : ''}`} onClick={() => goTo({ type: 'users-manager' })}>
            <span>👥</span> 使用者管理
          </div>

          <div className="sidebar-section-title">工具</div>
          <div className={`sidebar-link ${active.type === 'backups' ? 'active' : ''}`} onClick={() => goTo({ type: 'backups' })}>
            <span>↻</span> 備份歷史
          </div>
          <div className={`sidebar-link ${active.type === 'visitors' ? 'active' : ''}`} onClick={() => goTo({ type: 'visitors' })}>
            <span>👁</span> 訪客統計
          </div>
        </div>
        <div className="p-3 border-t" style={{ borderColor: 'var(--border)' }}>
          <button className="sidebar-link w-full" onClick={logout} style={{ color: 'var(--danger)' }}>
            <span>↪</span> 登出
          </button>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-y-auto" style={{ height: '100vh', minWidth: 0 }}>
        {/* Top save bar */}
        <div className="top-save-bar sticky top-0 z-10 px-8 py-4 flex items-center justify-between border-b gap-3"
             style={{ background: 'rgba(247,245,241,0.92)', backdropFilter: 'blur(8px)', borderColor: 'var(--border)' }}>
          <div className="flex items-center gap-3 min-w-0">
            <button className="mobile-hamburger btn btn-ghost btn-sm" onClick={() => setSidebarOpen(true)} aria-label="選單" style={{ padding: '6px 8px', fontSize: 18 }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
                <path d="M4 7h16M4 12h16M4 17h16"/>
              </svg>
            </button>
            <div className="save-status flex items-center gap-2 text-sm min-w-0">
              {dirty ? (
                <><span className="dirty-dot"></span><span className="truncate" style={{ color: 'var(--ink-soft)' }}>有未儲存的變更</span></>
              ) : (
                <span className="truncate" style={{ color: 'var(--ink-mute)' }}>已儲存</span>
              )}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <a href="index.html" target="_blank" className="btn btn-secondary btn-sm desktop-only">預覽公開頁 ↗</a>
            <a href="index.html" target="_blank" className="btn btn-secondary btn-sm mobile-only" aria-label="預覽" title="預覽公開頁" style={{ padding: '4px 10px' }}>↗</a>
            <button className="btn btn-primary" onClick={save} disabled={!dirty || saving}>
              {saving ? '儲存中⋯' : '儲存'}
            </button>
          </div>
        </div>

        <div className="admin-content p-8 max-w-5xl mx-auto">
          {active.type === 'site' && <SiteEditor site={content.site} onUpdate={(s) => setContent({ ...content, site: s })} password={password} showToast={showToast} />}
          {active.type === 'navigation' && <NavEditor navigation={content.navigation} onUpdate={(n) => setContent({ ...content, navigation: n })} />}
          {active.type === 'footer' && <FooterEditor footer={content.footer} onUpdate={(f) => setContent({ ...content, footer: f })} />}
          {active.type === 'page' && currentPage && (
            <PageEditor
              key={currentPage.id}
              page={currentPage}
              onUpdatePage={(p) => updatePage(currentPage.id, p)}
              onDeletePage={() => deletePage(currentPage.id)}
              password={password}
              showToast={showToast}
            />
          )}
          {active.type === 'backups' && <BackupsView password={password} showToast={showToast} onRestore={loadContent} />}
          {active.type === 'visitors' && <VisitorStatsView password={password} showToast={showToast} />}
          {active.type === 'albums-manager' && (
            <AlbumsManagerView
              albums={content.albums || []}
              onUpdate={(albums) => setContent({ ...content, albums })}
              password={password}
              showToast={showToast}
            />
          )}
          {active.type === 'users-manager' && (
            <UsersManagerView password={password} showToast={showToast} />
          )}
        </div>
      </main>

      {toast && <div className={`toast ${toast.kind}`}>{toast.msg}</div>}
    </div>
    </ContentCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>

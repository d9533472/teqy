<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#00B050" />
  <title>2026 NMDC 團隊淨灘・GO! | Beach Cleanup Registration</title>
  <meta name="description" content="2026 NMDC 團隊淨灘｜SDGs/ESG Beach Cleanup — 報名就對了！" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Shrikhand&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root{
      --nmdc-navy:#0A2340; --nmdc-green:#00B050; --nmdc-green-dark:#009043; --nmdc-green-light:#42D47C;
      --sun:#FFCB47; --sun-deep:#F5A623;
      --sky:#6DC8E8; --sky-deep:#2AA0D6;
      --coral:#FF6B4A; --coral-deep:#E85533;
      --cream:#FFF5E4; --cream-warm:#FFEED2;
      --sand:#F5E3BE; --sand-deep:#E8CE94;
      --ink:#0A2340; --ink-soft:#4A5E7A;
      --tpc-blue:#1A75B8;
    }
    html,body{ background:var(--cream); color:var(--ink); scroll-behavior:smooth; }
    body{ font-family:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; font-size:17px; }
    .font-display{ font-family:'Caprasimo','Noto Sans TC',serif; letter-spacing:-0.01em; }
    .font-chunk{ font-family:'Shrikhand','Caprasimo','Noto Sans TC',serif; }
    .font-num{ font-family:'Caprasimo',serif; font-feature-settings:'tnum'; }

    .bg-paper{
      background:
        radial-gradient(circle at 15% 10%, rgba(255,203,71,0.12) 0%, transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(0,176,80,0.08) 0%, transparent 45%),
        radial-gradient(circle at 50% 100%, rgba(109,200,232,0.10) 0%, transparent 50%),
        var(--cream);
    }
    .bg-dots{ background-image: radial-gradient(circle, rgba(10,35,64,0.08) 1px, transparent 1.5px); background-size: 18px 18px; }

    .sticker{ background:#fff; border:3px solid var(--ink); border-radius:22px; box-shadow:8px 8px 0 var(--ink); transition:transform .15s ease, box-shadow .15s ease; }
    .sticker:hover{ transform:translate(-3px,-3px) rotate(0deg) !important; box-shadow:12px 12px 0 var(--ink); }
    .sticker-clickable:hover{ cursor:pointer; }
    .sticker-green{ background:var(--nmdc-green); color:#fff; }
    .sticker-sun{ background:var(--sun); }
    .sticker-coral{ background:var(--coral); color:#fff; }
    .sticker-sky{ background:var(--sky); }

    .btn-chunk{ background:var(--nmdc-green); color:#fff; border:3px solid var(--ink); border-radius:999px; box-shadow:5px 5px 0 var(--ink); font-family:'Plus Jakarta Sans',sans-serif; font-weight:800; letter-spacing:0.02em; transition:transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .12s ease, background .15s; }
    .btn-chunk:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--ink); background:var(--nmdc-green-light); }
    .btn-chunk:active{ transform:translate(3px,3px); box-shadow:2px 2px 0 var(--ink); }
    .btn-chunk:disabled{ background:#9FBFAB; cursor:not-allowed; transform:none !important; box-shadow:5px 5px 0 var(--ink) !important; }

    .btn-outline{ background:#fff; color:var(--ink); border:2px solid var(--ink); border-radius:999px; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; font-weight:700; }
    .btn-outline:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); background:var(--sun); }
    .btn-outline:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }

    .btn-danger{ background:var(--coral); color:#fff; border:2px solid var(--ink); border-radius:999px; box-shadow:3px 3px 0 var(--ink); font-weight:800; transition:all .12s ease; }
    .btn-danger:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); background:var(--coral-deep); }

    .field{ background:#fff; border:2.5px solid var(--ink); border-radius:12px; transition:all .12s ease; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:500; }
    .field:focus{ outline:none; box-shadow:4px 4px 0 var(--nmdc-green); transform:translate(-1px,-1px); }
    .field.err{ border-color:var(--coral-deep); background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }
    .field.err:focus{ box-shadow:5px 5px 0 var(--coral); }

    .chk{ appearance:none; width:26px; height:26px; border:2.5px solid var(--ink); border-radius:6px; background:#fff; cursor:pointer; position:relative; flex-shrink:0; margin-top:2px; transition:all .12s ease; }
    .chk:hover{ background:var(--sun); }
    .chk:checked{ background:var(--nmdc-green); border-color:var(--ink); }
    .chk:checked::after{ content:""; position:absolute; left:7px; top:2px; width:7px; height:14px; border:solid #fff; border-width:0 3px 3px 0; transform:rotate(45deg); }

    .wavy{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 10'><path d='M0 5 Q10 0 20 5 T40 5' stroke='%2300B050' stroke-width='3' fill='none' stroke-linecap='round'/></svg>"); background-position:0 100%; background-size:40px 10px; background-repeat:repeat-x; padding-bottom:12px; }
    .wavy-coral{ background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 10'><path d='M0 5 Q10 0 20 5 T40 5' stroke='%23FF6B4A' stroke-width='3' fill='none' stroke-linecap='round'/></svg>"); background-position:0 100%; background-size:40px 10px; background-repeat:repeat-x; padding-bottom:12px; }

    .tag{ display:inline-flex; align-items:center; gap:6px; padding:5px 14px; background:var(--sun); border:2px solid var(--ink); border-radius:999px; font-size:13px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }

    @keyframes spin-slow{ from{transform:rotate(0);} to{transform:rotate(360deg);} }
    @keyframes bounce-in{ 0%{opacity:0; transform:translateY(20px) scale(.9);} 60%{opacity:1; transform:translateY(-4px) scale(1.02);} 100%{opacity:1; transform:none;} }
    @keyframes wiggle{ 0%,100%{ transform:rotate(-2deg);} 50%{ transform:rotate(2deg);} }
    @keyframes float{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-10px);} }
    @keyframes count-bounce{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.08);} }
    @keyframes sway{ 0%,100%{ transform:rotate(-4deg);} 50%{ transform:rotate(4deg);} }
    .spin-slow{ animation:spin-slow 30s linear infinite; transform-origin:center; }
    .bounce-in{ animation:bounce-in .7s cubic-bezier(.34,1.56,.64,1) backwards; }
    .wiggle{ animation:wiggle 3s ease-in-out infinite; }
    .float{ animation:float 4s ease-in-out infinite; }
    .count-bounce{ animation:count-bounce 1s ease-in-out infinite; }
    .sway{ animation:sway 5s ease-in-out infinite; display:inline-block; }

    .ticket{ background:#fff; border:2.5px solid var(--ink); border-radius:14px; position:relative; padding:20px 22px; box-shadow:4px 4px 0 var(--ink); }

    /* Timeline item for schedule */
    .sched-row{
      display:flex; align-items:stretch; gap:16px;
      background:#fff; border:2.5px solid var(--ink); border-radius:14px;
      box-shadow:5px 5px 0 var(--ink);
      overflow:hidden;
      transition:transform .15s, box-shadow .15s;
    }
    .sched-row:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--ink); }
    .sched-time{
      background:var(--nmdc-navy); color:var(--cream);
      padding:16px 18px; display:flex; align-items:center; justify-content:center;
      font-family:'Caprasimo',serif; font-size:1.6rem; min-width:120px;
      border-right:2.5px solid var(--ink);
    }
    .sched-text{ flex:1; padding:16px 18px; display:flex; align-items:center; font-size:1.05rem; font-weight:500; }
    @media (max-width:640px){
      .sched-time{ min-width:90px; font-size:1.3rem; padding:12px; }
      .sched-text{ padding:12px 14px; font-size:0.98rem; }
    }

    /* Edit drawer */
    .edit-drawer{ position:fixed; top:0; right:0; bottom:0; width:100%; max-width:560px; background:var(--cream); border-left:3px solid var(--ink); box-shadow:-10px 0 0 var(--ink); z-index:60; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }
    .edit-drawer.open{ transform:translateX(0); }
    .edit-drawer-head{ padding:14px 18px; background:var(--nmdc-navy); color:var(--cream); border-bottom:3px solid var(--ink); display:flex; align-items:center; justify-content:space-between; }
    .edit-drawer-body{ flex:1; overflow-y:auto; padding:14px; }
    .edit-drawer-foot{ padding:12px 14px; border-top:3px solid var(--ink); background:#fff; display:flex; gap:8px; }
    .edit-tabs{ display:flex; background:#fff; border-bottom:3px solid var(--ink); overflow-x:auto; }
    .edit-tab{ flex:1; min-width:90px; padding:12px 8px; font-size:12px; font-weight:800; border-right:2px solid var(--ink); cursor:pointer; text-align:center; background:#fff; transition:background .12s; white-space:nowrap; letter-spacing:0.02em; user-select:none; color:var(--ink); }
    .edit-tab:last-child{ border-right:0; }
    .edit-tab:hover{ background:var(--cream-warm); }
    .edit-tab.active{ background:var(--nmdc-green); color:#fff; }

    .edit-section{ margin-bottom:12px; background:#fff; border:2px solid var(--ink); border-radius:12px; overflow:hidden; }
    .edit-section-head{ padding:10px 14px; background:var(--sun); border-bottom:2px solid var(--ink); font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-size:14px; user-select:none; }
    .edit-section.special .edit-section-head{ background:var(--nmdc-green-light); }
    .edit-section-body{ padding:8px 12px; }
    .edit-row{ padding:8px 0; border-bottom:1px dashed var(--sand-deep); }
    .edit-row:last-child{ border-bottom:0; }
    .edit-key{ font-family:'Plus Jakarta Sans',monospace; font-size:10px; color:var(--ink-soft); font-weight:700; letter-spacing:0.05em; margin-bottom:4px; text-transform:uppercase; }
    .edit-input{ width:100%; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-size:14px; padding:8px 10px; border:2px solid var(--ink); border-radius:8px; background:#fff; font-weight:500; resize:vertical; box-sizing:border-box; }
    .edit-input:focus{ outline:none; box-shadow:2px 2px 0 var(--nmdc-green); }
    .edit-input.dirty{ background:#FFFAD6; }
    .lang-pill{ display:inline-flex; align-items:center; padding:4px 12px; border:2px solid var(--ink); border-radius:999px; font-weight:700; font-size:12px; cursor:pointer; background:#fff; }
    .lang-pill.active{ background:var(--nmdc-green); color:#fff; }
    .edit-backdrop{ position:fixed; inset:0; background:rgba(10,35,64,0.4); z-index:55; opacity:0; pointer-events:none; transition:opacity .2s; }
    .edit-backdrop.open{ opacity:1; pointer-events:auto; }
    .edit-badge{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:50; background:var(--nmdc-green); color:#fff; padding:6px 14px; border:2.5px solid var(--ink); border-radius:999px; box-shadow:3px 3px 0 var(--ink); font-weight:800; font-size:12px; letter-spacing:0.1em; }

    /* Emergency contact block on registration form (red theme) */
    .em-block{ position:relative; padding:22px 22px 26px; border-radius:18px; border:3px solid var(--ink); background:linear-gradient(180deg, #FFE5DE 0%, #FFD6CB 100%); box-shadow:6px 6px 0 var(--ink); margin-top:8px; }
    .em-block::before{ content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:60%; height:6px; background:repeating-linear-gradient(90deg, var(--coral-deep) 0 14px, #ffffff 14px 28px); border-radius:6px 6px 0 0; }
    .em-head{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .em-tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; background:var(--coral-deep); color:#fff; border:2.5px solid var(--ink); border-radius:999px; font-size:11px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; box-shadow:2px 2px 0 var(--ink); }
    .em-title{ font-family:'Caprasimo',serif; font-size:1.6rem; line-height:1.1; color:var(--coral-deep); }
    .em-sub{ font-size:14px; font-weight:600; color:#7a3528; margin-bottom:14px; }
    @media (min-width:768px){ .em-title{ font-size:2rem; } .em-sub{ font-size:15px; } }
    .em-block .field{ background:#fff; }
    .em-block .field:focus{ box-shadow:4px 4px 0 var(--coral-deep); }

    /* Final agreement — risk notice + mandatory checkbox */
    .final-agree{ position:relative; padding:22px 22px 20px; border-radius:18px; border:3px solid var(--coral-deep); background:linear-gradient(180deg, #FFE5DE 0%, #FFCEC0 100%); box-shadow:6px 6px 0 var(--ink); }
    .final-agree::before{ content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:70%; height:6px; background:repeating-linear-gradient(90deg, var(--coral-deep) 0 14px, var(--sun) 14px 28px); border-radius:6px 6px 0 0; }
    .final-agree-head{ text-align:center; margin-bottom:10px; }
    .final-agree-title{ font-family:'Caprasimo',serif; font-size:1.5rem; line-height:1.2; color:var(--coral-deep); margin-bottom:10px; text-align:center; }
    @media (min-width:768px){ .final-agree-title{ font-size:1.9rem; } }
    .final-agree-body{ background:#fff; padding:14px 16px; border-radius:12px; border:2px solid var(--ink); font-size:14px; line-height:1.65; color:var(--ink); margin-bottom:14px; font-weight:500; }
    @media (min-width:768px){ .final-agree-body{ font-size:15px; padding:16px 18px; } }
    .final-agree-check{ display:flex; align-items:flex-start; gap:12px; cursor:pointer; padding:14px 16px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; }
    .final-agree-check:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .final-agree-check.checked{ background:var(--nmdc-green); color:#fff; border-color:var(--ink); }
    .final-agree-check.checked .chk{ background:#fff; border-color:var(--ink); }
    .final-agree-check.checked .chk:checked{ background:#fff; }
    .final-agree-check.checked .chk:checked::after{ border-color:var(--nmdc-green); }
    .final-agree-check.err{ animation:shake .5s; border-color:var(--coral-deep); background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }
    @keyframes shake{
      0%, 100% { transform:translateX(0); }
      20%, 60% { transform:translateX(-6px); }
      40%, 80% { transform:translateX(6px); }
    }

    /* Flash attention on the first error after submit */
    @keyframes flash-attn{
      0%   { box-shadow:0 0 0 0 rgba(232,85,51,0.7), 4px 4px 0 var(--coral); }
      40%  { box-shadow:0 0 0 14px rgba(232,85,51,0), 6px 6px 0 var(--coral-deep); }
      100% { box-shadow:0 0 0 0 rgba(232,85,51,0), 4px 4px 0 var(--coral); }
    }
    .flash-error{ animation:flash-attn 1.1s cubic-bezier(.4,0,.6,1) 2, shake .5s; }

    /* Bigger error text with bounce */
    .field-error-msg{
      margin-top:6px; padding:8px 12px;
      background:#FFE5DE; border:2px solid var(--coral-deep); border-radius:8px;
      font-size:15px; font-weight:800; color:var(--coral-deep);
      display:flex; align-items:center; gap:6px;
      animation:err-pop .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes err-pop{
      0%   { opacity:0; transform:translateY(-4px) scale(0.92); }
      60%  { opacity:1; transform:translateY(0) scale(1.04); }
      100% { opacity:1; transform:scale(1); }
    }

    /* Form sections — basic & diet */
    .form-section{ position:relative; padding:22px 22px 26px; border-radius:18px; border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink); }
    .form-section.basic{ background:linear-gradient(180deg, #FFF6DC 0%, #FFEEC0 100%); }
    .form-section.diet{ background:linear-gradient(180deg, #DCF6E5 0%, #C0EAD0 100%); }
    .form-section-head{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .form-section-tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border:2.5px solid var(--ink); border-radius:999px; font-size:11px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; box-shadow:2px 2px 0 var(--ink); }
    .form-section.basic .form-section-tag{ background:var(--sun-deep); color:#fff; }
    .form-section.diet .form-section-tag{ background:var(--nmdc-green-dark); color:#fff; }
    .form-section-title{ font-family:'Caprasimo',serif; font-size:1.6rem; line-height:1.1; color:var(--ink); }
    .form-section.diet .form-section-title{ color:var(--nmdc-green-dark); }
    .form-section-sub{ font-size:14px; font-weight:600; color:var(--ink-soft); margin-bottom:14px; }
    @media (min-width:768px){
      .form-section-title{ font-size:2rem; }
      .form-section-sub{ font-size:15px; }
    }

    /* Diet radio options */
    .diet-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .diet-opt{ display:flex; align-items:center; gap:10px; padding:14px 16px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; font-weight:700; }
    .diet-opt:hover{ background:var(--cream-warm); transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .diet-opt input{ accent-color:var(--nmdc-green-dark); width:20px; height:20px; flex-shrink:0; }
    .diet-opt.active{ background:var(--nmdc-green); color:#fff; }
    .diet-opt.active input{ accent-color:#fff; }
    .diet-other-input{ margin-top:10px; width:100%; padding:12px 14px; border:2.5px solid var(--ink); border-radius:10px; font-size:15px; font-family:inherit; font-weight:500; background:#fff; box-shadow:3px 3px 0 var(--ink); }
    .diet-other-input:focus{ outline:none; box-shadow:4px 4px 0 var(--nmdc-green-dark); }
    @media (max-width:520px){ .diet-grid{ grid-template-columns:1fr; } }

    /* Yes/No toggle */
    .yn-group{ display:flex; gap:10px; flex-wrap:wrap; }
    .yn-group.err{ padding:8px; border:2.5px solid var(--coral-deep); border-radius:14px; background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }
    .yn-btn{ flex:1; min-width:100px; padding:14px 18px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; font-family:inherit; }
    .yn-btn:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .yn-btn.active.yes{ background:var(--nmdc-green); color:#fff; }
    .yn-btn.active.no{ background:var(--ink-soft); color:#fff; }

    .diet-grid.err{ padding:8px; border:2.5px solid var(--coral-deep); border-radius:14px; background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }

    .agree-row{ display:flex; align-items:flex-start; gap:12px; cursor:pointer; padding-top:12px; padding:16px; border-radius:12px; background:rgba(255,203,71,0.4); border:2px solid var(--ink); }
    .agree-row.err{ border:2.5px solid var(--coral-deep); background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }

    /* Companion sub-card */
    .companion-card{ background:#FFFEF5; border:2.5px dashed var(--ink); border-radius:14px; padding:14px 16px; margin-top:12px; }
    .companion-card-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; font-family:'Caprasimo',serif; font-size:1.1rem; }
    .companion-card-num{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; background:var(--sun-deep); color:#fff; border:2px solid var(--ink); border-radius:999px; font-weight:800; font-size:13px; }
    .companion-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:520px){ .companion-grid{ grid-template-columns:1fr; } }

    .same-diet-row{ margin-top:14px; padding:12px 14px; background:rgba(255,255,255,0.6); border:2px solid var(--ink); border-radius:10px; display:flex; align-items:center; gap:10px; cursor:pointer; }
    .same-diet-row:hover{ background:#fff; }

    /* Per-companion diet rows shown when "same as me" is unchecked */
    .companion-diet-list{ margin-top:14px; display:flex; flex-direction:column; gap:12px; }
    .companion-diet-row{ background:rgba(255,255,255,0.7); border:2px dashed var(--ink); border-radius:12px; padding:14px; }
    .companion-diet-row .diet-opt{ padding:10px 12px; box-shadow:2px 2px 0 var(--ink); }
    .companion-diet-row .diet-opt:hover{ box-shadow:3px 3px 0 var(--ink); }
    .companion-diet-name{ display:flex; align-items:center; gap:8px; margin-bottom:10px; font-family:'Caprasimo',serif; font-size:1.1rem; color:var(--nmdc-green-dark); }
    .companion-diet-name .companion-card-num{ background:var(--nmdc-green); }

    /* Reorder UI */
    .reorder-item{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px; background:#fff;
      border:2px solid var(--ink); border-radius:8px;
      margin-bottom:6px; font-weight:700;
    }
    .reorder-handle{ color:var(--ink-soft); font-size:14px; }
    .reorder-btns{ display:flex; gap:4px; margin-left:auto; }
    .reorder-btn{
      padding:3px 8px; border:1.5px solid var(--ink);

    .toggle-sw::after{

      left:2px; top:1px; width:16px; height:16px;
      background:#fff; border:1.5px solid var(--ink);
      border-radius:50%; transition:left .2s;

    .toggle.on .toggle-sw{ background:var(--nmdc-green); }
    .toggle.on .toggle-sw::after{ left:20px; }

    .rich-toolbar{ display:flex; gap:4px; padding:6px; background:var(--cream-warm); border:2px solid var(--ink); border-bottom:0; border-radius:8px 8px 0 0; flex-wrap:wrap; align-items:center; }
    .rich-btn{ padding:6px 10px; border:1.5px solid var(--ink); border-radius:6px; background:#fff; font-weight:800; font-size:12px; cursor:pointer; min-width:32px; font-family:'Plus Jakarta Sans',sans-serif; }

    .rich-swatch{ width:22px; height:22px; border:1.5px solid var(--ink); border-radius:4px; cursor:pointer; padding:0; }
    .rich-swatch:hover{ transform:scale(1.15); }

    .sched-edit-head{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .sched-edit-num{ display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; background:var(--nmdc-green); color:#fff; border:2px solid var(--ink); border-radius:999px; font-weight:800; font-size:11px; flex-shrink:0; }
    .sched-edit-actions{ margin-left:auto; display:flex; gap:3px; }
    .sched-edit-act{ width:26px; height:26px; border:1.5px solid var(--ink); border-radius:6px; background:#fff; font-weight:800; font-size:11px; cursor:pointer; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .sched-edit-act:hover{ background:var(--sun); }

    .sched-edit-act.danger{ background:#FFE5DE; }

    .sched-edit-body{ display:grid; grid-template-columns:90px 1fr; gap:6px; }

    .sched-edit-time:focus{ background:#fff; box-shadow:2px 2px 0 var(--sky-deep); }
    .sched-edit-text{ border:1.5px solid var(--ink); border-radius:6px; padding:6px 8px; font-size:13px; outline:none; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:500; }
    .sched-edit-text:focus{ box-shadow:2px 2px 0 var(--nmdc-green); }
    .sched-add-btn{ width:100%; padding:12px; background:var(--cream-warm); border:2px dashed var(--ink); border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; color:var(--ink); transition:all .15s; font-family:'Plus Jakarta Sans',sans-serif; }
    .sched-add-btn:hover{ background:var(--sun); border-style:solid; transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }

    /* === Language Picker Modal === */
    .lang-picker-backdrop{ position:fixed; inset:0; background:rgba(10,35,64,0.65); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fade-in .35s ease; }

    function parseScheduleItems(lang, edits, serverContent){
      const key = `${lang}.schedule.items`;
      const raw = edits[key] !== undefined ? edits[key] : serverContent[key];
      if(raw){
        try{
          const arr = JSON.parse(raw);
          if(Array.isArray(arr)){
            return arr.map(x => ({ time: String(x.time || ""), text: String(x.text || "") }));
          }
        } catch(_){}
      }
      // Legacy fallback
      const items = [];
      for(let i = 0; i < SCHEDULE_LEGACY_MAX; i++){
        const tKey = `${lang}.schedule.${i}.time`;
        const xKey = `${lang}.schedule.${i}.text`;
        const time = edits[tKey] !== undefined ? edits[tKey]
          : (serverContent[tKey] !== undefined ? serverContent[tKey] : (DEFAULTS[lang] && DEFAULTS[lang][`schedule.${i}.time`]) || "");
        const text = edits[xKey] !== undefined ? edits[xKey]
          : (serverContent[xKey] !== undefined ? serverContent[xKey] : (DEFAULTS[lang] && DEFAULTS[lang][`schedule.${i}.text`]) || "");
        if(time || text){ items.push({ time, text }); }
      }
      return items;
    }

    function xhrGet(url){
      return new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        x.open("GET", url, true);
        x.onload = () => {
          if(x.status >= 200 && x.status < 300){
            try{ res(JSON.parse(x.responseText)); } catch(e){ rej(e); }
          } else rej(new Error("HTTP " + x.status));
        };
        x.onerror = () => rej(new Error("Network"));
        x.ontimeout = () => rej(new Error("Timeout"));
        x.timeout = 20000;
        x.send();
      });
    }
    function xhrPost(url, data, timeout){
      timeout = timeout || 25000;
      return new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        x.open("POST", url, true);
        x.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
        x.onload = () => {
          if(x.status >= 200 && x.status < 300){
            try{ res(JSON.parse(x.responseText)); } catch(e){ rej(e); }
          } else rej(new Error("HTTP " + x.status));
        };
        x.onerror = () => rej(new Error("Network"));
        x.ontimeout = () => rej(new Error("Timeout"));
        x.timeout = timeout;
        x.send(JSON.stringify(data));
      });
    }

    const RICH_FONTS = [
      { label:"預設 Default", val:"" },
      { label:"黑體 Sans", val:"'Noto Sans TC', 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif" },
      { label:"明體 Serif", val:"'Noto Serif TC', 'PMingLiU', '新細明體', Georgia, serif" },
      { label:"楷體 Kai",  val:"'DFKai-SB', '標楷體', 'BiauKai', serif" },
      { label:"圓體 Round", val:"'Noto Sans CJK TC', 'LiHei Pro', 'PingFang TC', sans-serif" },
      { label:"等寬 Mono", val:"'Courier New', Consolas, monospace" }
    ];
    const RICH_SIZES = [
      { label:"小 Small", val:"2" },
      { label:"一般 Normal", val:"3" },
      { label:"中 Medium", val:"4" },
      { label:"大 Large", val:"5" },
      { label:"特大 XL", val:"6" },
      { label:"超大 Huge", val:"7" }
    ];
    const RICH_COLORS = [
      "#0A2340", "#4A5E7A", "#9B9B9B", "#000000",
      "#00B050", "#009043", "#2AA0D6", "#6DC8E8",
      "#E85533", "#FF6B4A", "#F5A623", "#FFCB47",
      "#7B2D8E", "#C91B6C", "#ffffff"
    ];

    function RichEditor({ value, onChange, dirty }){
      const ref = useRef(null);
      const [showColorPalette, setShowColorPalette] = useState(false);
      useEffect(() => {
        if(!ref.current) return;
        if(document.activeElement === ref.current) return;
        if(ref.current.innerHTML !== value) ref.current.innerHTML = value || "";
      }, [value]);

      const exec = (cmd, arg) => {
        ref.current && ref.current.focus();
        document.execCommand(cmd, false, arg);
        if(ref.current) onChange(ref.current.innerHTML);
      };
      const insertToken = (tok) => {
        ref.current && ref.current.focus();
        document.execCommand("insertText", false, tok);
        if(ref.current) onChange(ref.current.innerHTML);
      };
      const applyColor = (c) => {
        setShowColorPalette(false);
        exec("foreColor", c);
      };
      const applyFont = (f) => {
        if(!f) return;
        exec("fontName", f);
      };
      const applySize = (s) => {
        if(!s) return;
        exec("fontSize", s);
      };

      return (
        <div>
          <div className="rich-toolbar">
            {/* Font family */}
            <select className="rich-select" title="字體 Font family" defaultValue="" onChange={e => { applyFont(e.target.value); e.target.value = ""; }}>
              <option value="">🔤 字體</option>
              {RICH_FONTS.map(f => <option key={f.label} value={f.val} style={{fontFamily:f.val || 'inherit'}}>{f.label}</option>)}
            </select>
            {/* Font size */}
            <select className="rich-select" title="字級 Size" defaultValue="" onChange={e => { applySize(e.target.value); e.target.value = ""; }}>
              <option value="">📏 字級</option>
              {RICH_SIZES.map(s => <option key={s.val} value={s.val}>{s.label}</option>)}
            </select>
            <button type="button" className="rich-btn" onClick={() => exec("bold")}><b>B</b></button>
            <button type="button" className="rich-btn" onClick={() => exec("italic")}><i>I</i></button>
            <button type="button" className="rich-btn" onClick={() => exec("underline")}><u>U</u></button>
            {/* Color picker */}
            <div style={{position:"relative"}}>
              <button type="button" className="rich-btn" onClick={() => setShowColorPalette(v => !v)} title="文字顏色 Color">🎨</button>
              {showColorPalette && (
                <div className="rich-palette" onMouseLeave={() => setShowColorPalette(false)}>
                  {RICH_COLORS.map(c => (
                    <button key={c} type="button" className="rich-swatch" style={{background:c}} onClick={() => applyColor(c)} title={c}/>
                  ))}
                  <button type="button" className="rich-btn" style={{width:"100%", marginTop:4}} onClick={() => { setShowColorPalette(false); exec("removeFormat"); }}>✕ 清除</button>
                </div>
              )}
            </div>
            <button type="button" className="rich-btn" onClick={() => exec("insertUnorderedList")}>•</button>
            <button type="button" className="rich-btn" onClick={() => exec("insertOrderedList")}>1.</button>
            <button type="button" className="rich-btn" onClick={() => { const url = window.prompt("Link URL:"); if(url) exec("createLink", url); }}>🔗</button>
            <button type="button" className="rich-btn" onClick={() => exec("unlink")}>⌀</button>
            <button type="button" className="rich-btn" onClick={() => exec("formatBlock", "<h2>")}>H2</button>
            <button type="button" className="rich-btn" onClick={() => exec("formatBlock", "<p>")}>¶</button>
            <button type="button" className="rich-btn" onClick={() => exec("removeFormat")} title="清除格式">✕Fmt</button>
          </div>
          <div
            ref={ref}
            contentEditable
            suppressContentEditableWarning
            className={"rich-editor " + (dirty ? "dirty" : "")}
            onInput={() => ref.current && onChange(ref.current.innerHTML)}
            onBlur={() => ref.current && onChange(ref.current.innerHTML)}
          />
          <div className="mt-2 text-xs text-[color:var(--ink-soft)]">
            <div className="font-bold mb-1">🏷️ 可插入的標籤 / Placeholders：</div>
            <div>{EMAIL_TOKENS.map(t => <span key={t.key} className="token-chip" onClick={() => insertToken(t.key)} title={t.label}>{t.key}</span>)}</div>
          </div>
        </div>
      );
    }

    // ====================================================================
    // Edit Panel
    // ====================================================================
    function EditPanel({ open, onClose, lang, setLang, edits, setEdits, serverContent, onSave, saving, dirtyCount, editPassword, registered, onDataChanged }){
      const [tab, setTab] = useState("text");
      return (
        <>
          <div className={"edit-backdrop " + (open ? "open" : "")} onClick={onClose}/>
          <aside className={"edit-drawer " + (open ? "open" : "")} role="dialog" aria-label="Edit content">
            <div className="edit-drawer-head">
              <div>
                <div className="font-display text-xl">⚙️ 管理面板 / Admin</div>
                <div className="text-xs opacity-70 mt-0.5">
                  {dirtyCount > 0 ? `${dirtyCount} 個未儲存 / unsaved` : "即時同步 / live"}
                </div>
              </div>
              <button onClick={onClose} className="btn-outline px-3 py-1 text-sm" style={{background:"var(--sun)"}}>✕</button>

            {tab === "reg" && <RegTab editPassword={editPassword} registered={registered} onDataChanged={onDataChanged}/>}
            {tab === "blast" && <BlastTab editPassword={editPassword} registered={registered}/>}

            {(tab === "text" || tab === "email") && (

                <button onClick={onSave} disabled={dirtyCount === 0 || saving} className="btn-chunk flex-1 px-4 py-3 text-sm">
                  {saving ? "儲存中…" : `💾 儲存${dirtyCount > 0 ? ` (${dirtyCount})` : ""}`}
                </button>
                <button onClick={() => setEdits({})} disabled={dirtyCount === 0 || saving} className="btn-outline px-4 py-3 text-sm">↺ 還原</button>
              </div>
            )}
          </aside>

    // Helpers for display settings (not lang-specific)
    function getDisplay(key, edits, serverContent){
      if(edits[key] !== undefined) return edits[key];
      if(serverContent[key] !== undefined) return serverContent[key];
      return DISPLAY_DEFAULTS[key] ?? "";
    }

    // ---- Tab 1: Text ----
    function TextTab({ lang, setLang, edits, setEdits, serverContent, registered }){
      const [openSections, setOpenSections] = useState({ layout:true, hero:false });
      const [search, setSearch] = useState("");

      function valueOf(key){
        const editKey = `${lang}.${key}`;
        if(edits[editKey] !== undefined) return edits[editKey];
        if(serverContent[editKey] !== undefined) return serverContent[editKey];
        return DEFAULTS[lang][key] ?? "";
      }
      function isDirty(key){ return edits[`${lang}.${key}`] !== undefined; }
      function updateEdit(key, val){
        const editKey = `${lang}.${key}`;
        const committed = serverContent[editKey] !== undefined ? serverContent[editKey] : (DEFAULTS[lang][key] ?? "");
        setEdits(prev => {
          const next = { ...prev };
          if(val === committed) delete next[editKey];
          else next[editKey] = val;
          return next;
        });
      }
      function resetKey(key){
        setEdits(prev => { const next = { ...prev }; delete next[`${lang}.${key}`]; return next; });
      }

      const filteredSections = useMemo(() => {
        if(!search.trim()) return SECTIONS;
        const q = search.trim().toLowerCase();
        return SECTIONS.map(s => ({
          ...s,
          keys: s.keys.filter(k => k.toLowerCase().includes(q) || valueOf(k).toLowerCase().includes(q))
        })).filter(s => s.keys.length > 0);
      // eslint-disable-next-line
      }, [search, edits, lang, serverContent]);

      useEffect(() => {
        if(search.trim()){
          const all = {}; filteredSections.forEach(s => { all[s.id] = true; });
          setOpenSections(prev => ({ ...prev, ...all }));
        }
      // eslint-disable-next-line
      }, [search]);

      return (
        <div className="edit-drawer-body">
          <div className="mb-3 flex items-center gap-2">
            <span className="text-xs font-bold text-[color:var(--ink-soft)] tracking-wider uppercase shrink-0">Lang</span>
            <button className={"lang-pill " + (lang === "zh" ? "active" : "")} onClick={() => setLang("zh")}>中文</button>
            <button className={"lang-pill " + (lang === "en" ? "active" : "")} onClick={() => setLang("en")}>English</button>
          </div>
          <input type="text" placeholder="🔍 搜尋欄位或文字 / Search..." value={search} onChange={e => setSearch(e.target.value)} className="edit-input mb-4"/>

          {/* Special: Layout controls (not language-specific) */}
          <LayoutSection open={openSections.layout} onToggle={() => setOpenSections(s => ({ ...s, layout: !s.layout }))}
            edits={edits} setEdits={setEdits} serverContent={serverContent}/>

          {/* Special: Slot limit controls (not language-specific, applies to GAS backend) */}
          <SlotsSection open={openSections.slots} onToggle={() => setOpenSections(s => ({ ...s, slots: !s.slots }))}
            edits={edits} setEdits={setEdits} serverContent={serverContent} registered={registered}/>

          {filteredSections.map(sec => (
            <div key={sec.id} className="edit-section">
              <div className="edit-section-head" onClick={() => setOpenSections(s => ({ ...s, [sec.id]: !s[sec.id] }))}>
                <span>{sec.label} <span className="opacity-50 font-normal">({sec.keys.length})</span></span>
                <span>{openSections[sec.id] ? "▾" : "▸"}</span>
              </div>
              {openSections[sec.id] && (
                <div className="edit-section-body">
                  {sec.keys.map(k => {
                    const multi = (sec.multi || []).includes(k);
                    const dirty = isDirty(k);
                    return (
                      <div key={k} className="edit-row">
                        <div className="flex items-center justify-between">
                          <div className="edit-key">{k}</div>
                          {dirty && <button onClick={() => resetKey(k)} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ reset</button>}
                        </div>
                        {multi ? (
                          <textarea rows="4" value={valueOf(k)} onChange={e => updateEdit(k, e.target.value)} className={"edit-input " + (dirty ? "dirty" : "")}/>
                        ) : (
                          <input type="text" value={valueOf(k)} onChange={e => updateEdit(k, e.target.value)} className={"edit-input " + (dirty ? "dirty" : "")}/>
                        )}
                      </div>
                    );
                  })}
                  {sec.customEditor === "schedule" && (
                    <ScheduleEditor lang={lang} edits={edits} setEdits={setEdits} serverContent={serverContent}/>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // ScheduleEditor — dynamic add/remove/reorder for schedule items
    function ScheduleEditor({ lang, edits, setEdits, serverContent }){
      const itemsKey = `${lang}.schedule.items`;
      const items = parseScheduleItems(lang, edits, serverContent);
      const isDirty = edits[itemsKey] !== undefined;

      function saveItems(newItems){
        // Strip fully empty items at the end (keep middle empties in case user is typing)
        while(newItems.length > 0 && !newItems[newItems.length-1].time && !newItems[newItems.length-1].text){
          newItems.pop();
        }
        setEdits(prev => ({ ...prev, [itemsKey]: JSON.stringify(newItems) }));
      }
      function updateItem(idx, field, val){
        const next = [...items];
        if(!next[idx]) next[idx] = { time:"", text:"" };
        next[idx] = { ...next[idx], [field]: val };
        // Don't trim here — user might still be typing
        setEdits(prev => ({ ...prev, [itemsKey]: JSON.stringify(next) }));
      }
      function addItem(){
        // Guess next time based on last entry
        let nextTime = "09:00";
        if(items.length > 0){
          const lastTime = items[items.length-1].time;
          const m = lastTime && lastTime.match(/^(\d{1,2}):(\d{2})$/);
          if(m){
            const h = parseInt(m[1], 10);
            const mm = parseInt(m[2], 10);
            const totalMin = Math.min(23*60 + 59, h*60 + mm + 30);  // +30 min
            nextTime = String(Math.floor(totalMin/60)).padStart(2,"0") + ":" + String(totalMin%60).padStart(2,"0");
          }
        }
        saveItems([...items, { time: nextTime, text: "" }]);
      }
      function removeItem(idx){
        if(!window.confirm(`確定刪除 #${idx+1} 「${items[idx].time} ${items[idx].text || ""}」？`)) return;
        const next = items.filter((_, i) => i !== idx);
        saveItems(next);
      }
      function moveItem(idx, dir){
        const target = idx + dir;
        if(target < 0 || target >= items.length) return;
        const next = [...items];
        [next[idx], next[target]] = [next[target], next[idx]];
        saveItems(next);
      }
      function resetItems(){
        setEdits(prev => { const n = { ...prev }; delete n[itemsKey]; return n; });
      }

      return (
        <div className="edit-row">
          <div className="flex items-center justify-between mb-2">
            <div className="edit-key">📋 流程項目 / schedule items ({items.length}) {isDirty && <span className="text-[color:var(--coral-deep)] ml-1">● 有變更</span>}</div>
            {isDirty && <button onClick={resetItems} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ reset</button>}
          </div>
          <div className="text-[11px] text-[color:var(--ink-soft)] mb-3 leading-relaxed">
            💡 可自由新增、刪除、調整順序。中文 / English 各自獨立一份 — 切換語言會看到不同內容。
          </div>

          {items.length === 0 && (
            <div className="text-center text-[color:var(--ink-soft)] text-xs font-medium py-4">
              — 還沒有任何流程項目 —
            </div>
          )}

          {items.map((item, i) => (
            <div key={i} className="sched-edit-card">
              <div className="sched-edit-head">
                <span className="sched-edit-num">{i+1}</span>
                <span className="text-xs font-bold text-[color:var(--ink-soft)] uppercase tracking-wider">Step {i+1}</span>
                <div className="sched-edit-actions">
                  <button type="button" className="sched-edit-act" onClick={() => moveItem(i, -1)} disabled={i === 0} title="上移">▲</button>
                  <button type="button" className="sched-edit-act" onClick={() => moveItem(i, 1)} disabled={i === items.length - 1} title="下移">▼</button>
                  <button type="button" className="sched-edit-act danger" onClick={() => removeItem(i)} title="刪除">🗑️</button>
                </div>
              </div>
              <div className="sched-edit-body">
                <input type="text" value={item.time} onChange={e => updateItem(i, "time", e.target.value)} placeholder="08:30" className="sched-edit-time"/>
                <input type="text" value={item.text} onChange={e => updateItem(i, "text", e.target.value)} placeholder={lang === "zh" ? "活動項目..." : "Activity..."} className="sched-edit-text"/>
              </div>
            </div>
          ))}

          <button type="button" className="sched-add-btn" onClick={addItem}>
            ➕ 新增項目 / Add step
          </button>
        </div>
      );
    }

    function LayoutSection({ open, onToggle, edits, setEdits, serverContent }){
      const showCountdownKey = "display.showCountdown";
      const sectionOrderKey = "display.sectionOrder";

      const showCountdown = getDisplay(showCountdownKey, edits, serverContent) === "true";
      const currentOrderStr = getDisplay(sectionOrderKey, edits, serverContent);
      const currentOrder = currentOrderStr.split(",").filter(Boolean);
      // Ensure all orderable sections included (add any missing to end)
      const orderedIds = [...currentOrder];
      ORDERABLE_SECTIONS.forEach(s => { if(!orderedIds.includes(s.id)) orderedIds.push(s.id); });
      // Filter out unknowns
      const finalOrder = orderedIds.filter(id => ORDERABLE_SECTIONS.some(s => s.id === id));

      function setDisplay(key, val){
        const defaultVal = DISPLAY_DEFAULTS[key];
        const committed = serverContent[key] !== undefined ? serverContent[key] : defaultVal;
        setEdits(prev => {
          const next = { ...prev };
          if(val === committed) delete next[key];
          else next[key] = val;
          return next;
        });
      }
      function toggleCountdown(){
        setDisplay(showCountdownKey, showCountdown ? "false" : "true");
      }
      function move(idx, dir){
        const newOrder = [...finalOrder];
        const target = idx + dir;
        if(target < 0 || target >= newOrder.length) return;
        [newOrder[idx], newOrder[target]] = [newOrder[target], newOrder[idx]];
        setDisplay(sectionOrderKey, newOrder.join(","));
      }
      function resetOrder(){
        setDisplay(sectionOrderKey, DISPLAY_DEFAULTS[sectionOrderKey]);
      }

      const countdownDirty = edits[showCountdownKey] !== undefined;
      const orderDirty = edits[sectionOrderKey] !== undefined;

      return (
        <div className="edit-section special">
          <div className="edit-section-head" onClick={onToggle}>
            <span>🎨 版面設定 Layout {(countdownDirty || orderDirty) && <span className="text-[color:var(--coral-deep)]">●</span>}</span>
            <span>{open ? "▾" : "▸"}</span>
          </div>
          {open && (
            <div className="edit-section-body">
              <div className="edit-row">
                <div className={"toggle " + (showCountdown ? "on" : "")} onClick={toggleCountdown}>
                  <div className="toggle-sw"/>
                  <div>
                    <div>⏰ 顯示報名倒數區 Show countdown</div>
                    <div className="text-xs text-[color:var(--ink-soft)] font-normal">包含倒數計時 + 名額進度條</div>
                  </div>
                </div>
              </div>

              <div className="edit-row">
                <div className="flex items-center justify-between mb-2">
                  <div className="edit-key">📐 區塊順序 Section order</div>
                  {orderDirty && <button onClick={resetOrder} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ 還原順序</button>}
                </div>
                {finalOrder.map((id, idx) => {
                  const sec = ORDERABLE_SECTIONS.find(s => s.id === id);
                  if(!sec) return null;
                  return (
                    <div key={id} className="reorder-item">
                      <span className="reorder-handle">☰</span>
                      <span className="flex-1">{sec.label}</span>
                      <div className="reorder-btns">
                        <button className="reorder-btn" onClick={() => move(idx, -1)} disabled={idx === 0}>▲</button>
                        <button className="reorder-btn" onClick={() => move(idx, 1)} disabled={idx === finalOrder.length - 1}>▼</button>
                      </div>
                    </div>
                  );
                })}
                <div className="text-xs text-[color:var(--ink-soft)] mt-2">⚡ 順序改動會同時套用到中／英版網站。</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Slots Section (admin only, controls GAS slot limits) ----
    function SlotsSection({ open, onToggle, edits, setEdits, serverContent, registered }){
      const maxKey  = "config.maxSlots";
      const maxBKey = "config.maxSlotsBaishatun";

      const maxVal  = getDisplay(maxKey,  edits, serverContent);
      const maxBVal = getDisplay(maxBKey, edits, serverContent);

      function setVal(key, val){
        const defaultVal = DISPLAY_DEFAULTS[key];
        const committed = serverContent[key] !== undefined ? serverContent[key] : defaultVal;
        setEdits(prev => {
          const next = { ...prev };
          if(String(val) === String(committed)) delete next[key];
          else next[key] = String(val);
          return next;
        });
      }
      function reset(key){
        setEdits(prev => { const n = { ...prev }; delete n[key]; return n; });
      }
      function sanitize(v){
        const n = parseInt(v, 10);
        return Number.isFinite(n) && n > 0 ? String(n) : "";
      }

      const maxDirty  = edits[maxKey]  !== undefined;
      const maxBDirty = edits[maxBKey] !== undefined;

      const maxNum  = parseInt(maxVal,  10) || 0;
      const maxBNum = parseInt(maxBVal, 10) || 0;
      const warn    = maxBNum > maxNum;

      return (
        <div className="edit-section special">
          <div className="edit-section-head" onClick={onToggle}>
            <span>🎟️ 名額設定 Slot Limits {(maxDirty || maxBDirty) && <span className="text-[color:var(--coral-deep)]">●</span>}</span>
            <span>{open ? "▾" : "▸"}</span>
          </div>
          {open && (
            <div className="edit-section-body">

              <div className="edit-row">
                <div className="flex items-center justify-between mb-1">
                  <div className="edit-key">📊 總名額上限 Total Cap</div>
                  {maxDirty && <button onClick={() => reset(maxKey)} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ reset</button>}
                </div>
                <input
                  type="number" min="1" step="1"
                  value={maxVal}
                  onChange={e => setVal(maxKey, sanitize(e.target.value) || e.target.value)}
                  onBlur={e => setVal(maxKey, sanitize(e.target.value) || DISPLAY_DEFAULTS[maxKey])}
                  className={"edit-input " + (maxDirty ? "dirty" : "")}
                />
                <div className="text-xs text-[color:var(--ink-soft)] mt-1">
                  目前已報名 <strong>{registered || 0}</strong> 人 → 還能再收 <strong>{Math.max(0, maxNum - (registered || 0))}</strong> 人
                </div>
              </div>

              <div className="edit-row">
                <div className="flex items-center justify-between mb-1">
                  <div className="edit-key">🌊 白沙屯子上限 Baishatun Sub-cap</div>
                  {maxBDirty && <button onClick={() => reset(maxBKey)} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ reset</button>}
                </div>
                <input
                  type="number" min="1" step="1"
                  value={maxBVal}
                  onChange={e => setVal(maxBKey, sanitize(e.target.value) || e.target.value)}
                  onBlur={e => setVal(maxBKey, sanitize(e.target.value) || DISPLAY_DEFAULTS[maxBKey])}
                  className={"edit-input " + (maxBDirty ? "dirty" : "")}
                />
                <div className="text-xs text-[color:var(--ink-soft)] mt-1">
                  公司欄含「白沙屯」三個字的報名才會套這個上限。
                </div>
              </div>

              {warn && (
                <div className="p-3 rounded-xl border-2 border-[color:var(--coral)] bg-[color:var(--coral)]/10 text-xs font-bold text-[color:var(--coral-deep)]">
                  ⚠️ 白沙屯子上限 ({maxBNum}) 超過總名額 ({maxNum})。建議白沙屯子上限 ≤ 總名額。
                </div>
              )}

              <div className="text-xs text-[color:var(--ink-soft)] mt-2 leading-relaxed">
                💡 改完按上方「💾 儲存」，<strong>不需要重新部署 GAS</strong>。<br/>
                💡 如果欄位空白，會自動套用程式預設值（總 200 / 白沙屯 60）。
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Tab 2: Email template ----
    function EmailTab({ lang, setLang, edits, setEdits, serverContent }){
      function valueOf(key){
        const editKey = `${lang}.${key}`;
        if(edits[editKey] !== undefined) return edits[editKey];
        if(serverContent[editKey] !== undefined) return serverContent[editKey];
        return DEFAULTS[lang][key] ?? "";
      }
      function isDirty(key){ return edits[`${lang}.${key}`] !== undefined; }
      function updateEdit(key, val){
        const editKey = `${lang}.${key}`;
        const committed = serverContent[editKey] !== undefined ? serverContent[editKey] : (DEFAULTS[lang][key] ?? "");
        setEdits(prev => { const next = { ...prev };
          if(val === committed) delete next[editKey]; else next[editKey] = val;
          return next;
        });
      }

      return (
        <div className="edit-drawer-body">
          <div className="mb-3 flex items-center gap-2">
            <span className="text-xs font-bold text-[color:var(--ink-soft)] tracking-wider uppercase shrink-0">Lang</span>
            <button className={"lang-pill " + (lang === "zh" ? "active" : "")} onClick={() => setLang("zh")}>中文</button>
            <button className={"lang-pill " + (lang === "en" ? "active" : "")} onClick={() => setLang("en")}>English</button>
          </div>

          <div className="p-3 rounded-xl bg-[color:var(--cream-warm)] border-2 border-[color:var(--ink)] text-sm font-medium mb-4">
            💌 <strong>確認信樣板</strong>：報名成功後系統會自動寄這封信。<code className="bg-white px-1 rounded">{'{{name}}'}</code> 之類會自動填入個人資料。
          </div>

          <div className="edit-row mb-4">
            <div className="flex items-center justify-between">
              <div className="edit-key">📧 主旨 / Subject ({lang})</div>
              {isDirty("email.subject") && <span className="text-[10px] font-bold text-[color:var(--nmdc-green-dark)]">● dirty</span>}
            </div>
            <input type="text" value={valueOf("email.subject")} onChange={e => updateEdit("email.subject", e.target.value)} className={"edit-input " + (isDirty("email.subject") ? "dirty" : "")}/>
          </div>

          <div className="edit-row">
            <div className="flex items-center justify-between mb-2">
              <div className="edit-key">📝 內文 / Body ({lang})</div>
              {isDirty("email.body") && <span className="text-[10px] font-bold text-[color:var(--nmdc-green-dark)]">● dirty</span>}
            </div>
            <RichEditor value={valueOf("email.body")} onChange={v => updateEdit("email.body", v)} dirty={isDirty("email.body")}/>
          </div>
        </div>
      );
    }

    // ---- Tab 3: Registrations ----
    function RegTab({ editPassword, registered, onDataChanged }){
      const [list, setList] = useState(null);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState("");
      const [filter, setFilter] = useState("");
      const [langFilter, setLangFilter] = useState("all");  // "all" | "zh" | "en"

      async function load(){
        setLoading(true); setErr("");
        try{
          const res = await xhrPost(GAS_URL, { action:"listRegistrations", password:editPassword });
          if(res.success){ setList(res.list || []); }
          else { setErr("讀取失敗：" + (res.error || "未知")); setList([]); }
        } catch(e){ setErr("連線失敗"); setList([]); }
        finally{ setLoading(false); }
      }
      useEffect(() => { load(); /* eslint-disable-next-line */ }, []);

      async function del(serial, name){
        if(!window.confirm(`確定要刪除 #${serial} ${name}？這不可復原。`)) return;
        try{
          const res = await xhrPost(GAS_URL, { action:"deleteRegistration", password:editPassword, serial });
          if(res.success){
            setList(prev => prev.filter(r => r.serial !== serial));
            onDataChanged && onDataChanged();
          } else { window.alert("刪除失敗：" + (res.error || "未知")); }
        } catch(e){ window.alert("連線失敗"); }
      }
      function exportCsv(){
        if(!list || list.length === 0) return;
        const headers = ["Serial","Name","Company","Title","Phone","Email","Blood","Diet","EmergencyName","EmergencyPhone","CompanionCount","CompanionDetails","FormLanguage","LangCode","Timestamp"];
        const rows = [];
        list.forEach(r => {
          // Main row
          const compDetail = (r.companions || []).map((c, i) => `#${i+1} ${c.name||""} (${c.blood||""}/${c.diet||""})`).join(" | ");
          rows.push([r.serial, r.name, r.company, r.title, r.phone, r.email, r.blood || "", r.diet || "", r.emName || "", r.emPhone || "", r.companionCount || 0, compDetail, r.langLabel || (r.lang === "en" ? "🇬🇧 English" : "🇹🇼 中文"), r.lang, r.timestamp]);
          // One row per companion (flattened — easier for grouping)
          (r.companions || []).forEach((c, i) => {
            rows.push([`${r.serial}-${i+1}`, c.name || "", r.company, "(攜眷 / companion of " + r.name + ")", r.phone, r.email, c.blood || "", c.diet || "", r.emName || "", r.emPhone || "", "", "", r.langLabel || (r.lang === "en" ? "🇬🇧 English" : "🇹🇼 中文"), r.lang, r.timestamp]);
          });
        });
        const csv = [headers, ...rows].map(r => r.map(v => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type:"text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url;
        a.download = `nmdc-registrations-${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); URL.revokeObjectURL(url);
      }
      const filtered = useMemo(() => {
        if(!list) return [];
        let arr = list;
        if(langFilter !== "all"){
          arr = arr.filter(r => r.lang === langFilter);
        }
        if(filter.trim()){
          const q = filter.trim().toLowerCase();
          arr = arr.filter(r => {
            const compNames = (r.companions || []).map(c => c.name || "").join(" ");
            return [r.name, r.company, r.title, r.email, r.phone, r.serial, r.emName, r.emPhone, compNames].some(v => String(v || "").toLowerCase().includes(q));
          });
        }
        return arr;
      }, [list, filter, langFilter]);

      // Counts per language for the filter buttons
      const langCounts = useMemo(() => {
        if(!list) return { zh:0, en:0 };
        return list.reduce((acc, r) => {
          if(r.lang === "en") acc.en++; else acc.zh++;
          return acc;
        }, { zh:0, en:0 });
      }, [list]);

      // Total seats taken (main + companions)
      const totalSeats = useMemo(() => {
        if(!list) return 0;
        return list.reduce((s, r) => s + 1 + (r.companionCount || 0), 0);
      }, [list]);

      return (
        <div className="edit-drawer-body">
          <div className="flex items-center justify-between mb-3 gap-2">
            <div>
              <div className="font-display text-xl">👥 {list ? list.length : "—"} 筆 / 共 {totalSeats} 席</div>
              <div className="text-xs text-[color:var(--ink-soft)]">Registrations · Total seats incl. companions</div>
            </div>
            <div className="flex gap-2">
              <button onClick={load} disabled={loading} className="btn-outline px-3 py-1 text-xs">{loading ? "…" : "🔄 更新"}</button>
              <button onClick={exportCsv} disabled={!list || list.length === 0} className="btn-outline px-3 py-1 text-xs">📥 CSV</button>
            </div>
          </div>

          {/* Language filter pills */}
          {list && list.length > 0 && (
            <div className="flex gap-2 mb-3 flex-wrap">
              <button onClick={() => setLangFilter("all")} className={"lang-pill " + (langFilter === "all" ? "active" : "")}>
                👥 全部 ({list.length})
              </button>
              <button onClick={() => setLangFilter("zh")} className={"lang-pill " + (langFilter === "zh" ? "active" : "")}>
                🇹🇼 中文 ({langCounts.zh})
              </button>
              <button onClick={() => setLangFilter("en")} className={"lang-pill " + (langFilter === "en" ? "active" : "")}>
                🇬🇧 English ({langCounts.en})
              </button>
            </div>
          )}

          <input type="text" placeholder="🔍 搜尋姓名 / 公司 / 信箱 / 攜眷…" value={filter} onChange={e => setFilter(e.target.value)} className="edit-input mb-3"/>

          {err && (<div className="p-3 rounded-xl bg-[color:var(--coral)] text-white font-bold text-sm border-2 border-[color:var(--ink)] mb-3">❗ {err}</div>)}
          {loading && <div className="text-center py-10 text-[color:var(--ink-soft)] font-bold">載入中…</div>}
          {!loading && list && list.length === 0 && (<div className="text-center py-10"><div className="text-5xl mb-2">🏖️</div><div className="font-bold text-[color:var(--ink-soft)]">還沒有人報名</div></div>)}
          {!loading && list && list.length > 0 && filtered.length === 0 && (<div className="text-center py-6 text-[color:var(--ink-soft)] text-sm font-medium">沒有符合條件的人</div>)}

          {!loading && filtered.length > 0 && (
            <div className="overflow-x-auto">
              <table className="reg-table">
                <thead><tr><th>#</th><th>姓名 / 血型 / 飲食</th><th>公司 / 職稱 / 介面</th><th>聯絡</th><th>🚨 緊急聯絡</th><th>👨‍👩‍👧 攜眷</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(r => (
                    <tr key={r.serial}>
                      <td className="reg-serial">{pad(r.serial)}</td>
                      <td>
                        <div className="font-bold">{r.name}</div>
                        <div className="reg-small">{formatTs(r.timestamp)}</div>
                        {r.blood && <div className="reg-small" style={{color:"var(--coral-deep)", fontWeight:700, marginTop:2}}>🩸 {r.blood}</div>}
                        {r.diet && <div className="reg-small" style={{color:"var(--nmdc-green-dark)", fontWeight:700, marginTop:2}}>🍽️ {r.diet}</div>}
                      </td>
                      <td>
                        <div>{r.company}</div>
                        <div className="reg-small">{r.title}</div>
                        <div style={{marginTop:4}}>
                          <span className={"reg-lang-badge " + r.lang}>{r.lang === "en" ? "🇬🇧 EN" : "🇹🇼 中"}</span>
                        </div>
                      </td>
                      <td>
                        <div className="reg-small">{r.phone}</div>
                        <div><a href={`mailto:${r.email}`} className="text-[color:var(--nmdc-green-dark)] underline text-xs">{r.email}</a></div>
                      </td>
                      <td style={{background:"#FFF0EC"}}>
                        <div className="font-bold text-[color:var(--coral-deep)]" style={{fontSize:12}}>{r.emName || "—"}</div>
                        <div className="reg-small">{r.emPhone ? <a href={`tel:${r.emPhone.replace(/\D/g,"")}`} className="text-[color:var(--coral-deep)]">{r.emPhone}</a> : "—"}</div>
                      </td>
                      <td style={{background:r.companionCount > 0 ? "#FFF7E6" : ""}}>
                        {r.companionCount > 0 ? (
                          <>
                            <div className="font-bold text-[color:var(--sun-deep)]" style={{fontSize:12}}>+{r.companionCount} 位</div>
                            {(r.companions || []).map((c, i) => (
                              <div key={i} className="reg-small" style={{marginTop:2}}>
                                {i+1}. {c.name}{c.blood ? ` 🩸${c.blood}` : ""}{c.diet ? ` 🍽️${c.diet}` : ""}
                              </div>
                            ))}
                          </>
                        ) : <div className="reg-small">—</div>}
                      </td>
                      <td><button onClick={() => del(r.serial, r.name)} className="btn-danger text-[11px] px-2 py-1">🗑</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ---- Tab 4: Blast ----
    function BlastTab({ editPassword, registered }){
      const [subject, setSubject] = useState("");
      const [body, setBody] = useState("<p>嗨 {{name}}，</p><p></p><p>— NMDC Energy</p>");
      const [sending, setSending] = useState(false);
      const [result, setResult] = useState(null);
      const [mode, setMode] = useState("all");  // "all" | "range"
      const [fromSerial, setFromSerial] = useState(1);
      const [toSerial, setToSerial] = useState(Math.min(100, registered || 100));

      // When registered count changes and user hasn't touched the "to" field, auto-fit
      useEffect(() => {
        if(registered && toSerial > registered) setToSerial(registered);
      }, [registered]);

      const total = registered || 0;
      const from = Math.max(1, parseInt(fromSerial, 10) || 1);
      const to = Math.max(from, Math.min(total, parseInt(toSerial, 10) || total));
      const willSend = mode === "all" ? total : Math.max(0, to - from + 1);

      async function send(){
        if(!subject.trim()){ window.alert("請填主旨"); return; }
        if(!body.trim() || body === "<p></p>" || body === "<br>"){ window.alert("請填內文"); return; }
        if(willSend === 0){ window.alert("沒有人符合這個範圍"); return; }

        const rangeMsg = mode === "all"
          ? `全部 ${total} 位報名者`
          : `報名序號 #${from} – #${to}（共 ${willSend} 位）`;

        if(!window.confirm(`確定要寄給 ${rangeMsg}？\n這動作無法復原，且會消耗 Gmail 每日配額（個人 100/天、Workspace 1500/天）。`)) return;
        if(!window.confirm("再確認一次 — 真的要寄出嗎？")) return;

        setSending(true); setResult(null);
        try{
          const payload = { action:"sendBlast", password:editPassword, subject, body };
          if(mode === "range"){
            payload.fromSerial = from;
            payload.toSerial = to;
          }
          const res = await xhrPost(GAS_URL, payload, 180000);
          if(res.success){
            setResult({ ok:true, msg:`寄出 ${res.sent} 封${res.failed ? `、失敗 ${res.failed} 封` : ""}${res.skipped ? `、略過 ${res.skipped} 筆（沒有 email）` : ""}` });
          } else {
            setResult({ ok:false, msg:"寄信失敗：" + (res.error || "未知") });
          }
        } catch(e){
          setResult({ ok:false, msg:"連線失敗或逾時（量大的時候正常）" });
        } finally { setSending(false); }
      }

      return (
        <div className="edit-drawer-body">
          <div className="p-3 rounded-xl bg-[color:var(--cream-warm)] border-2 border-[color:var(--ink)] text-sm font-medium mb-4">
            📢 <strong>群發</strong>（目前報名 {total} 人）。可用 <code className="bg-white px-1 rounded">{'{{name}}'}</code> 等標籤自動填入每個人的資料。
          </div>

          {/* Mode toggle */}
          <div className="mb-3">
            <div className="edit-key mb-2">📬 寄給誰</div>
            <div className="flex gap-2 flex-wrap mb-3">
              <button type="button" onClick={() => setMode("all")} className={"lang-pill " + (mode === "all" ? "active" : "")}>
                👥 全部 {total > 0 && `(${total})`}
              </button>
              <button type="button" onClick={() => setMode("range")} className={"lang-pill " + (mode === "range" ? "active" : "")}>
                🎯 指定範圍
              </button>
            </div>

            {mode === "range" && (
              <div className="p-3 rounded-xl bg-white border-2 border-[color:var(--ink)]">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-sm font-bold">從 #</span>
                  <input type="number" min="1" max={total || 999} value={fromSerial} onChange={e => setFromSerial(e.target.value)} className="edit-input" style={{width:"80px"}}/>
                  <span className="text-sm font-bold">到 #</span>
                  <input type="number" min="1" max={total || 999} value={toSerial} onChange={e => setToSerial(e.target.value)} className="edit-input" style={{width:"80px"}}/>
                </div>
                <div className="mt-2 text-xs text-[color:var(--ink-soft)] font-medium">
                  👉 會寄給報名序號 <strong>#{from}</strong> 到 <strong>#{to}</strong>，共 <strong className="text-[color:var(--nmdc-green-dark)]">{willSend}</strong> 位
                </div>
                <div className="mt-2 flex gap-2 flex-wrap">
                  <button type="button" onClick={() => { setFromSerial(1); setToSerial(Math.min(100, total)); }} className="btn-outline text-[11px] px-2 py-1">前 100 位</button>
                  <button type="button" onClick={() => { setFromSerial(101); setToSerial(Math.min(200, total)); }} className="btn-outline text-[11px] px-2 py-1">101–200</button>
                  <button type="button" onClick={() => { setFromSerial(1); setToSerial(Math.min(50, total)); }} className="btn-outline text-[11px] px-2 py-1">前 50 位</button>
                </div>
                <div className="mt-2 text-[11px] text-[color:var(--ink-soft)]">
                  💡 個人 Gmail 每天只能寄 100 封。200 人要群發的話可以分兩天：<br/>
                  · Day 1 選 <strong>#1–#100</strong>｜Day 2 選 <strong>#101–#200</strong>
                </div>
              </div>
            )}
          </div>

          <div className="mb-3">
            <div className="edit-key mb-1">主旨 Subject</div>
            <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="例：2026 NMDC 淨灘｜行前通知" className="edit-input"/>
          </div>
          <div className="mb-4">
            <div className="edit-key mb-1">內文 Body</div>
            <RichEditor value={body} onChange={setBody} dirty={false}/>
          </div>
          {result && (<div className={"p-3 rounded-xl font-bold text-sm border-2 border-[color:var(--ink)] mb-3 " + (result.ok ? "bg-[color:var(--nmdc-green)] text-white" : "bg-[color:var(--coral)] text-white")}>{result.ok ? "✅" : "❗"} {result.msg}</div>)}
          <button onClick={send} disabled={sending || !total || willSend === 0} className="btn-chunk w-full px-5 py-4 text-base">
            {sending ? "寄送中，請稍候…" : (mode === "all" ? `📤 寄給全部 ${total} 人` : `📤 寄給 #${from}–#${to}（${willSend} 人）`)}
          </button>
        </div>
      );
    }

    // Public Sections
    // ====================================================================

    // Announcement banner — only shown on ?team=baishatun
    // Editable in admin under section "📣 白沙屯公告"
    function AnnouncementBanner({ t }){
      if(!IS_BAISHATUN) return null;
      const head = t("announce.head");
      const title = t("announce.title");
      const body = t("announce.body");
      // Render body with line breaks + simple **bold** support
      function renderBody(text){
        const parts = String(text || "").split(/\n/);
        return parts.map((line, i) => {
          // Convert **bold** to <strong>
          const segs = [];
          let last = 0;
          const re = /\*\*([^*]+)\*\*/g;
          let m;
          while((m = re.exec(line)) !== null){
            if(m.index > last) segs.push(line.slice(last, m.index));
            segs.push(<strong key={"b"+i+"-"+m.index} className="text-[color:var(--coral-deep)]">{m[1]}</strong>);
            last = m.index + m[0].length;
          }
          if(last < line.length) segs.push(line.slice(last));
          return (
            <p key={i} className={line.trim() === "" ? "h-2" : "leading-relaxed"}>
              {segs.length ? segs : (line || "\u00A0")}
            </p>
          );
        });
      }
      return (
        <section className="bg-[color:var(--sun)] border-b-4 border-[color:var(--ink)] relative overflow-hidden">
          <div className="absolute inset-0 bg-dots opacity-30 pointer-events-none"></div>

    function Countdown({ deadline, t }){
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);
      if(!deadline) return null;
      const diff = new Date(deadline).getTime() - now;
      if(diff <= 0) return <div className="font-display text-4xl text-[color:var(--coral)]">{t("status.expired")}</div>;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const sec = Math.floor((diff % 60000) / 1000);
      const Cell = ({ v, label, pulse=false }) => (
        <div className="flex-1 text-center">
          <div className={`font-num text-5xl md:text-7xl leading-none text-[color:var(--ink)] ${pulse ? "count-bounce" : ""}`}>{pad(v)}</div>
          <div className="text-[11px] md:text-sm font-extrabold tracking-[0.2em] mt-2 text-[color:var(--ink-soft)]">{label}</div>
        </div>
      );
      return (
        <div className="bg-white border-[3px] border-[color:var(--ink)] rounded-3xl p-5 md:p-7 flex items-start gap-2" style={{boxShadow:"6px 6px 0 var(--ink)"}}>
          <Cell v={d} label={t("status.days")}/>

          <Cell v={h} label={t("status.hrs")}/>
          <div className="font-num text-4xl md:text-6xl text-[color:var(--sand-deep)]">:</div>
          <Cell v={m} label={t("status.min")}/>
          <div className="font-num text-4xl md:text-6xl text-[color:var(--sand-deep)]">:</div>
          <Cell v={sec} label={t("status.sec")} pulse/>

      );
